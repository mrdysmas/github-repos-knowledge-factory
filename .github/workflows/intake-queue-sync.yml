name: Intake Queue Sync Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  intake-queue-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Enforce intake queue sync
        run: ./tools/enforce_intake_queue_sync.sh .
