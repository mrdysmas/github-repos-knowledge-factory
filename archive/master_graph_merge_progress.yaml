---
# Phase 0: Master Knowledge Graph Consolidation
# Unify knowledge shards into a canonical master index + master graph
# Date initiated: 2026-02-22

phase:
  number: "0"
  name: "Master Knowledge Graph Consolidation"
  status: "COMPLETE"  # Workflow: PENDING -> IN_PROGRESS -> CHECKPOINT_1 -> CHECKPOINT_2 -> COMPLETE
  date_initiated: "2026-02-22"
  date_started: null
  date_completed: "2026-02-24"
  owner: "user + coding agents"
  scope: "Merge llm_repos/knowledge + ssh_repos/knowledge into canonical master artifacts"

objective: |
  Build one canonical master index and one canonical master graph that can scale beyond local clones.
  The target operating model is remote-first: maintain graph/index for repos of interest without requiring
  full local source checkout. Domain knowledge shards remain useful inputs, but master artifacts must follow
  a single identity model, graph schema, and validation contract.

dependencies:
  - "Existing shards: llm_repos/knowledge and ssh_repos/knowledge"
  - "Agreement on canonical repo identity (GitHub-native)"
  - "Agreement on canonical relation ontology and node kinds"
  - "Agreement on master build flow (compile from shards; no manual master edits)"

acceptance_criteria:
  - "100% of knowledge artifacts parse as valid YAML (index, graph, repos, deep, progress, audit-progress)"
  - "No COMPLETE/READY status is allowed when parse errors exist or pending queues are non-empty"
  - "Canonical identity exists for 100% of tracked repos (owner/repo + URL + stable node_id)"
  - "100% of shard edges compile into canonical edge schema without field-loss"
  - "Relation ontology mapping coverage is 100% (no unmapped relation types)"
  - "Validator enforces identical core rules across all shard inputs"
  - "Master graph supports both internal repo nodes and external ecosystem nodes via explicit node kinds"
  - "Incremental refresh job updates changed repos only and records provenance/as_of timestamps"
  - "Fresh agent can resume from tracker only (no chat history dependency)"

milestones:
  - name: "Checkpoint 0 - Trust Gates"
    description: "Parser and status-semantic gates prevent false-green READY/COMPLETE outcomes"
    expected_completion: "1 working session"
    status: "COMPLETE"
  - name: "Checkpoint 1 - Contract Freeze"
    description: "Canonical schemas (repo, node, edge) + relation ontology + validation rules approved"
    expected_completion: "1-2 working sessions"
    status: "COMPLETE"
  - name: "Checkpoint 2 - Identity and Schema Normalization"
    description: "Both shards normalized to canonical schema with migration artifacts and mismatch report"
    expected_completion: "2-4 working sessions"
    status: "COMPLETE"
  - name: "Checkpoint 3 - Master Compiler and Validation"
    description: "Automated build generates master_index/master_graph + deterministic validation passes"
    expected_completion: "2-4 working sessions"
    status: "COMPLETE"
  - name: "Checkpoint 4 - Remote-First Operation"
    description: "Pipeline can add/refresh repos from GitHub metadata without requiring local clone"
    expected_completion: "3-6 working sessions"
    status: "COMPLETE"

workstreams:
  - id: "WS0"
    name: "Trust & Validation Hardening"
    status: "COMPLETE"
    outcome: "No false-green outputs; strict parse + status gates before merge work"
    context_window_control:
      max_scope_per_task: "one validator + one status artifact at a time"
      max_files_per_task: 4
  - id: "WS1"
    name: "Canonical Data Contract"
    status: "COMPLETE"
    outcome: "One schema and ontology for all current/future shards"
    context_window_control:
      max_scope_per_task: "schema + one validator diff only"
      max_files_per_task: 3
  - id: "WS2"
    name: "Identity Backfill"
    status: "COMPLETE"
    outcome: "All repos carry GitHub-native identity fields"
    context_window_control:
      max_scope_per_task: "batch 10-15 repos"
      max_files_per_task: 20
  - id: "WS3"
    name: "Graph Normalization"
    status: "COMPLETE"
    outcome: "All edges converted to canonical keys and relation types"
    context_window_control:
      max_scope_per_task: "one relation family at a time"
      max_files_per_task: 4
  - id: "WS4"
    name: "Master Build + Validation"
    status: "COMPLETE"
    outcome: "Deterministic compile pipeline + unified quality gates"
    context_window_control:
      max_scope_per_task: "single script + tests"
      max_files_per_task: 5
  - id: "WS5"
    name: "Remote-First Ingestion"
    status: "COMPLETE"
    outcome: "Starred/watchlist repos can be tracked without local repo contents"
    context_window_control:
      max_scope_per_task: "one source adapter at a time"
      max_files_per_task: 6

