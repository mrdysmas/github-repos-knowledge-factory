  - "[x] Step 6: Define relation ontology and mapping table from existing shard relation labels"
  - "[x] Step 7: Define node kinds and policies (repo, external_tool, concept) to resolve closed/open world conflict"
  - "[x] Step 8: Create migration spec for llm graph keys (source/target/relation) and ssh graph keys (from/to/type) (WAIVED by supervisor on 2026-02-24: WS3 canonicalization + WS1/WS4 validation controls accepted as equivalent; no separate migration-spec artifact required)."
  - "[x] Step 9: Backfill canonical identity into all shallow repo files and deep files"
  - "[x] Step 10: Normalize deep-file schema in llm shard (name/repo/repo_id/full_name variants to canonical contract)"
  - "[x] Step 11: Unify validator rules for shallow + deep across both shards"
  - "[x] Step 12: Build compiler that generates master_index.yaml and master_graph.yaml from shard inputs"
  - "[x] Step 13: Add deterministic reports (coverage, unmapped relations, unknown nodes, stale records)"
  - "[x] Step 14: Define refresh workflow for remote-only repositories (API/README metadata fallback strategy)"
  - "[x] Step 15: Run end-to-end dry run and record baseline vs post-normalization metrics"

