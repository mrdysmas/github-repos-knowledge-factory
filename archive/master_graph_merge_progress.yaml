findings: |
  Pattern recognized: federated shard knowledge bases with divergent schema contracts.
  Typical failure mode: teams merge data before defining identity/ontology contracts, then spend cycles
  on brittle migration logic and manual cleanup.
  Additional pattern recognized: false-green pipelines (READY/COMPLETE reported while artifacts are not machine-parseable).
  Additional pattern recognized: open architectural decisions can be preserved while still freezing enforceable contract boundaries.
  Recommendation: establish trust gates first, freeze WS1 boundary contracts with configurable policy switches, then normalize shards, then compile master artifacts.

decision_rule: |
  IF parser or status-semantic gates fail on any tracked artifact:
    -> Mark BLOCKED and do not proceed to merge implementation.
  IF checkpoint 1 contract is not approved:
    -> Do not implement master merge logic; continue contract and validation-hardening work only.
  IF contract approved and normalization coverage >= 95% with no HIGH-severity open blockers:
    -> Proceed to compiler and unified validation implementation.
  IF merge output passes validation but freshness/provenance is missing:
    -> Mark PARTIAL and block production adoption until provenance fields are present.

