risks:
  - id: "R1"
    severity: "HIGH"
    description: "Identity drift blocks remote-first operation"
    why_it_matters: "Without GitHub-native identity, entries are tied to local directory names and cannot be reliably refreshed"
    mitigation: "Make canonical identity mandatory; local directory becomes optional cache field"
    status: "OPEN"
  - id: "R2"
    severity: "HIGH"
    description: "Schema drift between shards causes merge breakage and custom one-off logic"
    why_it_matters: "Different key names and relation vocabularies multiply glue code and failure points"
    mitigation: "Introduce schema contract + normalization layer before master compiler"
    status: "OPEN"
  - id: "R3"
    severity: "HIGH"
    description: "Closed-world vs open-world node policy conflict"
    why_it_matters: "One shard requires all nodes local while the other models external ecosystem tools"
    mitigation: "Add explicit node kinds and validation policy per node kind"
    status: "OPEN"
  - id: "R4"
    severity: "HIGH"
    description: "Deep knowledge layer inconsistency in llm shard"
    why_it_matters: "Missing canonical keys in deep files limits trust and automation"
    mitigation: "Backfill deep schema and add strict deep validation gates"
    status: "OPEN"
  - id: "R5"
    severity: "MEDIUM"
    description: "Quality signals may be overstated"
    why_it_matters: "Sampled audit checks can produce false confidence"
    mitigation: "Use deterministic coverage metrics and full-check validation for critical dimensions"
    status: "OPEN"
  - id: "R6"
    severity: "MEDIUM"
    description: "No provenance/freshness fields for relationships"
    why_it_matters: "Edges can become stale and unverifiable over time"
    mitigation: "Add evidence + as_of + confidence fields for all compiled edges"
    status: "OPEN"
  - id: "R7"
    severity: "HIGH"
    description: "False-green verification artifacts"
    why_it_matters: "Artifacts can claim READY/VERIFIED while not parseable, undermining trust in outputs"
    mitigation: "Hard gate READY/COMPLETE on strict parser pass across all artifact files"
    status: "OPEN"
  - id: "R8"
    severity: "HIGH"
    description: "Spec vs validator mismatch"
    why_it_matters: "Skill documentation promises full validation scope that implementation does not enforce"
    mitigation: "Align skill spec, templates, and validator behavior; test conformance in CI-like gate"
    status: "OPEN"
  - id: "R9"
    severity: "MEDIUM"
    description: "Status semantic corruption (complete with pending work)"
    why_it_matters: "Progress files become unreliable for scheduling and agent handoff decisions"
    mitigation: "Add status consistency checks and fail on contradictory states"
    status: "OPEN"

open_decisions:
  - id: "D1"
    question: "Master persistence model: YAML-only vs YAML + SQLite index?"
    options:
      - "YAML-only (simpler diffs, lower complexity, weaker query performance)"
      - "YAML + SQLite (stronger queryability and refresh workflows, more moving parts)"
    owner: "user"
    deadline: null
    status: "RESOLVED"
    decision: "YAML-only canonical source of truth for now; allow generated SQLite read-model later if query scale requires it."
    resolved_at: "2026-02-24T01:41:13Z"
    residual_risk: "Ad-hoc analytics may become slow as repository count and relationship volume grow."
    follow_up: "Define explicit trigger thresholds (size/query-latency) for introducing generated SQLite read-model."
  - id: "D2"
    question: "Relation ontology strategy: strict minimal set vs richer ontology with compatibility mapping?"
    options:
      - "Strict minimal set (easier maintenance, less expressiveness)"
      - "Richer ontology + canonical mapping (better fidelity, higher governance burden)"
    owner: "user"
    deadline: null
    status: "RESOLVED"
    decision: "Adopt richer ontology with canonical mapping as governance boundary."
    resolved_at: "2026-02-24T01:41:13Z"
    residual_risk: "Mapping table growth can drift without ownership and compatibility checks."
    follow_up: "Add ontology change-control checklist and mapping-coverage gate to decision review cadence."
  - id: "D3"
    question: "External nodes in master graph: first-class nodes vs lightweight labels only?"
    options:
      - "First-class nodes (better analytics, higher schema/ingestion complexity)"
      - "Label-only references (lighter implementation, weaker graph reasoning)"
    owner: "user"
    deadline: null
    status: "RESOLVED"
    decision: "Model external entities as first-class nodes in master graph."
    resolved_at: "2026-02-24T01:41:13Z"
    residual_risk: "Node-cardinality growth can increase ingestion and validation cost."
    follow_up: "Define node-kind lifecycle policy (creation/update/deprecation) and monitor external-node growth."
  - id: "D4"
    question: "Quality gate strictness: block all READY/COMPLETE states on any parse/status inconsistency?"
    options:
      - "Strict blocking (recommended) - no READY/COMPLETE unless all parser + status gates pass"
      - "Soft warnings - allow READY with notes and manual review burden"
    owner: "user"
    deadline: null
    status: "RESOLVED"
    decision: "Strict blocking implemented in WS0 trust gates preflight"
    resolved_at: "2026-02-22"

