name: ragflow
node_id: repo::infiniflow/ragflow
github_full_name: infiniflow/ragflow
html_url: https://github.com/infiniflow/ragflow
source: llm_repos
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/repos/ragflow.yaml
  as_of: '2026-02-25'
directory: ragflow-main
category: rag_frameworks

summary: |
  Full-stack RAG engine with deep document understanding capabilities. Unlike LangChain/LlamaIndex
  which are frameworks, RAGFlow is an end-to-end platform with a Web UI, Docker deployment, and
  built-in document parsing (OCR, layout analysis via DeepDoc). Excels at handling complex document
  formats (scanned PDFs, tables, images) with template-based chunking. Now includes agent
  capabilities with MCP support.

core_concepts:
  - name: DeepDoc
    description: Document parsing engine with OCR, layout analysis, table extraction
    location: deepdoc/

  - name: RAG Pipeline
    description: Chunking, parsing, indexing, retrieval orchestration
    location: rag/flow/

  - name: LLM Abstractions
    description: Unified interface for chat, embedding, reranking models
    location: rag/llm/

  - name: GraphRAG Module
    description: Knowledge graph construction and querying
    location: rag/graphrag/

  - name: Agent System
    description: Workflow components, tools, templates for agents
    location: agent/

  - name: API Server
    description: Flask-based REST API with modular blueprints
    location: api/

key_entry_points:
  - path: api/ragflow_server.py
    purpose: Main server entry point

  - path: api/apps/
    purpose: Flask blueprints (kb, dialog, document, canvas, file)

  - path: deepdoc/
    purpose: Document understanding (OCR, layout, tables)

  - path: rag/llm/
    purpose: LLM/embedding/reranking integrations

  - path: agent/
    purpose: Agent components and tools

  - path: web/
    purpose: React/TypeScript frontend (UmiJS)

architecture:
  backend: Python (Flask)
  frontend: React/TypeScript (UmiJS)
  data_stores:
    - MySQL
    - Elasticsearch (default) or Infinity
    - Redis
    - MinIO (object storage)
  deployment: Docker Compose

build_run:
  language: Python + TypeScript
  manager: uv (Python), npm (frontend)
  run_docker: |
    cd docker
    docker compose -f docker-compose.yml up -d
  run_dev: |
    # Backend
    uv sync --python 3.12
    docker compose -f docker/docker-compose-base.yml up -d
    bash docker/launch_backend_service.sh
    # Frontend
    cd web && npm install && npm run dev
  test: "uv run pytest"

ecosystem_connections:
  - target: langchain
    relation: alternative_to
    note: RAGFlow is a platform; LangChain is a framework

  - target: llama_index
    relation: alternative_to
    note: Both RAG-focused; RAGFlow is end-to-end with UI

  - target: graphrag
    relation: related_to
    note: RAGFlow has its own graphrag module

  - target: milvus
    relation: integrates_with
    note: Can use Milvus as vector backend

  - target: ollama
    relation: integrates_with
    note: Supports Ollama as LLM provider

  - target: open_webui
    relation: alternative_to
    note: Both provide web UIs; RAGFlow focuses on documents

further_reading:
  - README.md
  - CLAUDE.md (development guide)
  - deepdoc/README.md
  - docs: https://ragflow.io/docs/dev/
  - demo: https://demo.ragflow.io/
