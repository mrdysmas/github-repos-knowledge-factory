name: pathway
node_id: repo::pathwaycom/pathway
github_full_name: pathwaycom/pathway
html_url: https://github.com/pathwaycom/pathway
source: repos
provenance:
  shard: repos
  source_file: repos/knowledge/repos/pathway.yaml
  as_of: '2026-02-25'
directory: pathway-main
category: data_pipelines

summary: |
  Python ETL framework for stream processing, real-time analytics, and LLM pipelines.
  Powered by a scalable Rust engine based on Differential Dataflow for incremental
  computation. Same code works for batch and streaming. Includes LLM xpack with
  vector index, embedders, and LangChain/LlamaIndex integrations for live RAG.

core_concepts:
  - name: Streaming Engine
    description: Rust-based differential dataflow for incremental computation
    location: python/pathway/internals/

  - name: Connectors (IO)
    description: Kafka, GDrive, PostgreSQL, SharePoint, Airbyte (300+ sources)
    location: python/pathway/io/

  - name: LLM xpack
    description: Vector index, embedders, splitters, LLM wrappers for RAG
    location: python/pathway/xpacks/

  - name: Transformations
    description: Stateless and stateful (joins, windowing, sorting)
    location: python/pathway/stdlib/

key_entry_points:
  - path: python/pathway/
    purpose: Core library

  - path: python/pathway/io/
    purpose: Data connectors

  - path: python/pathway/xpacks/
    purpose: LLM/RAG utilities

build_run:
  language: Python (Rust engine)
  install: "pip install pathway"
  usage: |
    import pathway as pw

    input_table = pw.io.csv.read("./input/", schema=MySchema)
    result = input_table.filter(input_table.value >= 0)
    pw.io.jsonlines.write(result, "output.jsonl")
    pw.run()  # Start streaming

key_features:
  - Unified batch and streaming code
  - Rust engine for Python-scale performance
  - 300+ data source connectors via Airbyte
  - Real-time vector index for live RAG
  - LangChain and LlamaIndex integrations
  - Persistence and exactly-once consistency (enterprise)
  - Monitoring dashboard

use_cases:
  - Real-time ETL pipelines
  - Live RAG with document updates
  - Event-driven alerting
  - Streaming analytics

ecosystem_connections:
  - target: langchain
    relation: integrates_with
    note: Pathway vector store integration for LangChain

  - target: llama_index
    relation: integrates_with
    note: Pathway retriever for LlamaIndex

  - target: milvus
    relation: alternative_to
    note: Pathway has in-memory real-time vector index

  - target: ollama
    relation: integrates_with
    note: Pathway supports Ollama for local LLM RAG

further_reading:
  - README.md
  - docs: https://pathway.com/developers/
  - templates: https://pathway.com/developers/templates
