name: xtermjs
node_id: repo::xtermjs/xterm.js
github_full_name: xtermjs/xterm.js
html_url: https://github.com/xtermjs/xterm.js
source: repos
provenance:
  shard: repos
  source_file: repos/knowledge/repos/xtermjs.yaml
  as_of: '2026-02-25'
directory: xterm.js-master
category: terminal_ui
summary: |
  A TypeScript/JavaScript library that brings fully-featured terminal emulation to the browser - rendering VT100/xterm escape sequences, handling input, and providing a programmable terminal UI component used by VS Code, Hyper, and hundreds of web-based terminal applications.
core_concepts:
  - name: Terminal Emulation Engine
    description: |
      Parses and renders ANSI/VT escape sequences (CSI, OSC, DCS, APC) to simulate xterm behavior in the browser. Handles cursor movement, text styling, scrolling, mouse tracking, and alternate screen buffers. Zero core dependencies.
  - name: Buffer System
    description: |
      Manages normal and alternate screen buffers with scrollback support. Each buffer contains lines of cells with character data, attributes (colors, styles), and width information for proper CJK/emoji rendering.
  - name: Addon Architecture
    description: |
      Extensible via loadable addons for specialized features (webgl rendering, search, web links, image support, clipboard, fit, serialize). Core library stays lean while addons provide optional capabilities.
key_entry_points:
  - path: src/browser/public/Terminal.ts:25
    purpose: Main public Terminal class - the primary API entry point for creating and interacting with terminal instances in browser apps
  - path: src/browser/CoreBrowserTerminal.ts:62
    purpose: Core browser terminal implementation - handles DOM integration, input events, rendering services, and extends CoreTerminal
  - path: src/common/CoreTerminal.ts:46
    purpose: Platform-agnostic core terminal logic - buffer management, input parsing, escape sequence handling, and service coordination
  - path: src/common/InputHandler.ts
    purpose: Parses and processes terminal input data, handling all ANSI/VT escape sequences and control characters
  - path: typings/xterm.d.ts
    purpose: Public TypeScript type definitions - the authoritative API documentation for library consumers
build_run:
  language: typescript
  package_manager: npm
  build_command: npm run build
  run_command: npm start
  test_command: npm test
ecosystem_connections:
  similar_to:
    - terminal.js
    - jquery.terminal
    - vt100 (various implementations)
  alternatives:
    - alacritty (native GPU terminal)
    - kitty (native GPU terminal)
    - gnome-terminal (native)
  used_with:
    - VS Code (integrated terminal)
    - Hyper (terminal app)
    - Tabby (terminal app)
    - node-pty (backend PTY process)
    - websockets (for remote terminal sessions)
    - ttyd (share terminal over web)
    - wetty (web terminal)
    - JupyterLab
    - Eclipse Theia
    - Portainer
    - Azure Cloud Shell
