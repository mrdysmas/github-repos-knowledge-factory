name: pydantic-settings
node_id: repo::pydantic/pydantic-settings
github_full_name: pydantic/pydantic-settings
html_url: https://github.com/pydantic/pydantic-settings
source: remote_metadata
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/deep/pydantic__pydantic-settings.yaml
  as_of: '2026-03-05'
directory: remote::pydantic/pydantic-settings
category: structured_outputs

architecture:
  module_breakdown:
    - module: pydantic_settings/main.py
      responsibility: "Defines BaseSettings, source initialization, and value merge orchestration."
      key_files:
        - pydantic_settings/main.py
    - module: pydantic_settings/sources/base.py
      responsibility: "Defines abstract source interfaces and shared config file helper mixins."
      key_files:
        - pydantic_settings/sources/base.py
    - module: pydantic_settings/sources/providers
      responsibility: "Implements concrete providers for env, dotenv, CLI, secrets, and config files."
      key_files:
        - pydantic_settings/sources/providers/env.py
        - pydantic_settings/sources/providers/dotenv.py
        - pydantic_settings/sources/providers/cli.py
        - pydantic_settings/sources/providers/secrets.py
        - pydantic_settings/sources/providers/toml.py
        - pydantic_settings/sources/providers/yaml.py
    - module: pydantic_settings/sources/providers/aws.py
      responsibility: "Optional provider for AWS Secrets Manager backed settings values."
      key_files:
        - pydantic_settings/sources/providers/aws.py
    - module: pydantic_settings/sources/providers/azure.py
      responsibility: "Optional provider for Azure Key Vault backed settings values."
      key_files:
        - pydantic_settings/sources/providers/azure.py
    - module: pydantic_settings/sources/providers/gcp.py
      responsibility: "Optional provider for Google Secret Manager backed settings values."
      key_files:
        - pydantic_settings/sources/providers/gcp.py
  key_abstractions:
    - name: BaseSettings
      purpose: "Model base class that composes multiple settings sources into final values."
    - name: SettingsConfigDict
      purpose: "Typed configuration schema for environment, CLI, file, and secret provider behavior."
    - name: PydanticBaseSettingsSource
      purpose: "Abstract source contract used by built-in and custom settings providers."
    - name: CliSettingsSource
      purpose: "Source that maps settings fields to CLI arguments and parsed values."

code_patterns:
  - pattern: "Source priority hook"
    description: "settings_customise_sources controls ordering and inclusion of value sources."
    location: pydantic_settings/main.py
  - pattern: "Deterministic source merge"
    description: "_settings_build_values iterates sources, merges state, then strips unchanged defaults."
    location: pydantic_settings/main.py
  - pattern: "Alias-aware state normalization"
    description: "_settings_restore_init_kwarg_names maps merged keys back to init argument naming."
    location: pydantic_settings/main.py
  - pattern: "Provider mixin for config files"
    description: "ConfigFileSourceMixin centralizes multi-file read and deep-merge behavior."
    location: pydantic_settings/sources/base.py

implementation_patterns:
  - pattern: "Composable provider classes"
    description: "Providers share abstract base behavior and specialize loading strategy by source type."
    location: pydantic_settings/sources/providers
  - pattern: "Optional CLI injection"
    description: "CLI source is prepended only when configured or explicitly supplied."
    location: pydantic_settings/main.py
  - pattern: "Deferred parsing for complex values"
    description: "Source values for complex fields are decoded through shared complex-value handlers."
    location: pydantic_settings/sources/base.py

core_modules:
  settings_runtime:
    path: pydantic_settings/main.py
    description: "BaseSettings lifecycle, source initialization, and merge algorithm."
    submodules:
      - pydantic_settings/exceptions.py
      - pydantic_settings/utils.py
  source_contracts:
    path: pydantic_settings/sources/base.py
    description: "Source abstractions and reusable file-loading helper mixins."
  provider_implementations:
    path: pydantic_settings/sources/providers
    description: "Concrete providers for environment, dotenv, CLI, secrets, and config files."
    submodules:
      - pydantic_settings/sources/providers/env.py
      - pydantic_settings/sources/providers/cli.py
      - pydantic_settings/sources/providers/dotenv.py
      - pydantic_settings/sources/providers/toml.py
      - pydantic_settings/sources/providers/yaml.py
      - pydantic_settings/sources/providers/pyproject.py

key_features:
  - feature: "Environment-first settings loading"
    description: "Supports env variable parsing with prefix and nesting controls."
  - feature: "Configurable source ordering"
    description: "Applications can override source precedence through a class-level hook."
  - feature: "CLI-backed settings parsing"
    description: "Settings models can be materialized from CLI arguments via CliSettingsSource and CliApp."
  - feature: "Config-file providers"
    description: "JSON, TOML, YAML, dotenv, and pyproject providers are available as first-class sources."
  - feature: "Cloud secret providers"
    description: "Optional adapters integrate AWS Secrets Manager, Azure Key Vault, and Google Secret Manager."

key_files:
  - path: pyproject.toml
    description: "Package metadata, optional provider extras, and test/lint configuration."
  - path: Makefile
    description: "Canonical install, lint, type-check, and test targets."
  - path: pydantic_settings/__init__.py
    description: "Top-level exports for BaseSettings, CliApp, and provider classes."
  - path: pydantic_settings/main.py
    description: "BaseSettings implementation and source merge flow."
  - path: pydantic_settings/sources/base.py
    description: "Source abstractions and shared value preparation logic."
  - path: pydantic_settings/sources/providers/cli.py
    description: "CLI source implementation and parser integration logic."

configuration:
  - name: model_settings_config
    options:
      - key: case_sensitive
        description: "Controls case sensitivity when matching environment and CLI variable names."
      - key: env_prefix
        description: "Prefix prepended to environment variable names for settings lookup."
      - key: env_file
        description: "Path or paths for dotenv files used by DotEnvSettingsSource."
      - key: env_nested_delimiter
        description: "Delimiter used to map environment variables into nested fields."
      - key: env_parse_none_str
        description: "String token interpreted as None during env parsing."
      - key: env_parse_enums
        description: "Toggle for enum-name to enum-value parsing."
      - key: secrets_dir
        description: "Directory path for file-based secret loading."
      - key: cli_parse_args
        description: "Enables or supplies CLI argument parsing input."
      - key: cli_implicit_flags
        description: "Controls implicit boolean CLI flag generation mode."
      - key: cli_kebab_case
        description: "Controls kebab-case conversion for CLI argument names."
      - key: toml_file
        description: "Path to TOML configuration source."
      - key: yaml_file
        description: "Path to YAML configuration source."
      - key: pyproject_toml_depth
        description: "Search depth for locating pyproject.toml configuration source."
      - key: enable_decoding
        description: "Toggle for automatic decoding of complex serialized values."
  - name: package_optional_extras
    options:
      - key: yaml
        description: "Installs PyYAML-backed YAML provider support."
      - key: toml
        description: "Installs TOML parsing support for Python runtimes requiring tomli."
      - key: aws-secrets-manager
        description: "Installs boto3 integrations for AWS provider source."
      - key: azure-key-vault
        description: "Installs Azure Key Vault integration dependencies."
      - key: gcp-secret-manager
        description: "Installs Google Secret Manager integration dependency."

testing:
  framework: pytest
  structure: "Tests are centralized under tests/ and exercised through coverage-enabled pytest runs."
  coverage_areas:
    - "Source ordering and merge precedence behavior"
    - "CLI parsing and argument mapping"
    - "Environment and dotenv parsing"
    - "Provider integrations for file and secrets sources"
  test_patterns:
    - "uv run coverage run -m pytest --durations=10"
    - "uv run mypy pydantic_settings"

integrations:
  runtime:
    - pydantic
    - python-dotenv
    - typing-inspection
  provider_extras:
    - boto3
    - azure-keyvault-secrets
    - azure-identity
    - google-cloud-secret-manager

quick_reference:
  - topic: "Install all extras and dev groups"
    command: "make install"
  - topic: "Run lint checks"
    command: "make lint"
  - topic: "Run mypy checks"
    command: "make mypy"
  - topic: "Run coverage test suite"
    command: "make testcov"

commands:
  - name: "make install"
    description: "Install dependencies, extras, and dependency groups via uv."
    usage: "make install"
  - name: "make lint"
    description: "Run ruff lint and formatting checks."
    usage: "make lint"
  - name: "make mypy"
    description: "Run strict type checking for package sources."
    usage: "make mypy"
  - name: "make test"
    description: "Run pytest suite with coverage instrumentation."
    usage: "make test"

api_surface:
  public_functions:
    - name: BaseSettings
      purpose: "Base class for settings models composed from multiple sources."
      signature: "class BaseSettings"
      location: pydantic_settings/main.py
    - name: settings_customise_sources
      purpose: "Override source ordering and inclusion for settings resolution."
      signature: "@classmethod def settings_customise_sources(...)"
      location: pydantic_settings/main.py
    - name: SettingsConfigDict
      purpose: "Typed config dictionary for environment, CLI, file, and secret behavior."
      signature: "class SettingsConfigDict"
      location: pydantic_settings/main.py
    - name: CliApp
      purpose: "CLI-oriented helper for running settings-backed command patterns."
      signature: "class CliApp"
      location: pydantic_settings/main.py
    - name: get_subcommand
      purpose: "Resolve the selected CLI subcommand from settings models."
      signature: "def get_subcommand(...)"
      location: pydantic_settings/sources/base.py
