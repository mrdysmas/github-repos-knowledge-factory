architecture:
  module_breakdown:
  - module: tmux.c
    responsibility: CLI entrypoint, argument parsing, socket label/path resolution, and bootstrap into client/server mode.
    key_files:
    - tmux.c
  - module: server.c
    responsibility: Long-running server process, accepts AF_UNIX client connections, manages global session/window lifecycle.
    key_files:
    - server.c
  - module: client.c
    responsibility: Client connection/retry logic, startup handshake, and per-client exit handling.
    key_files:
    - client.c
  - module: window.c
    responsibility: Core window and pane data structures, pane IO buffering, and window/pane indexing.
    key_files:
    - window.c
  - module: cmd-*.c
    responsibility: Command implementations invoked through command parsing tables.
    key_files:
    - cmd-new-session.c
    - cmd-split-window.c
    - cmd-attach-session.c
  - module: input.c
    responsibility: Escape-sequence parser feeding screen model updates.
    key_files:
    - input.c
  - module: options.c
    responsibility: Hierarchical option system for server, session, window, and pane scopes.
    key_files:
    - options.c
  components:
  - name: server runtime
    description: Maintains sessions, windows, panes, key tables, and message log while clients attach/detach.
  - name: client runtime
    description: Connects to server socket, forwards terminal input, and renders server updates.
  - name: pane screen model
    description: Each pane has a virtual screen and buffers that persist state across redraws and reattachment.
  data_flow: |
    1. tmux parses CLI options in tmux.c and computes socket/config paths.
    2. Client path in client.c connects to an existing server over AF_UNIX.
    3. If needed, a server is forked (server_start) and a socket listener is created in server.c.
    4. Commands are parsed and dispatched to cmd-*.c handlers.
    5. Pane output is parsed (input.c) into screen state (window.c) and rendered to attached clients.
  key_abstractions:
  - name: session / window / pane model
    purpose: Hierarchical terminal workspace model across multiple clients.
  - name: tmux socket endpoint
    purpose: Local IPC channel between clients and the server.
  - name: key tables and command dispatcher
    purpose: Routes keyboard/mouse events into command handlers.
key_features:
- Client-server architecture with shared sessions for multiple attached clients.
- Scriptable command surface and key bindings via command tables.
- Pane/window/session model with persistent virtual screen state.
- Extensive interactive and non-interactive CLI control through tmux.1 command set.
- Control mode support for external tools and machine-driven interaction.
implementation_patterns:
- pattern: Client/Server split over AF_UNIX
  description: Client retries connection and can trigger server startup with lock-file coordination.
  location: client.c
  file: client.c
- pattern: Event-driven server loop
  description: Server uses event callbacks for accept, child/signal handling, and periodic tidy operations.
  location: server.c
  file: server.c
- pattern: RB-tree and queue-based state indexes
  description: Global windows, panes, and winlinks are tracked with balanced trees and queues for fast lookup.
  location: window.c
  file: window.c
- pattern: Configurable option hierarchy
  description: Defaults and scoped options (global/session/window/pane) are resolved through options APIs.
  location: options.c
  file: options.c
configuration:
  options:
  - key: default-shell
    default: '$SHELL or passwd shell'
    description: Shell used for commands/panes when launching new sessions.
  - key: default-command
    default: shell startup command
    description: Optional command override for new panes/windows.
  - key: history-limit
    default: implementation default
    description: Scrollback line count per pane.
  - key: mouse
    default: off
    description: Enables mouse event capture and mouse key bindings.
  - key: prefix
    default: C-b
    description: Primary prefix key for command table activation.
  - key: prefix2
    default: none
    description: Optional secondary prefix key.
  - key: status
    default: on
    description: Controls visibility/size of status line.
  - key: status-style
    default: implementation default
    description: Styling for status line.
environment:
- name: TMUX
  description: Set in client shells to indicate active tmux session/socket metadata.
- name: TMUX_TMPDIR
  description: Influences socket base path selection.
cli_arguments:
- flag: -2
  description: Force 256-color terminal mode.
- flag: -C
  description: Start in control mode for programmatic integration.
- flag: -c
  description: Provide a shell command to execute at startup.
- flag: -f
  description: Specify alternate configuration file.
- flag: -L
  description: Set socket name.
- flag: -S
  description: Set full socket path.
- flag: -T
  description: Set terminal features list.
- flag: -u
  description: Force UTF-8 output handling.
- flag: -V
  description: Print version.
- flag: -v
  description: Increase verbosity/debug output.
cli_commands:
- command: tmux new-session
  description: Create a new session.
- command: tmux attach-session
  description: Attach client to an existing session.
- command: tmux split-window
  description: Split current pane.
- command: tmux source-file ~/.tmux.conf
  description: Reload configuration from file.
api_surface:
  public_functions:
  - name: server_start
    purpose: Fork and initialize tmux server process.
    location: server.c
  - name: server_create_socket
    purpose: Create and bind tmux AF_UNIX socket endpoint.
    location: server.c
  - name: client_connect
    purpose: Connect client to server and coordinate server startup retries.
    location: client.c
  - name: winlink_add
    purpose: Add indexed window link into session tree.
    location: window.c
testing:
  framework: C test/build checks through make targets plus manual command-level validation from tmux.1 workflows.
  key_test_files:
  - regress/
  - make check target
  coverage_areas:
  - command dispatch behavior
  - pane/window/session lifecycle correctness
  - terminal IO and rendering edge cases
key_files:
- path: tmux.c
  description: Main executable entrypoint and global startup path.
- path: server.c
  description: Server runtime and listener loop.
- path: client.c
  description: Client connection logic and exit handling.
- path: window.c
  description: Window/pane model and IO buffering.
- path: options.c
  description: Option storage and scope resolution.
- path: input.c
  description: Terminal escape parsing.
- path: tmux.1
  description: Canonical command/options/configuration reference.
- path: ~/.tmux.conf
  description: User configuration file consumed at startup.
core_modules:
  entrypoint:
    path: tmux.c
    description: Option parsing and bootstrap.
  server_runtime:
    path: server.c
    description: Event loop, accept, and lifecycle management.
  client_runtime:
    path: client.c
    description: Connection management and interactive client behavior.
  window_model:
    path: window.c
    description: In-memory model for windows, panes, and links.
  command_handlers:
    path: cmd-*.c
    description: Concrete command implementations.
