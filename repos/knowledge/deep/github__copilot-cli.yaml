name: copilot-cli
node_id: repo::github/copilot-cli
github_full_name: github/copilot-cli
html_url: https://github.com/github/copilot-cli
source: remote_metadata
directory: remote::github/copilot-cli
category: agent_cli
provenance:
  shard: repos
  source_file: repos/knowledge/deep/github__copilot-cli.yaml
  as_of: "2026-03-19"
  sourcing_method: training_knowledge
  extraction_model: claude-sonnet-4-6
  extraction_agent: codex

architecture:
  overview: |
    GitHub Copilot CLI is a closed-source terminal AI agent distributed as prebuilt binaries.
    The public repository contains only documentation (README.md, changelog.md),
    an install script (install.sh), and license information. The actual agent binary
    is downloaded from GitHub Releases as a platform-specific tarball.
  distribution_model: |
    Binaries are built and released via GitHub Releases. The install script downloads
    the correct binary for the user's platform (darwin/linux) and architecture (x64/arm64),
    validates SHA256 checksums, and places the binary in PREFIX/bin/.

key_features:
  - "Terminal-native AI agent: build, edit, debug, and refactor code via natural language"
  - "GitHub integration: access repos, issues, PRs authenticated via GitHub account"
  - "MCP-powered extensibility: ships with GitHub MCP server, supports custom MCP servers"
  - "Full control: preview every action before execution"
  - "Multi-model support: Claude Sonnet 4.5 (default), Claude Sonnet 4, GPT-5 via /model command"
  - "LSP integration: configurable language server support for code intelligence"
  - "Experimental autopilot mode: agent continues working until task completion (Shift+Tab)"
  - "Cross-platform: macOS, Linux, Windows (via winget)"
  - "Plugin system: .claude-plugin/plugin.json discovery, marketplace manifests"
  - "Sub-agent support: task dispatching with human-readable IDs"

key_files:
  - path: install.sh
    purpose: Cross-platform install script - detects OS/arch, downloads binary, validates checksum
  - path: README.md
    purpose: Documentation covering installation, authentication, LSP config, usage
  - path: changelog.md
    purpose: Version history with detailed feature and bugfix notes
  - path: LICENSE.md
    purpose: License file

implementation_patterns:
  - pattern: Platform Detection Install
    description: "install.sh uses uname -s for OS (Darwin/Linux) and uname -m for arch (x64/arm64), falls back to winget on Windows"
    location: install.sh
  - pattern: SHA256 Checksum Validation
    description: Downloads SHA256SUMS.txt from releases and validates tarball integrity using sha256sum or shasum
    location: install.sh
  - pattern: Graceful PATH Setup
    description: "Detects shell profile (zsh/bash) and offers to add install dir to PATH if not already present"
    location: install.sh
  - pattern: Token-Based Auth
    description: "Supports GH_TOKEN/GITHUB_TOKEN env vars for both install-time auth and runtime Copilot access"
    location: install.sh, README.md
  - pattern: Fine-Grained PAT
    description: "Authentication via fine-grained Personal Access Token with 'Copilot Requests' permission"
    location: README.md

configuration:
  file: "~/.copilot/lsp-config.json (user-level), .github/lsp.json (repo-level)"
  options:
    - name: lspServers
      type: object
      default: "{}"
      description: "Map of language server configs with command, args, and fileExtensions"
  cli_flags:
    - name: "--banner"
      description: Show animated banner on launch
    - name: "--experimental"
      description: Enable experimental features (autopilot mode)
  slash_commands:
    - name: /login
      description: Authenticate with GitHub
    - name: /model
      description: Choose AI model (Claude Sonnet 4.5, Claude Sonnet 4, GPT-5)
    - name: /experimental
      description: Toggle experimental mode (on/off)
    - name: /feedback
      description: Submit confidential feedback survey
    - name: /lsp
      description: View configured LSP server status
    - name: /help
      description: Display help dialog
    - name: /clear
      description: Clear session
    - name: /pr
      description: Create/view PRs, fix CI, address reviews
    - name: /version
      description: Display version and check for updates
    - name: /extensions
      description: View, enable, and disable CLI extensions
  env_vars:
    - "GH_TOKEN / GITHUB_TOKEN - authentication token (in order of precedence)"
    - "PREFIX - custom install directory (default: /usr/local for root, ~/.local for user)"
    - "VERSION - specific version to install (default: latest)"
    - "COPILOT_CUSTOM_INSTRUCTIONS_DIRS - custom instruction file paths"

cli_arguments:
  install:
    - "curl -fsSL https://gh.io/copilot-install | bash"
    - "brew install copilot-cli"
    - "winget install GitHub.Copilot"
    - "npm install -g @github/copilot"
  run:
    - "copilot - launch interactive session"
    - "copilot help - show usage information"
    - "copilot --banner - show animated banner"
    - "copilot --experimental - enable experimental features"

integrations:
  - name: GitHub MCP Server
    description: Ships built-in for repo, issue, and PR access via natural language
  - name: Custom MCP Servers
    description: User-configurable MCP server extensions
  - name: LSP Servers
    description: "Language server protocol for go-to-definition, hover, diagnostics"
  - name: VS Code Terminal
    description: Integration with VS Code integrated terminal
  - name: Plugin System
    description: ".claude-plugin/plugin.json discovery, marketplace support"

tech_stack:
  distribution: Prebuilt binary (platform-specific tarballs)
  platforms:
    - "macOS (darwin x64/arm64)"
    - "Linux (x64/arm64)"
    - "Windows (via winget or npm)"
  install_methods:
    - "Shell script (curl/wget)"
    - "Homebrew"
    - "winget"
    - "npm (@github/copilot)"

commands:
  - name: "curl -fsSL https://gh.io/copilot-install | bash"
    description: "Install GitHub Copilot CLI on macOS or Linux by downloading and running the official install script."
  - name: "brew install copilot-cli"
    description: "Install GitHub Copilot CLI via Homebrew on macOS."
  - name: copilot
    description: "Launch an interactive Copilot terminal session for natural-language code assistance, editing, debugging, and refactoring."
  - name: "copilot --banner"
    description: "Start an interactive Copilot session with the animated startup banner displayed."
  - name: "copilot --experimental"
    description: "Start an interactive session with experimental features enabled, including autopilot mode (Shift+Tab to trigger)."
  - name: "/login"
    description: "Authenticate with GitHub inside a Copilot session using a Personal Access Token or GitHub OAuth flow."
  - name: "/model"
    description: "Switch the active AI model within a Copilot session (Claude Sonnet 4.5, Claude Sonnet 4, GPT-5)."
  - name: "/pr"
    description: "Create or view pull requests, fix CI failures, and address code review comments from within the session."
  - name: "/version"
    description: "Display the installed Copilot CLI version and check for available updates."

troubleshooting:
  - symptom: "Authentication fails on first launch with 401 Unauthorized"
    cause: "GH_TOKEN or GITHUB_TOKEN is not set, expired, or the token lacks the required Copilot Requests permission"
    fix: "Generate a new fine-grained Personal Access Token with 'Copilot Requests' permission and export it as GH_TOKEN before launching copilot."
  - symptom: "Install script fails with checksum validation error"
    cause: "The downloaded binary tarball does not match the SHA256 checksum in SHA256SUMS.txt, possibly due to a partial download or network corruption"
    fix: "Delete the partial download, verify network connectivity, and re-run the install script."
  - symptom: "copilot binary not found after installation"
    cause: "The install directory (PREFIX/bin) is not in the shell PATH"
    fix: "Follow the post-install PATH setup prompt, or manually add the install directory to PATH in your shell profile (~/.zshrc or ~/.bashrc) and reload the shell."
  - symptom: "MCP server not available inside a Copilot session"
    cause: "Custom MCP server config is missing or the server process failed to start before the session"
    fix: "Confirm the MCP server entry is correctly defined in the Copilot configuration and the server process is reachable, then restart the Copilot session."
  - symptom: "Rate limit error during long coding sessions"
    cause: "Exceeded the per-hour or per-day request quota for the GitHub Copilot subscription tier"
    fix: "Wait for the quota window to reset, reduce request frequency, or upgrade the subscription tier."
