# Inherited from shallow file
summary: |
  A reverse-proxy/tunneling client for Node.js and browsers that exposes local webservers
  as public URLs via hsync-server, with peer-to-peer TCP tunneling via WebRTC for direct
  client-to-client connections without server intermediary.

# Deep additions
architecture:
  module_breakdown:
    - module: hsync.js / hsync-web.js
      responsibility: Main exports for Node.js and browser environments
      key_files: [hsync.js, hsync-web.js]
    - module: connection.js
      responsibility: Core createHsync() factory orchestrating MQTT, peers, listeners, relays
      key_files: [connection.js]
    - module: cli.js / shell.js
      responsibility: CLI and interactive shell interfaces with Commander
      key_files: [cli.js, shell.js]
    - module: lib/peers.js
      responsibility: WebRTC peer management, RPC method handling via rawr library
      key_files: [lib/peers.js]
    - module: lib/web-handler.js
      responsibility: HTTP proxy with WebSocket support for web request tunneling
      key_files: [lib/web-handler.js]
    - module: lib/socket-listeners.js
      responsibility: Accepts local connections, forwards to remote targets
      key_files: [lib/socket-listeners.js]
    - module: lib/socket-relays.js
      responsibility: Accepts remote requests, connects to local TCP sockets
      key_files: [lib/socket-relays.js]
  data_flow: |
    1. Client connects to hsync-server via MQTT over WebSocket
    2. Server assigns hostname, client subscribes to MQTT topics
    3. HTTP requests to public URL arrive at server, published to web/{hostname}/* topics
    4. Client receives via MQTT, proxies to local server, responds via MQTT
    5. For P2P: WebRTC data channel established between peers
    6. TCP data flows directly between peers via data channel
  key_abstractions:
    - name: hsyncClient
      purpose: Main client object exposing events, peer access, listener/relay management
    - name: Peer
      purpose: WebRTC-based P2P connection with JSON-RPC methods
    - name: WebHandler
      purpose: HTTP request proxy from MQTT messages to local server
    - name: SocketListener/Relay
      purpose: TCP port forwarding in both directions

implementation_patterns:
  - pattern: Dependency Injection
    description: setNet(), setMqtt(), setRTC() allow swapping implementations
    location: connection.js:19-27
  - pattern: Factory Pattern
    description: createHsync(config) creates and wires all components
    location: connection.js:29-319
  - pattern: Event-Driven Architecture
    description: EventEmitter for connected, json, external_message, connect_error events
    location: connection.js:86-91
  - pattern: Strategy Pattern for RTC
    description: WebRTC uses native API in browser (rtc-web.js), node-datachannel in Node.js (rtc-node.js)
    location: lib/rtc-web.js
  - pattern: Access Control Lists
    description: Whitelist/blacklist with wildcard matching for relay security
    location: lib/socket-relays.js:35-57

