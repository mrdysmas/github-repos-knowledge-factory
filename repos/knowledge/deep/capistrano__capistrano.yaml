architecture:
  module_breakdown:
  - module: bin/cap
    responsibility: Executable shim that boots Capistrano application.
    key_files:
    - bin/cap
  - module: lib/capistrano/application.rb
    responsibility: Custom Rake application, CLI option handling, and stage/task routing.
    key_files:
    - lib/capistrano/application.rb
  - module: lib/capistrano/configuration.rb
    responsibility: Central configuration store, server role registry, backend setup, and plugin installation.
    key_files:
    - lib/capistrano/configuration.rb
  - module: lib/capistrano/dsl.rb
    responsibility: End-user DSL surface (on, invoke, task helpers, filters).
    key_files:
    - lib/capistrano/dsl.rb
  - module: lib/capistrano/tasks/deploy.rake
    responsibility: Core deployment workflow tasks (check, symlink, cleanup, rollback hooks).
    key_files:
    - lib/capistrano/tasks/deploy.rake
  - module: lib/capistrano/scm/*.rb
    responsibility: SCM adapters and resolver logic (git, svn, hg).
    key_files:
    - lib/capistrano/scm/git.rb
    - lib/capistrano/scm_resolver.rb
  components:
  - name: stage-aware task execution
    description: Top-level tasks are automatically prefixed with selected deployment stage.
  - name: role/host filter pipeline
    description: Command-line and config filters limit execution to selected hosts/roles.
  - name: plugin installer
    description: Plugins register defaults, hooks, and tasks into deployment lifecycle.
  data_flow: |
    1. cap starts Capistrano::Application (Rake subclass).
    2. CLI options and top-level task are parsed; stage is inferred and prepended.
    3. Defaults and stage config files are loaded from Capfile/deploy.rb/stage files.
    4. Backend (SSHKit) and SCM plugin are configured.
    5. Deployment tasks run across filtered hosts/roles.
  key_abstractions:
  - name: Capistrano::Configuration
    purpose: Single source of runtime variables, servers, backend, and filters.
  - name: Capistrano::DSL
    purpose: Task authoring helpers and execution model over remote hosts.
  - name: Capistrano::Plugin
    purpose: Extensibility contract for defaults/hooks/tasks.
key_features:
- Stage-based deployments (production, staging, etc.) with per-stage config files.
- Parallel SSH task execution via SSHKit coordinators.
- Role and host filtering from CLI and config.
- Plugin system for SCM and deployment ecosystem extensions.
- Built-in dry-run and config-variable inspection modes.
