      └───────────────────────────────────┴────────────────────────┘

  - topic: SamplingParams Quick Reference
    content: |
      SamplingParams(
          n=1,                    # Number of outputs
          temperature=1.0,        # 0 = greedy, 1 = normal
          top_p=1.0,              # Nucleus sampling
          top_k=0,                # 0 = disabled
          min_p=0.0,              # Min probability
          max_tokens=16,          # Max generation length
          min_tokens=0,           # Min before EOS
          stop=["\n"],            # Stop sequences
          stop_token_ids=[1,2],   # Stop token IDs
          presence_penalty=0.0,   # -2 to 2
          frequency_penalty=0.0,  # -2 to 2
          repetition_penalty=1.0, # >1 = less repeat
          logprobs=None,          # Return top N logprobs
          seed=42,                # Reproducibility
      )

  - topic: LLM Methods
    content: |
      ┌───────────────────────┬─────────────────────────────────────┐
      │ Method                │ Purpose                             │
      ├───────────────────────┼─────────────────────────────────────┤
      │ llm.generate()        │ Text completion                     │
      │ llm.chat()            │ Chat with messages                  │
      │ llm.embed()           │ Generate embeddings                 │
      │ llm.encode()          │ Embeddings with PoolingParams       │
      │ llm.classify()        │ Classification                      │
      │ llm.score(a, b)       │ Similarity scoring                  │
      └───────────────────────┴─────────────────────────────────────┘
