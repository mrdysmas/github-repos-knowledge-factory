      │ --tensor-parallel-size            │ 1                      │
      │ --gpu-memory-utilization          │ 0.9                    │
      │ --max-model-len                   │ auto                   │
      │ --dtype                           │ auto                   │
      │ --quantization                    │ None                   │
      │ --kv-cache-dtype                  │ auto                   │
