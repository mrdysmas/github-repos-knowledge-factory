name: nebula
node_id: repo::slackhq/nebula
github_full_name: slackhq/nebula
html_url: https://github.com/slackhq/nebula
source: ssh_repos
provenance:
  shard: ssh_repos
  source_file: ssh_repos/knowledge/deep/nebula.yaml
  as_of: '2026-02-25'
directory: nebula-master
category: vpn_mesh

# Inherited from shallow file
summary: |
  Slack's open-source scalable overlay networking tool that creates secure, encrypted mesh VPNs.
  Uses Noise Protocol Framework for mutual authentication, lighthouses for peer discovery,
  and certificate-based identity with built-in security groups for fine-grained traffic control.

# Deep additions
architecture:
  module_breakdown:
    - module: interface.go
      responsibility: Core networking engine - routes packets between TUN and UDP
      key_files: [interface.go]
    - module: lighthouse.go
      responsibility: Peer discovery service, address caching, NAT hole punching
      key_files: [lighthouse.go]
    - module: firewall.go
      responsibility: Stateful packet filtering with conntrack support
      key_files: [firewall.go]
    - module: handshake_manager.go
      responsibility: Connection establishment, IX-PSK0 handshake, retry logic
      key_files: [handshake_manager.go]
    - module: hostmap.go
      responsibility: Maintains active tunnel state and peer information
      key_files: [hostmap.go]
    - module: cert/
      responsibility: X.509-style certificates (v1 protobuf, v2 ASN.1), PKI
      key_files: [cert/cert.go]
    - module: config/
      responsibility: YAML configuration loading with hot-reload
      key_files: [config/config.go]
    - module: cmd/nebula/
      responsibility: Main CLI entry point
      key_files: [cmd/nebula/main.go]
    - module: cmd/nebula-cert/
      responsibility: Certificate utility (ca, keygen, sign, verify)
      key_files: [cmd/nebula-cert/main.go]
  data_flow: |
    1. TUN Interface → Interface.listenIn() → firewall.Drop() → handshake/relay logic
    2. UDP Socket → Interface.listenOut() → decrypt/verify → firewall.Drop() → TUN Interface
    3. Lighthouse provides peer discovery for connection establishment
    4. HandshakeManager handles IX-PSK0 protocol for secure tunnel setup
  key_abstractions:
    - name: Interface
      purpose: Main networking engine bridging TUN device and UDP transport
    - name: LightHouse
      purpose: Distributed peer discovery system (client or server mode)
    - name: Firewall
      purpose: Stateful packet filtering with certificate-based auth
    - name: HandshakeManager
      purpose: Connection establishment and handshake retry management
    - name: HostMap
      purpose: Active tunnel state and peer information

implementation_patterns:
  - pattern: Actor Model
    description: Each peer managed as independent actor in HostMap with message passing
    location: hostmap.go
  - pattern: Connection Pooling
    description: Connection tracking in firewall, tunnel promotion to preferred addresses
    location: firewall.go
  - pattern: Zero Trust Architecture
    description: All packets verified through certificate validation, firewall on all traffic
    location: firewall.go
  - pattern: Adaptive Timeout Management
    description: Protocol-specific timeouts, exponential backoff for handshakes
    location: handshake_manager.go
  - pattern: Hot-Reload Configuration
    description: SIGHUP triggers config reload with change detection callbacks
    location: config/config.go:123-164

configuration:
  file: config.yml (YAML)
  options:
    - name: pki.ca
      type: string
      default: required
      description: Path to CA certificate
    - name: pki.cert
      type: string
      default: required
      description: Path to node certificate
    - name: pki.key
      type: string
      default: required
      description: Path to node private key
    - name: lighthouse.am_lighthouse
      type: bool
      default: false
      description: Run as lighthouse (discovery server)
    - name: lighthouse.hosts
      type: map
      default: {}
      description: Static lighthouse host mappings
    - name: listen.host
      type: string
      default: "0.0.0.0"
      description: UDP listen address
    - name: listen.port
      type: int
      default: 4242
      description: UDP listen port
    - name: tun.dev
      type: string
      default: "nebula1"
      description: TUN device name
    - name: firewall.outbound
      type: array
      default: []
      description: Outbound firewall rules
    - name: firewall.inbound
      type: array
      default: []
      description: Inbound firewall rules
    - name: relay.am_relay
      type: bool
      default: false
      description: Act as relay node
    - name: stats.type
      type: string
      default: ""
      description: Stats export type (prometheus, graphite)

api_surface:
  public_functions:
    - name: NewInterface
      signature: func NewInterface(ctx context.Context, config *Config, l *logrus.Logger) (*Interface, error)
      purpose: Create and configure the network interface
      location: interface.go:148
    - name: Interface.Run
      signature: func (f *Interface) Run(ctx context.Context) error
      purpose: Start packet processing goroutines
      location: interface.go
    - name: LightHouse.Query
      signature: func (lh *LightHouse) Query(vpnIp netip.Addr) ([]netip.AddrPort, error)
      purpose: Request peer addresses from lighthouse
      location: lighthouse.go
    - name: Firewall.Drop
      signature: func (f *Firewall) Drop(p packet.Packet, c *cert.Certificate, incoming bool) bool
      purpose: Main packet filtering decision
      location: firewall.go
    - name: cert.UnmarshalCertificate
      signature: func UnmarshalCertificate(b []byte) (Certificate, error)
      purpose: Parse certificate from bytes
      location: cert/cert.go
  binaries:
    - name: nebula
      purpose: VPN daemon
    - name: nebula-cert
      purpose: Certificate management (ca, keygen, sign, print, verify)
    - name: nebula-service
      purpose: OS service wrapper for system daemon

testing:
  framework: Go testing
  structure: "*_test.go files, test/ helpers, e2e/ suite"
  coverage_areas:
    - Firewall rule evaluation and conntrack
    - Handshake lifecycle and retries
    - Lighthouse discovery
    - HostMap peer state management
    - Certificate validation
    - Relay functionality
    - TUN device interaction

extension_points:
  - location: firewall.go
    hook: FirewallInterface
    example: Custom protocol support, extended rule types
  - location: handshake_manager.go
    hook: HandleIncoming
    example: Custom handshake protocols, new packet types
  - location: udp.Conn
    hook: UDP transport interface
    example: Replace with QUIC, WebSockets
  - location: cert/cert.go
    hook: CAPool
    example: Custom certificate validation, external CA integration
  - location: MessageMetrics
    hook: Metrics interface
    example: Custom metrics collection, observability integration

notes: |
  - Uses Noise Protocol Framework (flynn/noise) for handshakes
  - Supports both Curve25519 (default) and P256 for certificates
  - Certificate v1 uses protobuf, v2 uses ASN.1
  - Security groups enable cloud-style firewall rules without provider lock-in
  - Built-in Prometheus metrics support
