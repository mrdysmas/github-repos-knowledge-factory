# nexa_sdk Deep Knowledge
# Source: nexa-sdk-main
# Updated: 2026-02-22

name: nexa_sdk
node_id: repo::nexaai/nexa-sdk
github_full_name: nexaai/nexa-sdk
html_url: https://github.com/nexaai/nexa-sdk
source: repos
provenance:
  shard: repos
  source_file: repos/knowledge/deep/nexa_sdk.yaml
  as_of: '2026-02-25'
  sourcing_method: code_verified
  extraction_model: glm-5
  extraction_agent: kgraph-repos
description: On-device AI SDK with NPU acceleration
primary_language: Go
languages: [Go, Python]

architecture:
  pattern: Cross-platform SDK with NPU acceleration
  type: On-device inference SDK
  server: Gin-based REST API
  entry_point: nexa

  components:
    nexa-cli:
      path: runner/nexa-cli/
      description: CLI entry point
    server:
      path: runner/server/
      description: REST API server (port 18181)
    python_bindings:
      path: bindings/python/
      description: Python SDK for all model types

python_bindings:
  llm.py:
    description: Large Language Models
  vlm.py:
    description: Vision Language Models
  asr.py:
    description: Automatic Speech Recognition
  tts.py:
    description: Text-to-Speech
  image_gen.py:
    description: Image generation
  embedder.py:
    description: Text embeddings

cli_commands:
  pull:
    command: nexa pull <model>[:<quant>]
    description: Download model (optional quantization)
  infer:
    command: nexa infer <model>
    description: Run inference interactively
  serve:
    command: nexa serve
    description: Start API server
  config_license:
    command: nexa config set license '<token>'
    description: Set license token

model_types:
  - LLM
  - VLM
  - ASR
  - TTS
  - Image Gen
  - Embedding
  - Rerank
  - OCR

npu_support:
  qualcomm:
    description: Qualcomm Hexagon NPU (Snapdragon X Elite)
  apple:
    description: Apple Neural Engine
  amd:
    description: AMD NPU
  intel:
    description: Intel NPU

environment:
  NEXA_HOST:
    default: 127.0.0.1:18181
    description: Server host:port
  NEXA_HFTOKEN:
    description: Hugging Face token for model access
  NEXA_LOG:
    default: info
    description: Log level (debug, info, warn, error)

ports:
  api: 18181

sdk_example:
  python: |
    from nexaai import LLM, GenerationConfig, ModelConfig
    llm = LLM.from_(model="NexaAI/Qwen3-0.6B-GGUF", config=ModelConfig())
    for token in llm.generate_stream(prompt, GenerationConfig(max_tokens=100)):
        print(token, end="")

key_features:
  - On-device inference (privacy-first)
  - NPU acceleration for mobile/desktop
  - Multi-modal model support
  - GGUF quantization support
  - OpenAI-compatible API

related_repos:
  - ollama
  - vllm
  - lmdeploy
