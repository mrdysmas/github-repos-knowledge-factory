  - path: gitnexus/src/mcp/tools.ts
    purpose: "Canonical MCP tool definitions."
  - path: gitnexus/src/mcp/resources.ts
    purpose: "Canonical MCP resource templates and resource readers."
  - path: gitnexus/src/mcp/server.ts
    purpose: "Stdio MCP server wiring and prompt registration."
  - path: gitnexus/src/server/api.ts
    purpose: "HTTP API and MCP-over-HTTP bridge."
  - path: gitnexus/src/storage/repo-manager.ts
