name: lmdeploy
node_id: repo::internlm/lmdeploy
github_full_name: internlm/lmdeploy
html_url: https://github.com/internlm/lmdeploy
source: remote_metadata
provenance:
  shard: repos
  source_file: repos/knowledge/deep/lmdeploy.yaml
  as_of: '2026-03-18'
  sourcing_method: code_verified
  extraction_model: glm-5
  extraction_agent: kgraph-repos
type: inference_deployment
description: LMDeploy - High-performance LLM inference and deployment toolkit

architecture:
  backends:
    turbomind:
      description: High-performance inference backend
      features:
        - Custom CUDA kernels
        - Paged Attention
        - Tensor parallelism
        - Continuous batching
        - KV cache optimization
      use_case: Production deployments requiring maximum throughput

    pytorch:
      description: Pure Python backend
      features:
        - Easier development and debugging
        - CUDA graph optimization
        - Flexible model support
      use_case: Development and models not supported by TurboMind

  pipeline:
    description: Unified inference interface
    components:
      - Tokenizer
      - Engine (TurboMind or PyTorch)
      - Response generator

cli_commands:
  chat:
    command: "lmdeploy chat <model_path>"
    description: Interactive chat with model
    options:
      - "--backend [turbomind|pytorch]"
      - "--tp <n>  # Tensor parallelism"

  serve:
    command: "lmdeploy serve api_server <model_path>"
    description: Start OpenAI-compatible API server
    options:
      - "--server-name <host>"
      - "--server-port <port>"
      - "--backend <backend>"
    endpoints:
      - "/v1/chat/completions"
      - "/v1/completions"
      - "/v1/models"

  convert:
    command: "lmdeploy convert <model_path>"
    description: Convert model to TurboMind format
    options:
      - "--model-format [hf|llama|qwen]"

  quantize:
    awq: "lmdeploy lite auto_awq <model>"
    gptq: "lmdeploy lite auto_gptq <model>"
    description: Weight quantization for reduced memory

  check:
    command: "lmdeploy check_env"
    description: Verify environment and dependencies

environment_variables:
  - name: LMDEPLOY_TARGET_DEVICE
    default: cuda
    description: Target device (cuda, ascend)

  - name: CUDA_VISIBLE_DEVICES
    description: GPU device selection

  - name: TM_LOG_LEVEL
    default: INFO
    description: TurboMind log level (DEBUG, INFO, WARNING, ERROR)

  - name: LMDEPLOY_USE_MODELSCOPE
    default: "false"
    description: Enable ModelScope model loading

python_api:
  basic_usage: |
    import lmdeploy
    pipe = lmdeploy.pipeline('model_path')
    response = pipe(['Hello, how are you?'])
    print(response)

  with_config: |
    from lmdeploy import TurbomindEngineConfig, PipelineConfig

    backend_config = TurbomindEngineConfig(
        session_len=8192,
        tp=2,  # tensor parallelism
        model_name='llama2'
    )
    pipe = lmdeploy.pipeline('model_path',
        backend_config=backend_config
    )

  streaming: |
    for item in pipe.stream_infer(['Tell me a story']):
        print(item.text, end='', flush=True)

  pytorch_backend: |
    from lmdeploy import PytorchEngineConfig
    backend_config = PytorchEngineConfig(session_len=4096)
    pipe = lmdeploy.pipeline('model_path',
        backend_config=backend_config
    )

key_modules:
  - path: lmdeploy/api.py
    description: Main API entry point, pipeline creation

  - path: lmdeploy/turbomind/
    description: TurboMind backend implementation
    components:
      - turbomind.py: Engine wrapper
      - deploy/: Model conversion
      - chat/: Chat formatting

  - path: lmdeploy/pytorch/
    description: PyTorch backend implementation
    components:
      - engine.py: PyTorch engine
      - config.py: Configuration

  - path: lmdeploy/serve/
    description: Serving infrastructure
    components:
      - openai/: OpenAI-compatible API server
      - gradio/: Gradio UI server
      - proxy_client/: Proxy client for distributed serving

  - path: lmdeploy/lite/
    description: Quantization and optimization tools
    components:
      - quantization/: AWQ, GPTQ quantization
      - calibration/: Calibration datasets

  - path: lmdeploy/utils/
    description: Utility functions

configuration:
  turbomind_engine:
    session_len: 2048  # Context length
    tp: 1  # Tensor parallelism degree
    weight_type: fp16  # Weight precision
    model_name:       # Auto-detected

  pytorch_engine:
    session_len: 4096
    max_batch_size: 128
    thread_safe: false

supported_models:
  - LLaMA 2/3
  - Qwen series
  - ChatGLM series
  - Baichuan
  - InternLM
  - Mistral
  - Yi
  - DeepSeek
  - Most HuggingFace models

quantization_formats:
  - AWQ (4-bit)
  - GPTQ (4-bit)
  - FP8
  - INT4/INT8

performance_optimizations:
  - Paged Attention for efficient KV cache
  - Continuous batching for higher throughput
  - Tensor parallelism for multi-GPU
  - CUDA graphs for reduced kernel launch overhead
  - Quantization for memory efficiency

deployment_patterns:
  single_gpu:
    command: "lmdeploy serve api_server model_path --server-port 8000"
    use_case: Development, small-scale production

  multi_gpu:
    command: "lmdeploy serve api_server model_path --tp 4"
    use_case: Large models, higher throughput

  kubernetes:
    note: Deploy via container with OpenAI-compatible API
    config: Use standard K8s deployment patterns

notes:
  - Chinese codebase with bilingual documentation
  - TurboMind generally faster but PyTorch more flexible
  - Supports both local and remote model loading
  - OpenAI-compatible API simplifies integration

troubleshooting:
  - symptom: "RuntimeError: [TM][ERROR] CUDA runtime error: out of memory"
    cause: "KV cache allocation ratio is too large for available GPU memory; controlled by TurbomindEngineConfig.cache_max_entry_count"
    fix: "Reduce cache_max_entry_count (e.g. backend_config = TurbomindEngineConfig(cache_max_entry_count=0.2)) or pass --cache-max-entry-count 0.2 on the CLI"

  - symptom: "ModuleNotFoundError: No module named '_turbomind'"
    cause: "TurboMind C++ pybind package not installed, or command is being run from the lmdeploy source root directory which shadows the installed package"
    fix: "Install the precompiled package with 'pip install lmdeploy[all]', then change to a different working directory before running"

  - symptom: "libnccl.so.2 not found at runtime"
    cause: "NCCL library is not on LD_LIBRARY_PATH after pip install; required for multi-GPU tensor parallelism via TurboMind"
    fix: "Run 'pip show nvidia-nccl-cu11 | grep Location' to find the library path, then export LD_LIBRARY_PATH={Location}/nvidia/nccl/lib:$LD_LIBRARY_PATH"

  - symptom: "symbol cudaFreeAsync version libcudart.so.11.0 not defined"
    cause: "CUDA toolkit version below 11.2; LMDeploy runtime requires a minimum of CUDA 11.2"
    fix: "Upgrade CUDA toolkit to 11.2 or later, or install the CUDA 11.8-specific wheel with the cu118 prebuilt package"

  - symptom: "RuntimeError: [enforce fail at inline_container.cc:337] unexpected pos during quantization"
    cause: "Insufficient disk space when saving quantized weights; commonly occurs when quantizing 70B+ models"
    fix: "Free disk space before running quantization; verify available space is at least 2x the model size in float16"

  - symptom: API server image URL fetch hangs or times out during vision-language inference
    cause: "Default fetch timeout for image URLs in the VL pipeline is 10 seconds; slow or unreachable URLs exceed this"
    fix: "Set the LMDEPLOY_FETCH_TIMEOUT environment variable to a higher value in seconds before starting the api_server"
