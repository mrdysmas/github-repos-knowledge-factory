name: Flowise
node_id: repo::flowiseai/flowise
github_full_name: flowiseai/flowise
html_url: https://github.com/FlowiseAI/Flowise
source: remote_metadata
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/deep/flowiseai__flowise.yaml
  as_of: '2026-02-25'
sparse: false

description: Visual LLM workflow and agent builder implemented as a TypeScript monorepo.

tech_stack:
  - Node.js
  - TypeScript
  - React
  - Express
  - pnpm
  - Docker

testing:
  framework: pnpm test and route-level server tests
  structure: monorepo modules for server, ui, components, and agentflow packages
  coverage_areas:
    - prediction endpoints and chatflow execution
    - server route and auth behavior
    - agentflow package behavior
  test_patterns:
    - pnpm test
    - pnpm test:coverage
    - pnpm build
    - route-level v1 API tests in packages/server/test/routes

quick_reference:
  - topic: Quick start
    content: |
      npm install -g flowise
      npx flowise start

  - topic: Developer workflow
    content: |
      pnpm install
      pnpm build
      pnpm dev

  - topic: Public API paths
    content: |
      /api/v1/prediction/{chatflowId}
      /api/v1/chatflows-streaming/{chatflowId}
      /api/v1/public-chatflows
      /api/v1/ping

integrations:
  frameworks:
    - LangChain ecosystem components
    - Third-party node integrations
  deployment_targets:
    - AWS
    - Azure
    - GCP
    - Docker Compose
  api_endpoints:
    - path: /api/v1/prediction/{chatflowId}
      method: POST
      description: run prediction for chatflow or agentflow
    - path: /api/v1/chatflows-streaming/{chatflowId}
      method: POST
      description: streaming response for public chatflows
    - path: /api/v1/public-chatflows
      method: GET
      description: list or retrieve public chatflow metadata

api_structure:
  public_routes:
    - path: /api/v1/prediction/{chatflowId}
      operations:
        - POST
    - path: /api/v1/chatflows-streaming/{chatflowId}
      operations:
        - POST
    - path: /api/v1/public-chatflows
      operations:
        - GET
    - path: /api/v1/public-chatbotConfig/{chatflowId}
      operations:
        - GET
  system_routes:
    - path: /api/v1/ping
      operations:
        - GET
    - path: /api/v1/version
      operations:
        - GET
