  - "opencompass --models hf_internlm2_chat_1_8b --datasets demo_gsm8k_chat_gen"
  - ""
  - "# Evaluation with vLLM"
  - "opencompass --models hf_qwen_7b --datasets mmlu ceval -a vllm"
  - ""
  - "# Run from config file"
  - "opencompass configs/eval_chat_demo.py"
  - ""
  - "# Multi-GPU evaluation"
  - "opencompass --models hf_llama_70b --datasets gsm8k --max-num-worker 4"
