name: server
node_id: "repo::mariadb/server"
github_full_name: "mariadb/server"
html_url: "https://github.com/MariaDB/server"
source: remote_metadata
provenance:
  shard: repos
  source_file: repos/knowledge/deep/server.yaml
  sourcing_method: code_verified
  extraction_model: gpt-5
  extraction_agent: codex
  as_of: "2026-03-17"
directory: "remote::mariadb/server"
category: data_pipelines

architecture:
  module_breakdown:
    - module: "sql/"
      responsibility: "Core server layer for startup, SQL parsing, execution, system variables, binary logging, replication, and plugin orchestration."
      key_files:
        - "sql/mysqld.cc"
        - "sql/sql_parse.cc"
        - "sql/sql_lex.cc"
        - "sql/sql_yacc.yy"
        - "sql/sys_vars.cc"
        - "sql/sql_plugin.cc"
    - module: "storage/"
      responsibility: "Pluggable storage engines that implement the handler interface used by the SQL layer."
      key_files:
        - "storage/innobase/CMakeLists.txt"
        - "storage/myisam/CMakeLists.txt"
        - "storage/blackhole/CMakeLists.txt"
        - "storage/rocksdb/CMakeLists.txt"
        - "storage/maria/"
    - module: "plugin/"
      responsibility: "Loadable server plugins for authentication, auditing, key management, compression providers, metadata helpers, and data types."
      key_files:
        - "plugin/server_audit/CMakeLists.txt"
        - "plugin/auth_pam/CMakeLists.txt"
        - "plugin/aws_key_management/CMakeLists.txt"
        - "plugin/provider_lz4/CMakeLists.txt"
        - "plugin/type_uuid/CMakeLists.txt"
    - module: "client/"
      responsibility: "Client executables and test tools built on top of the client library and shared server utilities."
      key_files:
        - "client/CMakeLists.txt"
        - "client/mysql.cc"
        - "client/mysqldump.cc"
        - "client/mysqladmin.cc"
        - "client/mysqlbinlog.cc"
        - "client/mysqltest.cc"
    - module: "include/"
      responsibility: "Shared headers for the client API, protocol definitions, handler state, and core utility primitives used across the tree."
      key_files:
        - "include/mysql.h"
        - "include/mysql_com.h"
        - "include/my_global.h"
        - "include/maria.h"
        - "include/rpl_gtid_base.h"

  key_abstractions:
    - name: "Handler API"
      purpose: "sql/handler.cc and engine implementations under storage/* split SQL planning/execution from engine-specific row, index, and metadata behavior."
    - name: "Parser_state and LEX"
      purpose: "sql/sql_parse.cc and sql/sql_lex.cc carry statement text through lexical analysis, grammar reduction, and command dispatch."
    - name: "Sys_var registry"
      purpose: "sql/sys_vars.cc declares global and session variables with defaults, range checks, command-line bindings, and update hooks."
    - name: "Replication state objects"
      purpose: "Files such as sql/rpl_mi.h, sql/rpl_rli.h, and sql/rpl_parallel.cc model master info, relay-log state, and worker-thread apply coordination."
    - name: "MYSQL_ADD_PLUGIN build hooks"
      purpose: "CMake macros in storage/* and plugin/* register storage engines and loadable modules without baking every extension into one code path."

  components:
    - name: "Server bootstrap and listener"
      description: "sql/mysqld.cc owns process startup, option handling, listener setup, storage-engine initialization, and scheduler selection."
    - name: "SQL parser and dispatcher"
      description: "sql/CMakeLists.txt generates yy_mariadb.yy and yy_oracle.yy from sql/sql_yacc.yy, sql/sql_lex.cc provides the scanner, and sql/sql_parse.cc dispatches parsed commands."
    - name: "Storage-engine layer"
      description: "storage/ contains engines such as InnoDB, MyISAM, Aria, RocksDB, Spider, ColumnStore, CONNECT, MEMORY, and Blackhole."
    - name: "Replication stack"
      description: "Replication code spans GTID, relay/master metadata, binlog helpers, semisync sources, and optional parallel apply under sql/rpl_* and semisync*.cc."
    - name: "WSREP cluster integration"
      description: "When WITH_WSREP is enabled, sql/CMakeLists.txt builds wsrep plugins and sql/wsrep_*.cc adds provider, applier, SST, status, and cluster-state services."
    - name: "Plugin surface"
      description: "plugin/ builds module-style extensions for server_audit, auth_*, key-management providers, metadata helpers, and custom data types."

  data_flow: |
    Startup begins in sql/mysqld.cc, which initializes defaults, network listeners,
    and storage engines. SQL text is tokenized by sql/sql_lex.cc, reduced by
    grammar generated from sql/sql_yacc.yy, and dispatched in sql/sql_parse.cc
    into command-specific execution paths. Execution reaches engines through the
    handler layer and can emit binlog or relay-log activity through the rpl_*
    subsystem; optional wsrep hooks wrap statement execution when cluster support
    is compiled in.

key_features:
  - feature: "MySQL-compatible server positioning"
    description: "README.md describes MariaDB as a drop-in replacement for MySQL with more features, new storage engines, fewer bugs, and better performance."
  - feature: "Multiple SQL grammar modes"
    description: "sql/CMakeLists.txt generates both yy_mariadb.yy and yy_oracle.yy from sql/sql_yacc.yy, so the parser build supports both MariaDB and Oracle-oriented grammar outputs."
  - feature: "Broad storage-engine portfolio"
    description: "storage/ ships engines and adapters beyond InnoDB and MyISAM, including Aria, RocksDB, Spider, ColumnStore, CONNECT, Mroonga, Blackhole, and FEDERATED variants."
  - feature: "Extensible plugin ecosystem"
    description: "plugin/ exposes authentication plugins, auditing, key-management providers, compression providers, metadata plugins, and custom type plugins as separate modules."
  - feature: "Replication variants in one tree"
    description: "The sql/ build includes GTID, semisync, relay-log, and parallel replication code, while WITH_WSREP enables an additional write-set replication integration path."
  - feature: "Full client and operational tooling"
    description: "client/CMakeLists.txt builds mariadb, mariadb-dump, mariadb-admin, mariadb-binlog, mariadb-import, mariadb-plugin, mariadb-show, mariadb-slap, and mariadb-test."

configuration:
  - key: "autocommit"
    default: "true"
    description: "sql/sys_vars.cc declares autocommit with DEFAULT(TRUE), and sql/mysqld.cc adds the command-line --autocommit option with default 1."
  - key: "max_connections"
    default: "151"
    description: "sql/sys_vars.cc uses DEFAULT(MAX_CONNECTIONS_DEFAULT), and sql/sql_const.h defines MAX_CONNECTIONS_DEFAULT as 151."
  - key: "max_allowed_packet"
    default: "16777216"
    description: "sql/sys_vars.cc sets DEFAULT(16*1024*1024) with a 1024-byte block size."
  - key: "bind_address"
    default: "NULL (unset)"
    description: "sql/sys_vars.cc binds bind_address to my_bind_addr_str with DEFAULT(0), so the server starts without a hardcoded bind address unless configured."
  - key: "port"
    default: "0"
    description: "sql/sys_vars.cc sets port to DEFAULT(0), which defers to my.cnf, MYSQL_TCP_PORT, /etc/services when applicable, or the built-in MYSQL_PORT."
  - key: "socket"
    default: "NULL (unset)"
    description: "sql/sys_vars.cc binds socket to mysqld_unix_port with DEFAULT(0), leaving the Unix socket path unset until option processing resolves it."
  - key: "log_bin"
    default: "false"
    description: "sql/sys_vars.cc exposes log_bin as a read-only variable with DEFAULT(FALSE)."
  - key: "binlog_format"
    default: "MIXED"
    description: "sql/sys_vars.cc declares binlog_format with DEFAULT(BINLOG_FORMAT_MIXED) and validation that interacts with WSREP and flashback modes."
  - key: "read_only"
    default: "OFF"
    description: "sql/sys_vars.cc registers read_only as an enum-valued global with DEFAULT(0), meaning writes are allowed by default."
  - key: "require_secure_transport"
    default: "false"
    description: "sql/sys_vars.cc sets require_secure_transport to DEFAULT(FALSE) and rejects enabling it when no secure transport is available."
  - key: "server_id"
    default: "1"
    description: "sql/sys_vars.cc declares server_id with VALID_RANGE(1, UINT_MAX32) and DEFAULT(1)."
  - key: "local_infile"
    default: "true"
    description: "sql/sys_vars.cc sets local_infile with DEFAULT(TRUE), enabling LOAD DATA LOCAL INFILE unless disabled."
  - key: "thread_cache_size"
    default: "256"
    description: "sql/sys_vars.cc declares DEFAULT(256), and sql/mysqld.cc clamps it down if it exceeds max_connections during startup."
  - key: "sql_mode"
    default: "STRICT_TRANS_TABLES, ERROR_FOR_DIVISION_BY_ZERO, NO_ENGINE_SUBSTITUTION, NO_AUTO_CREATE_USER"
    description: "sql/sys_vars.cc encodes this mode set directly in the DEFAULT(...) expression for sql_mode."
  - key: "character_set_server"
    default: "default_charset_info -> utf8mb4"
    description: "sql/sys_vars.cc defaults character_set_server to default_charset_info; sql/mysqld.cc initializes that from MYSQL_DEFAULT_CHARSET_NAME, and cmake/character_sets.cmake sets DEFAULT_CHARSET to utf8mb4 unless overridden."
  - key: "collation_server"
    default: "compiled_default_collation_name -> utf8mb4_uca1400_ai_ci"
    description: "sql/mysqld.cc initializes compiled_default_collation_name from MYSQL_DEFAULT_COLLATION_NAME, and cmake/character_sets.cmake sets DEFAULT_COLLATION to utf8mb4_uca1400_ai_ci unless overridden."
  - key: "default_storage_engine"
    default: "InnoDB when WITH_INNOBASE_STORAGE_ENGINE is enabled, otherwise MyISAM"
    description: "sql/mysqld.cc assigns the startup default storage engine in initialization code before engine resolution occurs."

key_files:
  - path: "sql/mysqld.cc"
    purpose: "Main server executable entry path for startup, option initialization, listener handling, scheduler setup, and storage-engine initialization."
  - path: "sql/sys_vars.cc"
    purpose: "Canonical registry of server and session variables, including defaults, option bindings, range validation, and update hooks."
  - path: "sql/sql_yacc.yy"
    purpose: "Master SQL grammar input used to generate parser sources for MariaDB and Oracle grammar variants."
  - path: "sql/sql_lex.cc"
    purpose: "Lexical scanner and parser helper logic that feeds tokens and parser-side helper actions into the SQL front end."
  - path: "sql/sql_parse.cc"
    purpose: "Central command dispatch and execution path that connects parsed statements to DDL, DML, replication, events, routines, and administrative operations."
  - path: "sql/rpl_parallel.cc"
    purpose: "Parallel replication worker implementation for applying queued relay-log events on replica worker threads."
  - path: "sql/wsrep_mysqld.cc"
    purpose: "WSREP and Galera-oriented server integration layer for provider configuration, appliers, SST coordination, and cluster state."
  - path: "storage/innobase/CMakeLists.txt"
    purpose: "Build definition for InnoDB, including NUMA checks, debug flags, adaptive hash options, and engine-specific compile settings."
  - path: "storage/myisam/CMakeLists.txt"
    purpose: "Build definition for the MyISAM engine and its companion utilities such as myisamchk and myisampack."
  - path: "storage/rocksdb/CMakeLists.txt"
    purpose: "Optional RocksDB engine integration with compiler gating, platform checks, and submodule validation."
  - path: "plugin/server_audit/CMakeLists.txt"
    purpose: "Minimal example of a module-style plugin target built through MYSQL_ADD_PLUGIN."
  - path: "client/CMakeLists.txt"
    purpose: "Client-side tool build matrix for mariadb, mariadb-dump, mariadb-admin, mariadb-binlog, mariadb-import, and test utilities."
  - path: "include/mysql.h"
    purpose: "Public client API header exposed to client programs and libraries."
  - path: "include/mysql_com.h"
    purpose: "Protocol and common constant definitions shared across the client/server boundary."
  - path: "cmake/character_sets.cmake"
    purpose: "Compile-time default charset and collation configuration used to seed server startup defaults."
  - path: "CMakeLists.txt"
    purpose: "Top-level build definition that sets C99 and C++17, loads dependency modules, and pulls sql/, storage/, plugin/, and client-facing components into one build."

tech_stack:
  - name: "C"
    role: "Core systems language across clients, engines, protocol code, utility libraries, and parts of the server."
  - name: "C++"
    role: "Primary implementation language for large parts of the server, parser support, replication code, plugins, and engine integrations."
  - name: "CMake"
    role: "Top-level build and packaging system, including plugin registration, dependency checks, and generated parser steps."
  - name: "Bison"
    role: "Parser generator used by sql/CMakeLists.txt to transform sql/sql_yacc.yy into parser sources."
  - name: "OpenSSL"
    role: "SSL/TLS dependency wired into server and client builds through the top-level and client CMake files."
  - name: "Zlib"
    role: "Compression dependency included in the top-level build and client toolchain."
  - name: "PCRE2"
    role: "Regular-expression dependency used in server and client-side tooling such as mariadb-test and import utilities."
  - name: "libfmt"
    role: "Formatting dependency included from the top-level CMake dependency setup."
  - name: "NUMA"
    role: "Optional platform dependency checked by the server and InnoDB build for memory-placement tuning."
  - name: "Readline"
    role: "Interactive line-editing dependency for the mariadb command-line client on Unix."
