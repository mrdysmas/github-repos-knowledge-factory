name: headscale
node_id: repo::juanfont/headscale
github_full_name: juanfont/headscale
html_url: https://github.com/juanfont/headscale
source: repos
provenance:
  shard: repos
  source_file: repos/knowledge/deep/headscale.yaml
  as_of: '2026-02-25'
  sourcing_method: code_verified
  extraction_model: glm-5
  extraction_agent: kgraph-repos
directory: headscale-main
category: vpn_mesh

# Inherited from shallow file
summary: |
  Open-source, self-hosted implementation of the Tailscale control server - enables private
  WireGuard-based mesh VPNs without relying on Tailscale's proprietary control plane.

# Deep additions
architecture:
  module_breakdown:
    - module: hscontrol/app.go
      responsibility: Main application with HTTP/gRPC handlers, DERP server, state management
      key_files: [hscontrol/app.go]
    - module: hscontrol/state/
      responsibility: Central coordinator for database, policy, IP allocation, node store
      key_files: [hscontrol/state/state.go, hscontrol/state/node_store.go]
    - module: hscontrol/db/
      responsibility: Database layer with GORM - nodes, users, API keys, routes, policy
      key_files: [hscontrol/db/db.go, hscontrol/db/node.go, hscontrol/db/users.go]
    - module: hscontrol/poll.go
      responsibility: MapRequest/MapResponse protocol handling - core coordination
      key_files: [hscontrol/poll.go]
    - module: hscontrol/noise.go
      responsibility: Noise protocol for secure client-to-control communication
      key_files: [hscontrol/noise.go]
    - module: hscontrol/mapper/
      responsibility: Converts internal state to Tailscale wire protocol format
      key_files: [hscontrol/mapper/mapper.go, hscontrol/mapper/builder.go]
    - module: hscontrol/policy/
      responsibility: ACL evaluation, HuJSON parsing, rule matching
      key_files: [hscontrol/policy/policy.go, hscontrol/policy/v2/]
    - module: hscontrol/derp/
      responsibility: DERP server for NAT traversal relay
      key_files: [hscontrol/derp/]
    - module: cmd/headscale/
      responsibility: CLI commands using Cobra
      key_files: [cmd/headscale/cli/serve.go, cmd/headscale/cli/root.go]
  data_flow: |
    1. Client connects via Noise protocol on /ts2021
    2. Registration via NoiseRegistrationHandler
    3. Client polls via NoisePollNetMapHandler (MapRequest/MapResponse)
    4. State updates via hscontrol/state (database + in-memory cache)
    5. Mapper converts state to Tailscale protocol
    6. Real-time updates sent to affected clients
  key_abstractions:
    - name: Headscale struct
      purpose: Main application container with all subsystems
    - name: State
      purpose: Thread-safe central hub managing database, policy, IP allocation
    - name: NodeStore
      purpose: In-memory node cache with copy-on-write for performance
    - name: noiseServer
      purpose: HTTP/2 server over Noise protocol connection
    - name: mapSession
      purpose: Per-connection session for MapRequest handling

implementation_patterns:
  - pattern: Copy-on-Write NodeStore
    description: In-memory cache with atomic updates for high-frequency operations
    location: hscontrol/state/node_store.go
  - pattern: Tags-as-Identity
    description: Tags and user ownership are mutually exclusive for node identification
    location: hscontrol/types/node.go
  - pattern: Incremental Log Building
    description: Build log events incrementally with conditional fields
    location: hscontrol/db/node.go
  - pattern: Builder Pattern for MapResponse
    description: MapResponseBuilder constructs responses with fine-grained control
    location: hscontrol/mapper/mapper.go
  - pattern: EventuallyWithT Testing
    description: Integration tests use EventuallyWithT for eventual consistency
    location: integration/

configuration:
  file: config.yaml (YAML)
  options:
    - name: server_url
      type: string
      default: required
      description: Public URL of headscale server
    - name: listen_addr
      type: string
      default: "0.0.0.0:8080"
      description: Address to bind HTTP server
    - name: grpc_listen_addr
      type: string
      default: ""
      description: gRPC server address (empty to disable)
    - name: grpc_allow_insecure
      type: bool
      default: false
      description: Allow unencrypted gRPC
    - name: database.type
      type: string
      default: "sqlite"
      description: Database type (sqlite, postgres)
    - name: database.sqlite.path
      type: string
      default: "/var/lib/headscale/db.sqlite"
      description: SQLite database path
    - name: database.postgres.host
      type: string
      default: "localhost"
      description: PostgreSQL host
    - name: dns_config
      type: object
      default: {}
      description: MagicDNS configuration
    - name: derp.server.enabled
      type: bool
      default: true
      description: Enable embedded DERP server
    - name: policy.path
      type: string
      default: ""
      description: Path to ACL policy file

api_surface:
  public_functions:
    - name: Headscale.Serve
      signature: func (h *Headscale) Serve() error
      purpose: Start HTTP and gRPC servers
      location: hscontrol/app.go
    - name: State.GetNodeByNodeKey
      signature: func (s *State) GetNodeByNodeKey(key key.NodePublic) (types.NodeView, bool)
      purpose: Look up node by public key
      location: hscontrol/state/state.go
    - name: newMapSession
      signature: func (h *Headscale) newMapSession(...) *mapSession
      purpose: Create session for handling MapRequest
      location: hscontrol/poll.go
  grpc_endpoints:
    - service: headscale.v1.HeadscaleService
      methods: [ListNodes, GetUser, CreatePreAuthKey, etc.]
  cli_commands:
    - headscale serve - Start server daemon
    - headscale users - User management
    - headscale nodes - Node management
    - headscale preauthkeys - Pre-auth key management
    - headscale policy - ACL policy management
    - headscale routes - Subnet route management

testing:
  framework: Go testing + Docker integration tests
  structure: integration/ with Docker-based E2E tests
  coverage_areas:
    - Node registration and authentication
    - OIDC integration
    - ACL policy evaluation
    - DNS resolution
    - Subnet routing
    - DERP relay
    - SSH access through tailnet
  integration_runner: cmd/hi (Headscale Integration test runner)

extension_points:
  - location: hscontrol/policy/
    hook: Policy evaluation
    example: Custom ACL backends, external policy sources
  - location: hscontrol/derp/
    hook: DERP server
    example: Custom DERP map, external DERP integration
  - location: hscontrol/db/
    hook: Database layer
    example: Additional database backends
  - location: hscontrol/mapper/
    hook: MapResponse generation
    example: Custom peer filtering, additional capabilities

notes: |
  - Uses official Tailscale client libraries for protocol compatibility
  - Clients must override control URL to point to headscale
  - Tags-as-identity model: nodes are either tagged OR user-owned
  - Database migrations are immutable - new migrations only at end
  - First-class NixOS module support
