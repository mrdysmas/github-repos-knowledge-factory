architecture:
  module_breakdown:
  - module: cmd/cloudflared
    responsibility: "CLI entrypoint, subcommands, flags, and tunnel management workflows."
    key_files:
    - cmd/cloudflared
  - module: ingress and proxy
    responsibility: "Ingress rule handling and upstream proxy behavior for exposed services."
    key_files:
    - ingress
    - proxy
  - module: connection and orchestration
    responsibility: "Tunnel connection lifecycle, coordination, and process supervision."
    key_files:
    - connection
    - orchestration
    - supervisor
  - module: token, metrics, and management
    responsibility: "Credential handling, observability, and operational control surfaces."
    key_files:
    - token
    - metrics
    - management
  key_abstractions:
  - name: Tunnel command surface
    purpose: "Configures and runs Cloudflare Tunnel client workflows."
  - name: Ingress rules
    purpose: "Map incoming requests to configured origin services."
  - name: Connection manager
    purpose: "Maintains outbound connectivity to Cloudflare edge services."

code_patterns:
- pattern: "CLI subcommand fan-out"
  description: "Operational behaviors are grouped into CLI-focused command packages under cmd/cloudflared."
  location: cmd/cloudflared
- pattern: "Ingress-to-origin routing"
  description: "Ingress definitions and middleware map tunnel traffic to origin services."
  location: ingress
- pattern: "Supervised connection lifecycle"
  description: "Tunnel processes and edge connections are coordinated through dedicated connection and orchestration packages."
  location: connection

implementation_patterns:
- pattern: "Credential-backed tunnel startup"
  description: "Token and credential packages separate authentication concerns from transport logic."
  location: token
- pattern: "Operational metrics emission"
  description: "Metrics and management modules expose runtime observability around tunnel behavior."
  location: metrics

core_modules:
