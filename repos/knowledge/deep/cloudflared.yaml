    description: "Supervision and runtime coordination."

key_features:
- feature: "Cloudflare Tunnel client"
  description: "Publishes local services through outbound connections to Cloudflare edge."
- feature: "Ingress rule routing"
  description: "Maps incoming traffic to configured origins and middleware chains."
- feature: "Managed credentials and tokens"
  description: "Separates token handling and credential workflows from tunnel runtime."
- feature: "Operational metrics and management"
  description: "Exposes observability and management surfaces for tunnel processes."

