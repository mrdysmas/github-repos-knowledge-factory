architecture:
  module_breakdown:
  - module: src/vector.c
    responsibility: Core vector type, operators, and function bindings for PostgreSQL.
    key_files:
    - src/vector.c
    - src/vector.h
  - module: src/hnsw*.c
    responsibility: HNSW index build, insert, scan, utility, and vacuum paths.
    key_files:
    - src/hnsw.c
    - src/hnswbuild.c
    - src/hnswscan.c
  - module: src/ivf*.c
    responsibility: IVFFlat index build, insert, scan, kmeans, and maintenance routines.
    key_files:
    - src/ivfflat.c
    - src/ivfbuild.c
    - src/ivfscan.c
  - module: src/halfvec.c / src/sparsevec.c / src/bitvec.c
    responsibility: Additional storage/metric types (half precision, sparse, binary).
    key_files:
    - src/halfvec.c
    - src/sparsevec.c
    - src/bitvec.c
  - module: sql/vector.sql and upgrade SQLs
    responsibility: SQL-facing type/operator/function declarations and extension version migration.
    key_files:
    - sql/vector.sql
    - sql/vector--0.8.1--0.8.2.sql
  components:
  - name: PostgreSQL type layer
    description: Registers vector-like types and maps SQL operators/functions to C implementations.
  - name: approximate index layer
    description: Provides HNSW and IVFFlat access methods with tunable query/build parameters.
  - name: migration layer
    description: SQL upgrade scripts evolve extension schema and operators between versions.
  data_flow: |
    1. SQL DDL creates extension and vector-typed columns.
    2. SQL operators/functions resolve to C functions in src/*.c.
    3. Index methods (hnsw, ivfflat) are invoked by PostgreSQL planner/executor.
    4. Runtime knobs (hnsw.*, ivfflat.*) alter search behavior per session/query.
  key_abstractions:
  - name: vector operators
    purpose: SQL distance operators (<->, <#>, <=>, <+>, <~>, <%>) for ranking/filtering.
  - name: HNSW index
    purpose: Higher recall/speed ANN index with graph-based traversal.
  - name: IVFFlat index
    purpose: Lower-memory ANN index with list/probe-based search.
key_features:
- PostgreSQL-native vector, halfvec, sparsevec, and bit-based similarity operations.
- Multiple distance metrics exposed as SQL operators.
- ANN indexing through both HNSW and IVFFlat.
- Long migration history via versioned SQL scripts in sql/.
implementation_patterns:
- pattern: PostgreSQL extension pattern
  description: C functions are surfaced through SQL declarations in sql/vector.sql and upgrade scripts.
  location: sql/vector.sql
  file: sql/vector.sql
- pattern: Split index implementation per algorithm
  description: Separate build/insert/scan/vacuum files for HNSW and IVFFlat keep code paths explicit.
  location: src/hnsw*.c and src/ivf*.c
  file: src/hnsw.c
- pattern: Operator-driven API
  description: Query behavior centers on SQL operators used in ORDER BY and predicate expressions.
  location: README examples and SQL definitions
  file: README.md
configuration:
  options:
  - key: hnsw.ef_search
    default: '40'
    description: Candidate list size during HNSW search; higher values improve recall at extra cost.
  - key: hnsw.iterative_scan
    default: strict_order
    description: Iterative scanning mode for filtered ANN queries.
  - key: hnsw.max_scan_tuples
    default: implementation default
    description: Upper bound for tuple scan expansion during iterative scans.
  - key: ivfflat.probes
    default: implementation default
    description: Number of IVF lists probed per query.
  - key: ivfflat.iterative_scan
    default: relaxed_order
    description: Iterative behavior for IVFFlat filtered queries.
  - key: ivfflat.max_probes
    default: implementation default
    description: Upper cap for IVFFlat probe expansion.
  - key: maintenance_work_mem
    default: postgresql default
    description: Strongly affects ANN index build performance (especially HNSW).
api_surface:
  public_functions:
  - name: <->
    purpose: L2 distance operator for vectors.
    location: README.md / sql/vector.sql
  - name: <#>
    purpose: Negative inner-product operator for vectors.
    location: README.md / sql/vector.sql
  - name: <=>
    purpose: Cosine distance operator.
    location: README.md / sql/vector.sql
  - name: <+>
    purpose: L1 (taxicab) distance operator.
    location: README.md / sql/vector.sql
  - name: <~>
    purpose: Hamming distance for bit vectors.
    location: README.md / sql/vector.sql
  - name: <%>
    purpose: Jaccard distance for bit vectors.
    location: README.md / sql/vector.sql
cli_commands:
- command: CREATE EXTENSION vector;
  description: Install extension into current database.
- command: CREATE INDEX ON items USING hnsw (embedding vector_l2_ops);
  description: Build HNSW ANN index.
- command: CREATE INDEX ON items USING ivfflat (embedding vector_l2_ops) WITH (lists = 100);
  description: Build IVFFlat ANN index.
- command: SET hnsw.ef_search = 100;
  description: Tune HNSW search breadth.
- command: SET ivfflat.probes = 10;
  description: Tune IVFFlat query probes.
