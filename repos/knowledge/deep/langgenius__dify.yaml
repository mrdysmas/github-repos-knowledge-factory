name: dify
node_id: repo::langgenius/dify
github_full_name: langgenius/dify
html_url: https://github.com/langgenius/dify
source: remote_metadata
provenance:
  shard: repos
  source_file: repos/knowledge/deep/langgenius__dify.yaml
  as_of: '2026-02-25'
  sourcing_method: code_verified
  extraction_model: glm-5
  extraction_agent: kgraph-repos
sparse: false

description: Open-source LLM application platform with workflow orchestration and RAG support.

tech_stack:
  - Python
  - TypeScript
  - React
  - Docker Compose
  - PostgreSQL
  - Redis

testing:
  framework: pytest (API) and frontend/component test suites
  structure: API unit and integration tests plus workflow engine tests
  coverage_areas:
    - workflow execution and orchestration
    - chat and completion message APIs
    - tool/plugin integration behavior
  test_patterns:
    - uv run pytest
    - uv run pytest tests/unit_tests/
    - uv run pytest tests/integration_tests/
    - mocked provider and environment fixtures

quick_reference:
  - topic: Self-host quick start
    content: |
      cd docker
      cp .env.example .env
      docker compose up -d

  - topic: API test commands
    content: |
      cd api
      uv run pytest
      uv run pytest tests/unit_tests/
      uv run pytest tests/integration_tests/

  - topic: Common service API paths
    content: |
      /chat-messages
      /completion-messages
      /v1/workflows/run

integrations:
  providers:
    - OpenAI-compatible model providers
    - Anthropic-compatible model providers
  external_sources:
    - Notion
    - Web crawler connectors
  api_endpoints:
    - path: /chat-messages
      method: POST
      description: send chat app message and stream/collect response
    - path: /completion-messages
      method: POST
      description: run completion app message generation
    - path: /v1/workflows/run
      method: POST
      description: execute workflow graph run

api_structure:
  service_api:
    - path: /chat-messages
      operations:
        - POST
    - path: /completion-messages
      operations:
        - POST
    - path: /completion-messages/{task_id}/stop
      operations:
        - POST
  app_api:
    - path: /apps/{app_id}/chat-messages
      operations:
        - POST
    - path: /apps/{app_id}/completion-messages
      operations:
        - POST
