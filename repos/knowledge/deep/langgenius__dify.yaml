testing:
  framework: pytest (API) and frontend/component test suites
  structure: API unit and integration tests plus workflow engine tests
  coverage_areas:
    - workflow execution and orchestration
    - chat and completion message APIs
    - tool/plugin integration behavior
  test_patterns:
    - uv run pytest
    - uv run pytest tests/unit_tests/
    - uv run pytest tests/integration_tests/
    - mocked provider and environment fixtures

quick_reference:
  - topic: Self-host quick start
    content: |
      cd docker
      cp .env.example .env
      docker compose up -d

  - topic: API test commands
    content: |
      cd api
      uv run pytest
      uv run pytest tests/unit_tests/
      uv run pytest tests/integration_tests/

  - topic: Common service API paths
    content: |
      /chat-messages
      /completion-messages
      /v1/workflows/run

integrations:
  providers:
    - OpenAI-compatible model providers
    - Anthropic-compatible model providers
  external_sources:
    - Notion
    - Web crawler connectors
  api_endpoints:
    - path: /chat-messages
      method: POST
      description: send chat app message and stream/collect response
    - path: /completion-messages
      method: POST
      description: run completion app message generation
    - path: /v1/workflows/run
      method: POST
      description: execute workflow graph run

troubleshooting:
- symptom: docker compose up -d completes but web UI is unreachable
  cause: Dependent services (PostgreSQL, Redis) not yet healthy; or port 80/443 already in use on the host.
  fix: Run docker compose ps to check service health; wait for db and redis containers to show healthy; change host port mapping in docker-compose.yaml if conflicts exist.
- symptom: API returns 401 or model provider errors despite valid key
  cause: ANTHROPIC_API_KEY or equivalent env var not set in the .env file; or .env was not copied from .env.example before first launch.
  fix: Confirm .env exists and contains the correct provider key; restart containers with docker compose down && docker compose up -d after editing.
- symptom: Workflow execution hangs or returns empty output
  cause: LLM provider rate limit hit; or a node in the workflow graph has a misconfigured input variable reference.
  fix: Check provider dashboard for rate limit status; inspect workflow node configuration for unresolved variable references; review api container logs with docker compose logs api.
- symptom: RAG knowledge base returns no results or low-relevance chunks
  cause: Embedding model not configured or mismatched with the retrieval model; document not fully indexed.
  fix: Verify the embedding model is set under Settings → Model Provider; re-index the knowledge base document after confirming the embedding provider is reachable.
- symptom: Self-hosted instance loses data after docker compose down
  cause: Volumes not persisted; default compose config uses named volumes that may be pruned.
  fix: Confirm volume mounts in docker-compose.yaml point to host paths for postgres and storage; avoid docker volume prune on active deployments.

api_structure:
  service_api:
    - path: /chat-messages
      operations:
        - POST
    - path: /completion-messages
      operations:
        - POST
    - path: /completion-messages/{task_id}/stop
      operations:
        - POST
  app_api:
    - path: /apps/{app_id}/chat-messages
      operations:
        - POST
    - path: /apps/{app_id}/completion-messages
      operations:
        - POST
