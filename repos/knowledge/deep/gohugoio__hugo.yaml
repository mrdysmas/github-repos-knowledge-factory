architecture:
  module_breakdown:
  - module: main.go
    responsibility: Entrypoint that delegates to CLI command execution package.
    key_files:
    - main.go
  - module: commands/
    responsibility: CLI commands for build, server, new, mod, deploy, config, and utilities.
    key_files:
    - commands/commands.go
    - commands/server.go
    - commands/new.go
    - commands/mod.go
  - module: hugolib/
    responsibility: Core site build engine, content pipeline, page model, and output generation.
    key_files:
    - hugolib/
  - module: config/
    responsibility: Typed config loading/merging including module-aware config phases.
    key_files:
    - config/allconfig/load.go
    - config/allconfig/allconfig.go
  - module: markup/
    responsibility: Markdown and rendering configuration (including Goldmark integration).
    key_files:
    - markup/
  - module: tpl/
    responsibility: Template functions, render hooks, and embedded template behavior.
    key_files:
    - tpl/
  - module: modules/
    responsibility: Dependency/module collection, mounts, and project composition.
    key_files:
    - modules/
    - commands/mod.go
  components:
  - name: build engine
    description: Converts content + templates + configuration into static output artifacts.
  - name: live server
    description: Watches files, triggers incremental rebuilds, and serves generated content.
  - name: module system
    description: Reuses content/assets/templates/config across projects via module imports and mounts.
  data_flow: |
    1. main.go calls commands.Execute.
    2. Root command initializes config and command-specific build/runtime options.
    3. Config loader resolves project config plus module-derived config/mounts.
    4. hugolib builds site content through markup/template/resource pipelines.
    5. Outputs are written to publish directory (or memory/disk hybrid in server mode).
  key_abstractions:
  - name: HugoSites
    purpose: In-memory representation of one or more configured sites/languages.
  - name: modules mounts
    purpose: Maps module/project directories into content/static/layout paths.
  - name: command graph
    purpose: Organized command tree for build/new/server/mod/deploy workflows.
key_features:
- Fast static site generation pipeline in Go.
- Embedded development server with rebuild/watch workflow.
- Multi-language and module-based composition support.
- Markdown rendering and templating extensibility.
- Rich CLI for content/project/theme generation and module management.
implementation_patterns:
- pattern: Command composition via simplecobra
  description: Root command wires many discrete command implementations.
  location: commands/commands.go
  file: commands/commands.go
- pattern: Config loaded in multiple passes
  description: Config loader merges project and module config before build.
  location: config/allconfig/load.go
  file: config/allconfig/load.go
- pattern: Watch + incremental rebuild loop
  description: Server command tracks file events and performs targeted rebuilds.
  location: commands/server.go
  file: commands/server.go
- pattern: Module mount remapping
  description: Module/client code maps source directories into Hugo's component folders.
  location: config/allconfig/load.go and hugolib/filesystems/basefs.go
  file: hugolib/filesystems/basefs.go
