testing:
  framework: Jasmine/Mocha
  structure: test/ directory with unit and integration tests
  coverage_areas:
    - Escape sequence parsing
    - Buffer operations
    - Input handling
    - Rendering
    - Addon loading
  test_patterns:
    - Fixtures for escape sequence test data
    - Mock services for isolated testing
    - Screenshot tests for rendering

extension_points:
  - location: src/browser/public/Terminal.ts
    hook: "ITerminalAddon interface - activate(terminal: Terminal)"
    example: Create custom addon with new functionality
  - location: src/common/public/ParserApi.ts
    hook: registerCsiHandler - Custom CSI sequence handlers
    example: Support custom terminal extensions
  - location: src/common/public/ParserApi.ts
    hook: registerOscHandler - Custom OSC sequence handlers
    example: Implement proprietary OSC commands
  - location: typings/xterm.d.ts
    hook: ILinkProvider interface
    example: Custom link detection (URLs, file paths, etc.)
  - location: src/browser/public/Terminal.ts
    hook: registerCharacterJoiner callback
    example: Ligature support for programming fonts
  - location: typings/xterm.d.ts
    hook: IDecorationOptions via registerDecoration
    example: Visual overlays, underlines, highlights
