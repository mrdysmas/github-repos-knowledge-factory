# Inherited from shallow file
summary: |
  A TypeScript/JavaScript library that brings fully-featured terminal emulation to the browser -
  rendering VT100/xterm escape sequences, handling input, and providing a programmable terminal
  UI component used by VS Code, Hyper, and hundreds of web-based terminal applications.

# Deep additions
architecture:
  module_breakdown:
    - module: src/browser/public/Terminal.ts
      responsibility: Public Terminal class - primary API entry point
      key_files: [src/browser/public/Terminal.ts]
    - module: src/browser/CoreBrowserTerminal.ts
      responsibility: Browser terminal - DOM integration, input events, rendering
      key_files: [src/browser/CoreBrowserTerminal.ts]
    - module: src/common/CoreTerminal.ts
      responsibility: Platform-agnostic core - buffer management, input parsing, services
      key_files: [src/common/CoreTerminal.ts]
    - module: src/common/InputHandler.ts
      responsibility: Escape sequence parser - CSI/OSC/DCS/APC processing
      key_files: [src/common/InputHandler.ts]
    - module: src/common/buffer/
      responsibility: Buffer system - Buffer, BufferSet, BufferLine, circular storage
      key_files: [src/common/buffer/Buffer.ts, src/common/buffer/BufferSet.ts]
    - module: src/common/parser/
      responsibility: Parser - EscapeSequenceParser, type definitions
      key_files: [src/common/parser/EscapeSequenceParser.ts]
    - module: src/common/services/
      responsibility: Services - BufferService, OptionsService, InstantiationService
      key_files: [src/common/services/]
    - module: src/browser/renderer/
      responsibility: Rendering - DOM renderer, shared utilities
      key_files: [src/browser/renderer/dom/DomRenderer.ts]
    - module: addons/
      responsibility: Extensions - web-links, search, serialize, etc.
      key_files: [addons/addon-web-links/, addons/addon-search/]
  data_flow: |
    1. Terminal instantiated with options
    2. open() creates DOM structure (textarea for input, screen element)
    3. write() data enters InputHandler
    4. Parser tokenizes escape sequences (CSI/OSC/DCS/APC)
    5. Handlers update buffer (cursor, text, attributes)
    6. RenderService triggers redraw on animation frame
    7. User input captured via textarea, emitted as onData events
  key_abstractions:
    - name: IBuffer
      purpose: Buffer interface - lines, cursor, scroll position, markers
    - name: IBufferSet
      purpose: Manages normal and alternate screen buffers
    - name: InputHandler
      purpose: Parses and processes VT100/xterm sequences
    - name: IService
      purpose: Dependency injection via InstantiationService
    - name: ITerminalAddon
      purpose: Addon interface with activate/dispose lifecycle

