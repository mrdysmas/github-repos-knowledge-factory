name: tailscale
node_id: repo::tailscale/tailscale
github_full_name: tailscale/tailscale
html_url: https://github.com/tailscale/tailscale
source: remote_api
provenance:
  shard: repos
  source_file: repos/knowledge/deep/tailscale.yaml
  as_of: '2026-03-18'
  sourcing_method: training_knowledge
  extraction_model: gpt-unknown
  extraction_agent: codex
directory: remote::tailscale/tailscale
category: vpn_mesh

architecture:
  module_breakdown:
  - module: cmd/tailscale and cmd/tailscaled
    responsibility: "CLI and daemon entrypoints for node control, login, and background networking services."
    key_files:
    - cmd/tailscale
    - cmd/tailscaled
  - module: ipn
    responsibility: "Node state management, local API serving, preferences, and backend orchestration."
    key_files:
    - ipn/ipnlocal
    - ipn/localapi
    - ipn/ipnserver
  - module: wgengine
    responsibility: "WireGuard engine integration, peer connectivity, and dataplane behavior."
    key_files:
    - wgengine
  - module: net and tailcfg
    responsibility: "Network utilities, DERP/discovery coordination, and shared control-plane types."
    key_files:
    - net
    - tailcfg
    - derp
  key_abstractions:
  - name: LocalBackend
    purpose: "Coordinates node state, preferences, and authenticated control-plane interactions."
  - name: wgengine
    purpose: "Encapsulates WireGuard dataplane and peer connectivity behavior."
  - name: LocalAPI
    purpose: "Serves local management endpoints used by clients and integrations."

code_patterns:
- pattern: "Daemon-plus-CLI split"
  description: "Operational commands are separated from the long-running networking daemon."
  location: cmd/tailscale
- pattern: "Control-plane and dataplane separation"
  description: "Configuration/state logic lives in ipn while packet transport concerns live in wgengine and net."
  location: ipn
- pattern: "Package-oriented networking utilities"
  description: "Network checks, DNS handling, and discovery paths are factored into dedicated subpackages."
  location: net

implementation_patterns:
- pattern: "Local API mediation"
  description: "Client-facing commands route through a local API/backend layer instead of mutating daemon state directly."
  location: ipn/localapi
- pattern: "DERP fallback networking"
  description: "Relay and discovery support is organized as explicit subsystems for peer connectivity fallback."
  location: derp

core_modules:
  cli_and_daemon:
    path: cmd
    description: "User-facing CLI and daemon binaries."
  state_backend:
    path: ipn
    description: "State management, preferences, auth, and local API surfaces."
  dataplane:
    path: wgengine
    description: "WireGuard engine integration and peer networking."
  shared_networking:
    path: net
    description: "Discovery, DNS, proxy, and network monitoring helpers."

key_features:
- feature: "Mesh VPN connectivity"
  description: "Builds WireGuard-based mesh networking between authenticated nodes."
- feature: "Identity-aware access control"
  description: "Connects node behavior and policy to control-plane identity and configuration."
- feature: "Local API and daemon management"
  description: "Supports client commands through a daemon-backed local API."
- feature: "Relay and fallback connectivity"
  description: "Uses discovery and DERP relay subsystems when direct connectivity is unavailable."

key_files:
- path: README.md
  description: "Project overview and user entry points."
- path: cmd/tailscale
  description: "Primary CLI command implementation."
- path: cmd/tailscaled
  description: "Daemon entrypoint."
- path: ipn/localapi
  description: "Local API implementation."
- path: wgengine
  description: "WireGuard engine integration."

configuration:
- name: runtime_settings
  options:
  - key: authkey
    description: "Authentication key used for device enrollment workflows."
  - key: control_url
    description: "Control-plane endpoint selection."
  - key: advertise_routes
    description: "Network route advertisement behavior."
  - key: exit_node
    description: "Exit-node selection for egress routing."

testing:
  framework: go test
  structure: "Repository includes package-level tests across networking, control-plane, and client modules."
  coverage_areas:
  - "Local API and backend behavior"
  - "WireGuard engine and peer connectivity"
  - "Network utilities and discovery logic"
  test_patterns:
  - "go test ./..."

integrations:
  networking:
  - WireGuard
  - DERP relay network
  - local API consumers
  platforms:
  - desktop clients
  - CLI environments
  - Kubernetes operator tooling

quick_reference:
- topic: "Build CLI and daemon"
  command: "go build ./cmd/tailscale ./cmd/tailscaled"
- topic: "Run tests"
  command: "go test ./..."

commands:
- name: "go build ./cmd/tailscale ./cmd/tailscaled"
  description: "Build CLI and daemon binaries."
  usage: "go build ./cmd/tailscale ./cmd/tailscaled"
- name: "go test ./..."
  description: "Run Go test suites across the repo."
  usage: "go test ./..."

api_surface:
  public_functions:
  - name: tailscale CLI
    purpose: "Expose user-facing node management and networking commands."
    location: cmd/tailscale
  - name: tailscaled
    purpose: "Run the background daemon responsible for connectivity and state."
    location: cmd/tailscaled
  - name: LocalAPI
    purpose: "Serve local management requests for clients and integrations."
    location: ipn/localapi

vpn_protocols:
  - name: WireGuard
    role: "data-plane VPN protocol forming the encrypted peer-to-peer mesh; the wgengine package integrates the WireGuard stack and manages peer key exchange and session lifecycle"
  - name: DERP
    role: "Designated Encrypted Relay for Packets — Tailscale's relay protocol used as a fallback when direct WireGuard UDP connectivity cannot be established; derp package implements the relay client and server"
  - name: "Tailscale control protocol (HTTPS/JSON)"
    role: "proprietary control-plane protocol over HTTPS used by nodes to authenticate, register, and receive peer maps from the coordination server (or headscale); implemented in ipn/localapi and tailcfg packages"
  - name: "MagicDNS"
    role: "DNS-based name resolution protocol for tailnet nodes; Tailscale nodes resolve each other by hostname within the 100.x.x.x address space via integrated DNS handling in the net package"
  - name: "Tailscale SSH"
    role: "SSH access protocol mediated through the tailnet; Tailscale routes SSH connections through the WireGuard mesh with identity from the coordination server, bypassing traditional SSH key management"
