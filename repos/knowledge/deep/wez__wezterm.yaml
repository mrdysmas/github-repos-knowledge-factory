architecture:
  module_breakdown:
  - module: wezterm/
    responsibility: Primary CLI binary and shared command dispatch for end-user entrypoint.
    key_files:
    - wezterm/src/main.rs
  - module: wezterm-gui/
    responsibility: GUI runtime, window management, rendering loop, and command execution integration.
    key_files:
    - wezterm-gui/src/main.rs
  - module: wezterm-mux-server/
    responsibility: Standalone mux server runtime with optional daemonization.
    key_files:
    - wezterm-mux-server/src/main.rs
  - module: mux/
    responsibility: Multiplexer model for windows/tabs/panes and domain abstractions.
    key_files:
    - mux/Cargo.toml
  - module: config/
    responsibility: Configuration loading, defaults, and typed config surfaces.
    key_files:
    - config/Cargo.toml
    - docs/config/files.md
  - module: termwiz/
    responsibility: Terminal capabilities, parsing, and surface primitives used by the emulator.
    key_files:
    - termwiz/Cargo.toml
  - module: wezterm-ssh/
    responsibility: SSH transport integration used by wezterm ssh and multiplexing workflows.
    key_files:
    - wezterm-ssh/Cargo.toml
  components:
  - name: command frontends
    description: wezterm, wezterm-gui, and wezterm-mux-server each expose focused runtime modes.
  - name: mux core
    description: Domain-aware pane/tab/window model shared between local and remote workflows.
  - name: configuration engine
    description: Merges config file, overrides, and runtime defaults into typed settings.
  data_flow: |
    1. Entry binaries parse CLI arguments (--config-file, --config, subcommands).
    2. Config is loaded (unless --skip-config) and merged with CLI overrides.
    3. Commands route into GUI mode, mux server mode, or utility subcommands.
    4. Mux domains (unix/ssh/tls) connect panes and windows to local or remote backends.
    5. Rendering/input pipeline uses termwiz and GUI modules to process terminal state.
  key_abstractions:
  - name: multiplexer domains
    purpose: Uniform abstraction for local, unix socket, ssh, serial, and tls-backed sessions.
  - name: wezterm.lua config
    purpose: User programmable runtime behavior via Lua tables/functions.
  - name: subcommand-oriented CLI
    purpose: Single executable exposes startup, mux interaction, utility, and automation workflows.
key_features:
- Multi-binary architecture (wezterm, wezterm-gui, wezterm-mux-server) with shared command model.
- Built-in multiplexer supporting local and remote domains.
- Rich Lua configuration and keybinding customization.
- SSH and serial session workflows from CLI.
- Workspace-aware tab/window management and optional daemonized mux server.
