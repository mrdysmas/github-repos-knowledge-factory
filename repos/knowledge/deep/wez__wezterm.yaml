- pattern: Domain-driven mux abstraction
  description: Commands connect through domain objects rather than hardcoding transport-specific logic.
  location: wezterm-gui/src/main.rs
  file: wezterm-gui/src/main.rs
- pattern: Config layering
  description: Config file, --config overrides, and defaults are merged during startup.
  location: wezterm/src/main.rs
  file: wezterm/src/main.rs
- pattern: Optional daemonization path for mux server
  description: wezterm-mux-server supports --daemonize and re-exec flow to stabilize runtime state.
