      signature: "pub async fn new(to: &str, local_port: u16, local_host: &str, port: u16, secret: Option<&str>) -> Result<Self>"
      purpose: Create client and establish control connection
      location: src/client.rs:36-60
    - name: Client::listen
      signature: "pub async fn listen(self) -> Result<()>"
      purpose: Start listening for server messages and handle connections
      location: src/client.rs:62-119
    - name: Client::remote_port
      signature: pub fn remote_port(&self) -> u16
      purpose: Get the assigned remote port
      location: src/client.rs:58
    - name: Server::new
      signature: "pub fn new(port_range: RangeInclusive<u16>, secret: Option<&str>) -> Self"
      purpose: Create server with port range and optional auth
      location: src/server.rs:59
    - name: Server::listen
      signature: "pub async fn listen(self) -> Result<()>"
      purpose: Start accepting control connections
      location: src/server.rs:67-187
    - name: Authenticator::new
      signature: "pub fn new(secret: &str) -> Self"
      purpose: Create authenticator from secret
      location: src/auth.rs:16
    - name: Authenticator::validate
      signature: "pub fn validate(&self, challenge: &Uuid, tag: &str) -> bool"
      purpose: Validate HMAC response
      location: src/auth.rs:40

testing:
  framework: tokio::test, rstest for parameterization
  structure: tests/e2e_test.rs, tests/auth_test.rs
  coverage_areas:
    - Basic proxy with/without secrets
    - Authentication mismatch scenarios
    - Invalid address handling
    - Long frame attack prevention (1MB limit)
    - Half-closed TCP stream handling
  test_patterns:
    - SERIAL_GUARD mutex for serial test execution
    - rstest for parameterized tests
    - tokio::io::duplex for controlled test environment

extension_points:
  - location: src/shared.rs:24-53
    hook: ClientMessage/ServerMessage enums
    example: Add new message types for protocol extensions
  - location: src/auth.rs:12
    hook: Authenticator struct
    example: Replace with different authentication scheme
  - location: src/server.rs:107-115
    hook: Port allocation algorithm
    example: Override random selection with reservation system
  - location: Transport layer
    hook: TCP replacement
    example: Replace with WebSockets, QUIC, or add TLS

supported_protocols:
  - name: TCP
    role: "sole transport layer — client and server communicate exclusively over persistent TCP connections for both control and proxied data channels"
  - name: "null-delimited JSON framing (custom wire protocol)"
    role: "application-layer framing over TCP for control messages (Hello, Auth, Connection, Accept) using null-byte delimiters"
  - name: "HMAC-SHA256 challenge-response"
    role: "optional authentication protocol where server sends UUID challenge and client responds with HMAC-SHA256(secret, challenge)"
