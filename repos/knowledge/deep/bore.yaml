category: tunneling

# Inherited from shallow file
summary: |
  A minimalist TCP tunnel (~400 lines of async Rust) that exposes local ports to a public server,
  bypassing NAT firewalls. Designed for simplicity and self-hosting with no frills.

# Deep additions
architecture:
  module_breakdown:
    - module: src/client.rs
      responsibility: Client implementation - establishes control connection, handles incoming connections
      key_files: [src/client.rs]
    - module: src/server.rs
      responsibility: Server implementation - accepts clients, manages port allocation, proxies connections
      key_files: [src/server.rs]
    - module: src/shared.rs
      responsibility: Protocol definitions - message types, delimited codec, constants
      key_files: [src/shared.rs]
    - module: src/auth.rs
      responsibility: HMAC authentication using SHA256 challenge-response
      key_files: [src/auth.rs]
    - module: src/main.rs
      responsibility: CLI entry point with clap subcommands
      key_files: [src/main.rs]
  data_flow: |
    1. Client connects to server control port (7835)
    2. Optional HMAC authentication handshake
    3. Client sends Hello(port) requesting port forwarding
    4. Server assigns port, responds with Hello(actual_port)
    5. When external traffic hits server port, server sends Connection(uuid) to client
    6. Client opens new TCP stream, sends Accept(uuid)
    7. Server bidirectionally proxies bytes between both connections
  key_abstractions:
    - name: Delimited<T>
      purpose: Null-delimited JSON framing for control messages
    - name: Authenticator
      purpose: HMAC-SHA256 challenge-response authentication
    - name: DashMap<Uuid, TcpStream>
      purpose: Concurrent map for pending connections on server

implementation_patterns:
  - pattern: Async Tokio Runtime
    description: tokio::spawn for concurrent connection handling, copy_bidirectional for data transfer
    location: src/client.rs:88, src/server.rs:67
  - pattern: Null-Delimited JSON Framing
    description: Messages framed with null byte for clean separation over TCP
    location: src/shared.rs:65-99
  - pattern: HMAC Challenge-Response
    description: Server sends UUID challenge, client responds with HMAC-SHA256(secret, challenge)
    location: src/auth.rs:22-48
  - pattern: Bidirectional Copy
    description: tokio::io::copy_bidirectional for efficient byte forwarding
    location: src/client.rs:116, src/server.rs:178
  - pattern: Connection Timeout
    description: 10-second timeout for pending connections before cleanup
    location: src/server.rs:162-166

configuration:
  file: CLI flags only (no config file)
  options:
    # Client options
    - name: local_port
      type: u16
      default: required
      description: Local port to expose
    - name: local_host
      type: String
      default: "localhost"
      description: Local host to bind
    - name: to
      type: String
      default: required
      description: Remote server address
    - name: port
      type: u16
      default: 0
      description: Requested remote port (0 for auto-assign)
    - name: secret
      type: Option<String>
      default: None
      description: Authentication secret
    # Server options
    - name: min_port
      type: u16
      default: 1024
      description: Minimum port in allocation range
    - name: max_port
      type: u16
      default: 65535
      description: Maximum port in allocation range
    - name: secret
      type: Option<String>
      default: None
      description: Required authentication secret
    - name: bind_addr
      type: IpAddr
      default: "0.0.0.0"
      description: Address to bind control port
  env_vars:
    - BORE_LOCAL_PORT
    - BORE_SERVER
    - BORE_SECRET
    - BORE_MIN_PORT
    - BORE_MAX_PORT

