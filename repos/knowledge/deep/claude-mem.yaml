key_features:
  - feature: "Hook runtime degrades gracefully when the worker is unavailable"
    description: "The hook command classifies transport failures, timeouts, HTTP 5xx, and 429 responses as transient and exits successfully instead of blocking the host editor."
  - feature: "Context generation is exposed as a reusable service layer"
    description: "The context module re-exports `generateContext`, token calculators, timeline builders, and observation query helpers."
  - feature: "SQLite storage is a first-class subsystem"
    description: "The SQLite index re-exports database initialization, migrations, CRUD modules, FTS-backed search, and transaction helpers."
  - feature: "Transcript ingestion tails live JSONL files"
    description: "The watcher tracks byte offsets, rescans globs or directories, and streams parsed transcript lines through `TranscriptEventProcessor`."
  - feature: "Supervisor enforces single-worker semantics"
    description: "The supervisor checks a PID file, starts health monitoring, and tears down stale PID records before allowing a worker to run."
architecture:
  module_breakdown:
    - module: "src/cli/"
      responsibility: "Hook command entrypoint, platform adapters, and event handlers for Claude Code integration."
      key_files: ["src/cli/hook-command.ts", "src/cli/adapters/claude-code.ts"]
    - module: "src/services/context/"
