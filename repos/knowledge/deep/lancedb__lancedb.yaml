    - rust/lancedb/src/lib.rs
    - rust/lancedb/src/connection.rs
  - module: python/python/lancedb
    responsibility: "Python client API for table management, ingestion, and vector queries."
    key_files:
    - python/python/lancedb/__init__.py
    - python/python/lancedb/table.py
  - module: node/src
    responsibility: "TypeScript bindings and client surface for Node.js consumers."
    key_files:
    - node/src/index.ts
  key_abstractions:
  - name: Connection
    purpose: "Primary handle for creating tables and issuing vector or hybrid queries."
  - name: Table
    purpose: "Logical dataset abstraction with schema, data mutation, and index operations."
  - name: QueryBuilder
    purpose: "Composable query interface for vector search, filtering, and reranking options."

code_patterns:
- pattern: "Builder-style query construction"
  description: "Query options chain through fluent methods before execution."
  location: python/python/lancedb/table.py
- pattern: "Arrow-first data interchange"
  description: "Arrow data structures are used as canonical in-memory representation for table IO."
  location: rust/lancedb/src
- pattern: "Multi-language binding surface"
  description: "Rust core capabilities are surfaced through Python and Node bindings."
  location: rust/lancedb/src/lib.rs

implementation_patterns:
- pattern: "Index-aware search dispatch"
  description: "Search execution path chooses ANN-capable routes when index metadata is present."
  location: rust/lancedb/src
- pattern: "Schema-on-write validation"
  description: "Incoming rows are validated against table schema before persistence."
  location: python/python/lancedb/table.py

