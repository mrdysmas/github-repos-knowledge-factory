name: llguidance
node_id: repo::microsoft/llguidance
github_full_name: microsoft/llguidance
html_url: https://github.com/microsoft/llguidance
source: remote_metadata
provenance:
  shard: repos
  source_file: repos/knowledge/deep/microsoft__llguidance.yaml
  as_of: '2026-03-05'
directory: remote::microsoft/llguidance
category: agent_framework

architecture:
  module_breakdown:
  - module: parser_core
    responsibility: "Parses guidance grammar definitions and builds executable constraint representations."
    key_files:
    - src/lib.rs
    - src/parser
  - module: runtime_guidance
    responsibility: "Applies grammar constraints during token selection and generation loops."
    key_files:
    - src/runtime
  - module: bindings
    responsibility: "Exposes integration points for external inference stacks and orchestration layers."
    key_files:
    - python/
    - js/
  key_abstractions:
  - name: GuidanceGrammar
    purpose: "Constraint definition object describing allowed output structure."
  - name: TokenConstraintEngine
    purpose: "Runtime evaluator that prunes invalid token candidates."
  - name: IntegrationAdapter
    purpose: "Bridge from model provider token streams into constrained decoding logic."

code_patterns:
- pattern: "Grammar-to-runtime compilation"
  description: "Static guidance rules are compiled into structures optimized for decoding-time checks."
  location: src/parser
- pattern: "Constraint-first decoding loop"
  description: "Token selection flow validates candidate tokens against active grammar state."
  location: src/runtime
- pattern: "Provider adapter boundary"
  description: "Bindings separate inference-provider details from core guidance logic."
  location: python/

implementation_patterns:
- pattern: "State-machine decoding"
  description: "Runtime tracks grammar progress as state transitions across emitted tokens."
  location: src/runtime
- pattern: "Deterministic validation path"
  description: "Constraint checks prefer deterministic acceptance or rejection for each token step."
  location: src/lib.rs

core_modules:
  grammar_parser:
    path: src/parser
    description: "Parses and normalizes guidance grammar definitions."
  decode_runtime:
    path: src/runtime
    description: "Constraint-aware generation runtime."
  interface_layers:
    path: python/
    description: "Language bindings and integration adapters."

key_features:
- feature: "Constrained generation guidance"
  description: "Enforces grammar and schema constraints while generating model output."
- feature: "Deterministic output structure control"
  description: "Reduces malformed outputs by validating token choices at decode time."
- feature: "Inference stack integration"
  description: "Provides adapter surfaces for model-serving and orchestration systems."

key_files:
- path: README.md
  description: "Project overview, usage model, and integration notes."
- path: src/lib.rs
  description: "Core crate exports and top-level runtime wiring."
- path: src/parser
  description: "Grammar parsing and normalization modules."
- path: src/runtime
  description: "Constraint enforcement during generation."

configuration:
- name: guidance_runtime
  options:
  - key: grammar_definition
    description: "Grammar or schema payload used to constrain model output."
  - key: max_tokens
    description: "Upper bound for generated token count."
  - key: strict_mode
    description: "Toggle that controls strict enforcement behavior for invalid candidates."
- name: integration_options
  options:
  - key: model_provider
    description: "Target inference provider bound to guidance runtime."
  - key: tokenizer
    description: "Tokenizer mapping used to align grammar checks with token stream."

testing:
  framework: mixed
  structure: "Validation covers grammar parsing, constrained decoding behavior, and adapter integration paths."
  coverage_areas:
  - "Grammar parse correctness and normalization"
  - "Runtime token constraint enforcement"
  - "Integration adapter behavior"
  test_patterns:
  - "cargo test"
  - "pytest"

integrations:
  runtime:
  - LLM inference providers
  - tokenizer stacks
  usage:
  - agent workflow frameworks
  - structured output pipelines

quick_reference:
- topic: "Build core library"
  command: "cargo build"
- topic: "Run tests"
  command: "cargo test"

commands:
- name: "cargo build"
  description: "Compile core guidance crates."
  usage: "cargo build"
- name: "cargo test"
  description: "Run parser and runtime test suites."
  usage: "cargo test"

api_surface:
  public_functions:
  - name: parse_grammar
    purpose: "Parse guidance grammar into normalized internal form."
    location: src/parser
  - name: apply_constraints
    purpose: "Filter token candidates based on active grammar state."
    location: src/runtime
  - name: guided_decode
    purpose: "Run constrained generation loop over provider token stream."
    location: src/lib.rs
