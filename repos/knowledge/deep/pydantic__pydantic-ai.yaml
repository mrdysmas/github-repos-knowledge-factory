name: pydantic-ai
node_id: repo::pydantic/pydantic-ai
github_full_name: pydantic/pydantic-ai
html_url: https://github.com/pydantic/pydantic-ai
source: remote_metadata
provenance:
  shard: repos
  source_file: repos/knowledge/deep/pydantic__pydantic-ai.yaml
  as_of: '2026-02-25'
  sourcing_method: code_verified
  extraction_model: glm-5
  extraction_agent: kgraph-repos
sparse: false

description: Python-first agent framework with typed models, tool calling, and provider-agnostic adapters.

tech_stack:
  - Python
  - Pydantic
  - typing_extensions
  - OpenTelemetry-compatible observability
  - MkDocs

testing:
  framework: pytest with pytest-xdist and examples/doc hooks
  structure: tests plus docs hooks configured in pyproject
  coverage_areas:
    - typed agent behavior and message validation
    - model/provider adapters and tool invocation
    - eval and observability integration points
  test_patterns:
    - pytest
    - pytest -n auto
    - ruff check .
    - mypy
    - pyright

quick_reference:
  - topic: Install and run
    content: |
      python -m pip install pydantic-ai
      pytest

  - topic: Docs navigation
    content: |
      /agents
      /models/overview
      /tools
      /mcp/overview
      /graph

  - topic: Quality checks
    content: |
      ruff check .
      mypy
      pyright

integrations:
  providers:
    - OpenAI
    - Anthropic
    - Gemini
    - Ollama
    - LiteLLM
    - Bedrock
    - Vertex AI
  protocols:
    - Model Context Protocol (MCP)
    - Agent2Agent (A2A)
  api_endpoints:
    - path: /agents
      method: GET
      description: docs entry for typed agent API patterns
    - path: /models/overview
      method: GET
      description: docs entry for model and provider adapters

api_structure:
  docs_surface:
    - path: /agents
      operations:
        - GET
    - path: /models/overview
      operations:
        - GET
    - path: /tools
      operations:
        - GET
    - path: /mcp/overview
      operations:
        - GET
    - path: /graph
      operations:
        - GET
