# --- STRUCTURE ---

architecture:
  overview: |
    Kubernetes operator built with controller-runtime (Go). The operator watches CRD
    objects (ExternalSecret, ClusterExternalSecret, SecretStore, ClusterSecretStore)
    and reconciles them by fetching secret values from configured external backends
    and writing the results as native Kubernetes Secrets. Providers are implemented
    as a pluggable interface under pkg/provider/, with one package per backend.
  module_breakdown:
    - module: apis/externalsecrets/v1beta1
      responsibility: CRD type definitions — ExternalSecret, ClusterExternalSecret,
        SecretStore, ClusterSecretStore Go structs and generated deepcopy/status methods
      key_files: [apis/externalsecrets/v1beta1/externalsecret_types.go, apis/externalsecrets/v1beta1/secretstore_types.go]
    - module: pkg/provider
      responsibility: Provider interface and per-backend implementations (aws, vault, gcpsm,
        azure, kubernetes, etc.); each sub-package implements the SecretClient interface
      key_files: [pkg/provider/provider.go, pkg/provider/aws/secretsmanager/secretsmanager.go]
    - module: pkg/controllers/externalsecret
      responsibility: Core reconciliation loop — resolves SecretStore/ClusterSecretStore ref,
        calls provider to fetch secret data, writes/patches Kubernetes Secret
      key_files: [pkg/controllers/externalsecret/externalsecret_controller.go]
    - module: pkg/controllers/secretstore
      responsibility: Reconciles SecretStore resources — validates provider config and
        connectivity; sets Ready condition
      key_files: [pkg/controllers/secretstore/secretstore_controller.go]
    - module: pkg/controllers/clusterexternalsecret
      responsibility: Reconciles ClusterExternalSecret — stamps ExternalSecret objects into
        namespaces matching the configured namespaceSelector
      key_files: [pkg/controllers/clusterexternalsecret/clusterexternalsecret_controller.go]
  key_abstractions:
    - name: SecretClient interface
      purpose: Provider contract — GetSecret, GetSecretMap, GetAllSecrets, Close; all backends implement this
    - name: Reconciliation loop
      purpose: controller-runtime Reconcile() called on ExternalSecret events; fetches values and writes k8s Secret
    - name: refreshInterval
      purpose: ExternalSecret field controlling how often the operator re-syncs from the backend

key_features:
  - CRD-based declarative secret synchronization into Kubernetes Secrets
  - Support for 20+ backends including AWS SM, Vault, GCP SM, Azure KV, Doppler, 1Password
  - ClusterExternalSecret for multi-namespace rollout with namespaceSelector
  - Merge strategies (Replace, Merge) for combining multiple backend values into one Secret
  - refreshInterval and immutable options on ExternalSecret for TTL and one-shot sync
  - Validating admission webhook to reject malformed ExternalSecret/SecretStore manifests
  - Prometheus metrics and status conditions on each CRD for observability

key_files:
  - path: apis/externalsecrets/v1beta1/externalsecret_types.go
    description: ExternalSecret CRD Go types — spec, status, data/dataFrom fields
  - path: apis/externalsecrets/v1beta1/secretstore_types.go
    description: SecretStore CRD Go types — provider configs for all backends
  - path: pkg/controllers/externalsecret/externalsecret_controller.go
    description: Main reconcile loop — resolves store, fetches secrets, writes k8s Secret
  - path: pkg/provider/aws/secretsmanager/secretsmanager.go
    description: AWS Secrets Manager provider implementation
  - path: pkg/provider/vault/vault.go
    description: HashiCorp Vault provider implementation

# --- TASKS ---

common_tasks:
  - task: Install the ESO operator via Helm
    steps:
      - helm repo add external-secrets https://charts.external-secrets.io
      - helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
      - Verify CRDs installed with kubectl get crds | grep external-secrets
    key_files: [deploy/charts/external-secrets/]

  - task: Configure a SecretStore for AWS Secrets Manager
    steps:
      - Create SecretStore manifest with spec.provider.aws.service=SecretsManager and spec.provider.aws.region
      - Set auth method — for IRSA annotate the ESO service account with iam.amazonaws.com/role-arn
      - kubectl apply the SecretStore and verify Ready=True via kubectl describe secretstore
    key_files: [apis/externalsecrets/v1beta1/secretstore_types.go]

  - task: Sync a secret from AWS Secrets Manager into a Kubernetes Secret
    steps:
      - Create ExternalSecret with spec.secretStoreRef pointing to the SecretStore
      - Set spec.target.name to desired k8s Secret name and spec.refreshInterval
      - Add spec.data entries mapping backend keys to target keys
      - kubectl apply and observe status.conditions for SecretSynced=True
    key_files: [pkg/controllers/externalsecret/externalsecret_controller.go]

  - task: Roll out a secret across multiple namespaces
    steps:
      - Create ClusterExternalSecret with spec.namespaceSelector matching target namespaces
      - Set spec.externalSecretSpec to the ExternalSecret template to stamp
      - Operator creates ExternalSecret in each matching namespace automatically
    key_files: [pkg/controllers/clusterexternalsecret/clusterexternalsecret_controller.go]

# --- FAILURES ---

troubleshooting:
  - issue: ExternalSecret stuck in SecretSyncedError — backend authentication failure
    symptom: status.conditions shows SecretSyncedError with 401 or 403 from provider
    cause: IAM role trust policy missing, IRSA annotation absent on ESO service account,
      or Vault token expired; provider returns auth error
    solution: Check SecretStore status conditions for exact error; verify IAM role ARN and
      trust policy allows the ESO service account; for Vault confirm token TTL and auth method;
      rotate credentials and re-apply SecretStore

  - issue: CRD validation webhook rejects ExternalSecret or SecretStore on apply
    symptom: Error from server (Forbidden) or admission webhook rejection on kubectl apply
    cause: Required fields missing (spec.secretStoreRef.name, spec.target) or enum values
      misspelled; or ESO webhook version mismatch with installed CRDs
    solution: Read the webhook rejection message for the specific field; compare against CRD
      schema with kubectl explain externalsecret.spec; ensure ESO chart version matches CRD version

  - issue: RBAC Forbidden — operator cannot write target Kubernetes Secret
    symptom: Controller logs show "cannot create resource secrets in namespace X"
    cause: ESO ClusterRole does not include create/update/patch on Secrets in the target namespace;
      common when namespace has restrictive NetworkPolicy or RBAC constraints
    solution: Inspect ESO operator pod logs; verify ClusterRoleBinding grants ESO service account
      create/update/patch on secrets; use kubectl auth can-i to verify permissions

  - issue: ExternalSecret reconciliation not progressing — SecretStore not found
    symptom: ExternalSecret stays in Pending; status shows "cannot find SecretStore"
    cause: spec.secretStoreRef.name or kind (SecretStore vs ClusterSecretStore) does not match
      the actual resource name; or SecretStore is in wrong namespace
    solution: kubectl describe the ExternalSecret for the exact storeRef error; verify
      spec.secretStoreRef.kind is SecretStore (namespaced) or ClusterSecretStore (cluster-scoped)

# --- PROTOCOLS ---

api_protocols:
  - AWS Secrets Manager API
  - HashiCorp Vault API
  - GCP Secret Manager API
  - Kubernetes API

supported_protocols:
  - name: AWS Secrets Manager API
    role: Provider calls GetSecretValue/BatchGetSecretValue via AWS SDK v2; auth via IRSA,
      static credentials, or assumed role configured in SecretStore.spec.provider.aws
  - name: HashiCorp Vault API
    role: Provider reads from KV v1/v2 and dynamic engines via Vault HTTP API; auth via
      Kubernetes auth method, AppRole, JWT, or token configured in SecretStore.spec.provider.vault
  - name: GCP Secret Manager API
    role: Provider fetches secret versions via GCP Secret Manager REST API; auth via
      Workload Identity or service account key in SecretStore.spec.provider.gcpsm
  - name: Kubernetes API (controller-runtime)
    role: Operator watches and reconciles ExternalSecret/SecretStore resources via
      controller-runtime; writes output as native Kubernetes Secrets via PATCH/CREATE
