name: awesome-llm-apps
node_id: repo::shubhamsaboo/awesome-llm-apps
github_full_name: shubhamsaboo/awesome-llm-apps
html_url: https://github.com/shubhamsaboo/awesome-llm-apps
source: repos
provenance:
  shard: repos
  source_file: repos/knowledge/deep/awesome_llm_apps.yaml
  as_of: '2026-02-25'
type: examples_collection
description: Curated collection of LLM application examples across multiple domains

architecture:
  style: examples_collection
  note: "This is an examples repository, not a framework. Each example is self-contained."

categories:
  - name: starter_ai_agents
    path: starter_ai_agents/
    description: Simple entry-level AI agent applications
    count: 11+
    examples:
      - basic chatbot
      - tool-using agent
      - multi-model comparison

  - name: advanced_ai_agents
    path: advanced_ai_agents/
    description: Complex agent systems with advanced capabilities
    subcategories:
      - single_agent: Single agent with complex tool use
      - multi_agent: Multiple specialized agents with coordination
      - game_playing: Agents that play games (chess, etc.)

  - name: rag_tutorials
    path: rag_tutorials/
    description: RAG implementation examples
    count: 18+
    topics:
      - basic RAG pipeline
      - hybrid search
      - reranking
      - multi-modal RAG
      - conversational RAG

  - name: advanced_llm_apps
    path: advanced_llm_apps/
    description: Advanced LLM applications
    topics:
      - chat_with_X: Chat with documents, code, databases
      - memory_systems: Short/long-term memory implementations
      - fine_tuning: Fine-tuning workflows
      - evaluation: Model evaluation apps

  - name: mcp_ai_agents
    path: mcp_ai_agents/
    description: Model Context Protocol implementations
    count: 5
    topics:
      - MCP server integration
      - tool discovery
      - resource management

  - name: voice_ai_agents
    path: voice_ai_agents/
    description: Voice-enabled AI applications
    count: 4
    topics:
      - speech-to-text
      - text-to-speech
      - voice conversation

technology_stack:
  ui_framework:
    - name: Streamlit
      usage: "~90% of examples"
      purpose: Rapid UI prototyping

  agent_frameworks:
    - name: Agno
      version: "2+"
      purpose: Primary agent framework
    - name: LangChain
      purpose: Alternative for some examples
    - name: LlamaIndex
      purpose: RAG-focused examples

  vector_databases:
    - Qdrant
    - Chroma
    - FAISS

  llm_providers:
    cloud:
      - OpenAI (GPT-4, GPT-3.5)
      - Anthropic (Claude)
      - Google (Gemini)
      - xAI (Grok)
    local:
      - Ollama
      - vLLM

  rag_frameworks:
    - Embedchain
    - LangChain
    - LlamaIndex

common_patterns:
  configuration:
    - pattern: environment_variables
      description: API keys stored in .env files
      example: "OPENAI_API_KEY, ANTHROPIC_API_KEY"

  implementation:
    - pattern: dual_implementation
      description: Many examples provide both cloud and local model versions
      files: ["*_local.py", "*_cloud.py"]

    - pattern: multi_agent_coordination
      description: Agents with specialized roles coordinated by orchestrator
      roles: ["researcher", "writer", "reviewer", "coder"]

  project_structure:
    typical_example: |
      example_name/
      ├── app.py              # Streamlit main entry
      ├── requirements.txt    # Dependencies
      ├── README.md           # Instructions
      ├── utils.py            # Helper functions
      └── .env.example        # Environment template

key_files:
  - path: README.md
    description: Collection overview and navigation

  - path: starter_ai_agents/
    description: Entry point for beginners

  - path: rag_tutorials/
    description: Most comprehensive RAG examples

usage_patterns:
  running_examples:
    - command: "streamlit run app.py"
      description: Standard Streamlit launch
    - command: "pip install -r requirements.txt"
      description: Install dependencies first

  customization:
    - step: Copy example directory
    - step: Modify .env with API keys
    - step: Adjust model selection in code
    - step: Extend with custom tools/data

integration_points:
  - Connects to multiple LLM providers via unified interfaces
  - Uses standard vector DB APIs
  - Leverages Agno/LangChain for orchestration

notes:
  - Each example is standalone - no shared codebase
  - Good for learning patterns, not production deployment
  - Chinese comments in some examples
  - Active development with regular additions
