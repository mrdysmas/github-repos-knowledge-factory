name: teleport
node_id: repo::gravitational/teleport
github_full_name: gravitational/teleport
html_url: https://github.com/gravitational/teleport
source: repos
provenance:
  shard: repos
  source_file: repos/knowledge/deep/teleport.yaml
  as_of: '2026-02-25'
  sourcing_method: code_verified
  extraction_model: glm-5
  extraction_agent: kgraph-repos
directory: teleport-master
category: remote_access

# Inherited from shallow file
summary: |
  Identity-aware access plane that provides unified connectivity, authentication, access controls,
  and audit for infrastructure. Replaces SSH keys, VPNs, and bastion hosts with short-lived
  certificate-based auth and Just-in-Time access across SSH, Kubernetes, databases, and cloud APIs.

# Deep additions
architecture:
  module_breakdown:
    - module: lib/service/
      responsibility: Core service orchestration - manages all service lifecycles
      key_files: [lib/service/service.go, lib/service/servicecfg/config.go]
    - module: lib/auth/
      responsibility: Certificate authority, access control, user management
      key_files: [lib/auth/auth.go, lib/auth/authclient/]
    - module: lib/proxy/
      responsibility: Identity-aware reverse proxy, web UI, session management
      key_files: [lib/proxy/]
    - module: lib/srv/
      responsibility: SSH server, database proxy, app access implementations
      key_files: [lib/srv/]
    - module: lib/backend/
      responsibility: Storage abstraction (SQLite, DynamoDB, PostgreSQL, etcd, Firestore)
      key_files: [lib/backend/backend.go]
    - module: api/
      responsibility: Public API types, client interfaces, protocol definitions
      key_files: [api/types/, api/client/]
    - module: tool/teleport/
      responsibility: Main daemon entry point and CLI handling
      key_files: [tool/teleport/main.go, tool/teleport/common/teleport.go]
    - module: tool/tsh/
      responsibility: User client for SSH, kubectl, db proxy
      key_files: [tool/tsh/main.go]
    - module: tool/tctl/
      responsibility: Admin tool for cluster management
      key_files: [tool/tctl/main.go]
  data_flow: |
    1. Client connects to Proxy service
    2. Proxy forwards to Auth service for authentication
    3. Auth validates credentials, issues short-lived certificates
    4. Client presents certificates to target services (SSH, DB, Kube, App)
    5. All actions logged to audit system
    6. Session recording captured for compliance
  key_abstractions:
    - name: TeleportProcess
      purpose: Main daemon controller with Supervisor for process management
    - name: Auth Server
      purpose: Central CA for certificate signing and RBAC enforcement
    - name: Proxy Service
      purpose: Identity-aware reverse proxy terminating all connections
    - name: Backend
      purpose: Storage abstraction for cluster state

implementation_patterns:
  - pattern: Supervisor Pattern
    description: Process management with restart capabilities
    location: lib/service/service.go:626
  - pattern: Repository Pattern
    description: Backend storage abstraction with multiple implementations
    location: lib/backend/backend.go
  - pattern: Certificate-Based Auth
    description: Short-lived TLS/SSH certificates instead of long-lived keys
    location: lib/auth/auth.go
  - pattern: gRPC Services
    description: Inter-service communication via gRPC
    location: api/gen/proto/
  - pattern: Configuration Merge
    description: defaults -> file-based -> CLI flags precedence
    location: tool/teleport/common/teleport.go

configuration:
  file: /etc/teleport.yaml (YAML)
  options:
    - name: version
      type: string
      default: "v1"
      description: Config file version
    - name: data_dir
      type: string
      default: "/var/lib/teleport"
      description: Local state directory
    - name: join_method
      type: string
      default: ""
      description: How node joins cluster (token, iam, ec2, etc.)
    - name: auth.enabled
      type: bool
      default: true
      description: Enable auth service on this node
    - name: proxy.enabled
      type: bool
      default: true
      description: Enable proxy service
    - name: ssh.enabled
      type: bool
      default: true
      description: Enable SSH service
    - name: auth.listen_addr
      type: string
      default: "0.0.0.0:3025"
      description: Auth service listen address
    - name: proxy.listen_addr
      type: string
      default: "0.0.0.0:3023"
      description: Proxy SSH listen address
    - name: proxy.web_addr
      type: string
      default: "0.0.0.0:3080"
      description: Proxy web UI address

api_surface:
  public_functions:
    - name: service.Run
      signature: func Run(ctx context.Context, cfg servicecfg.Config, privateKey []byte) error
      purpose: Start teleport service with configuration
      location: lib/service/service.go
    - name: auth.NewServer
      signature: func NewServer(cfg auth.InitConfig) (*Server, error)
      purpose: Create auth server instance
      location: lib/auth/auth.go
    - name: client.New
      signature: func New(ctx context.Context, cfg client.Config) (*Client, error)
      purpose: Create API client for programmatic access
      location: api/client/client.go
  binaries:
    - name: teleport
      purpose: Main daemon (auth, proxy, node, app, db, kube roles)
    - name: tsh
      purpose: User client (SSH, kubectl, db proxy)
    - name: tctl
      purpose: Admin tool (users, roles, tokens, config)
    - name: tbot
      purpose: Machine identity agent for workloads

testing:
  framework: Go testing with extensive mocks
  structure: integration/, lib/*_test.go, e2e/
  coverage_areas:
    - Authentication flows (passwordless, MFA, SSO)
    - Certificate signing and validation
    - SSH, Kubernetes, Database access
    - Session recording and audit
    - RBAC and access requests
    - Multi-cluster federation

extension_points:
  - location: lib/modules/
    hook: Module interface
    example: Add enterprise features, custom crypto, FIPS compliance
  - location: lib/backend/
    hook: Backend interface
    example: Add new storage backend (e.g., CockroachDB)
  - location: api/types/
    hook: Resource interfaces
    example: Add custom resource types
  - location: lib/auth/
    hook: Authentication plugins
    example: Custom MFA providers, identity providers

notes: |
  Architecture highlights:
  - Single Go binary with multiple roles (auth, proxy, node, app, db, kube)
  - gRPC for internal service communication
  - Multiple backend options: SQLite, DynamoDB, etcd, Firestore, PostgreSQL
  - Web UI built in TypeScript (web/ directory)
  - Supports both self-hosted and Teleport Cloud (SaaS)
  - License: AGPL-3.0 (core), Apache 2.0 (API module), commercial for Enterprise

commands:
  - name: "tsh login --proxy=proxy.example.com"
    description: "Authenticate to a Teleport cluster and obtain short-lived certificates stored in ~/.tsh"
  - name: "tsh ssh user@hostname"
    description: "SSH to a registered Teleport node using certificate-based authentication"
  - name: "tsh kube login cluster-name"
    description: "Obtain kubeconfig credentials for a registered Kubernetes cluster via Teleport"
  - name: "tsh db login --db-user=postgres dbname"
    description: "Obtain short-lived credentials to connect to a registered database via Teleport proxy"
  - name: "tctl users add username --roles=editor,access"
    description: "Create a new Teleport user and assign RBAC roles"
  - name: "tctl tokens add --type=node --ttl=1h"
    description: "Generate a one-time join token for adding a new SSH node to the cluster"
  - name: "teleport start --config=/etc/teleport.yaml"
    description: "Start the Teleport daemon with the specified config (enables auth, proxy, and node roles by default)"
  - name: "tbot start --config=/etc/tbot.yaml"
    description: "Start the machine identity agent (tbot) to continuously renew short-lived credentials for workloads"

supported_protocols:
  - name: SSH
    role: "Encrypted terminal access to registered nodes; Teleport proxy acts as an SSH certificate authority and session recorder"
  - name: "TLS/mTLS"
    role: "All inter-service communication and client-to-proxy connections use mutual TLS with short-lived certificates issued by the Teleport CA"
  - name: gRPC
    role: "Internal service-to-service communication between auth, proxy, and node services; also used by the public API client"
  - name: "Kubernetes API (HTTPS)"
    role: "Proxied kubectl and Kubernetes API access with Teleport RBAC enforcement layered on top of Kubernetes RBAC"
  - name: "PostgreSQL/MySQL wire protocol"
    role: "Database proxy speaks native wire protocols so existing clients (psql, mysql) connect without modification"
