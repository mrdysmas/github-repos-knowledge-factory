      - key: vector_store
        default: "{}"
        description: Vector database configuration
      - key: llm
        default: "{}"
        description: LLM provider configuration
      - key: embedder
        default: "{}"
        description: Embedding model configuration
      - key: history_db_path
        default: "~/.mem0/history.db"
        description: Path to history database
      - key: graph_store
        default: "{}"
        description: Graph store for knowledge graphs
      - key: reranker
        default: "null"
        description: Optional reranker configuration
      - key: version
        default: "v1.1"
        description: Memory config version
      - key: custom_fact_extraction_prompt
        default: "null"
        description: Custom prompt for fact extraction
      - key: custom_update_memory_prompt
        default: "null"
        description: Custom prompt for memory updates

  - name: LLM Providers
    options:
      - key: provider
        default: "openai"
        description: "Provider: openai, ollama, anthropic, groq, together, etc."
      - key: model
        default: "gpt-4o-mini"
        description: Model name for the provider
      - key: temperature
        default: "0.2"
        description: Sampling temperature
      - key: api_key
        default: ""
        description: API key (or env var)

  - name: Embedder Providers
    options:
      - key: provider
        default: "openai"
        description: "Provider: openai, ollama, huggingface, azure, gemini"
      - key: model
        default: "text-embedding-3-small"
        description: Embedding model name
      - key: embedding_dims
        default: "1536"
        description: Output dimensions

  - name: Qdrant Vector Store
    options:
      - key: collection_name
        default: "mem0"
        description: Collection name
      - key: host
        default: "null"
        description: Qdrant server host
      - key: port
        default: "6333"
        description: Qdrant server port
      - key: path
        default: "null"
        description: Local storage path
      - key: on_disk
        default: "false"
        description: Enable persistent storage
      - key: api_key
        default: "null"
        description: Qdrant Cloud API key

common_tasks:
  - task: Basic Memory Setup
    steps:
      - "pip install mem0ai"
      - "from mem0 import Memory"
      - "memory = Memory()  # Uses defaults: Qdrant local, OpenAI"
      - "Set OPENAI_API_KEY env var"
    gotchas:
      - "Default uses Qdrant in-memory - data lost on restart"
      - "OpenAI API key required for fact extraction (infer=True)"

  - task: Production Configuration
    steps:
      - "Choose vector store: qdrant, pgvector, pinecone, etc."
      - "Configure LLM provider (or use local via ollama)"
      - "Set up embedder (match dims with vector store)"
      - "Create Memory.from_config(config_dict)"
    gotchas:
      - "Embedding dimensions must match vector store expectations"
      - "Use persistent storage (on_disk=True) for production"

  - task: Integrate with AI Agent
    steps:
      - "Create memory tools wrapping add/search"
      - "Pass user_id from agent context to memory calls"
      - "Use search before generation for context"
      - "Save important facts after conversation"
    gotchas:
      - "Always scope with user_id for multi-tenant isolation"
      - "Batch memory adds to reduce LLM calls"

troubleshooting:
  - symptom: No memories found after add
    cause: Missing user_id or wrong scope
    fix: "Always pass user_id (or agent_id/run_id) to both add and search"

  - symptom: Embedding dimension mismatch
    cause: Embedder output doesn't match vector store config
    fix: "Match embedding_dims in embedder config with vector store dimensions"

  - symptom: Slow memory operations
    cause: Large memory count or missing vector index
    fix: "Enable reranking for better results, use smaller top_k, check vector store indexes"

  - symptom: LLM extraction not working
    cause: Missing API key or provider misconfiguration
    fix: "Set api_key in llm config, verify provider name matches exactly"

quick_reference:
  - topic: Memory Operations
    content: |
      ┌──────────────────┬─────────────────────────────────────────┐
      │ Method           │ Description                             │
      ├──────────────────┼─────────────────────────────────────────┤
      │ add()            │ Create memory (LLM extraction)          │
      │ get(id)          │ Retrieve by ID                          │
      │ get_all()        │ List all with filters                   │
      │ search(query)    │ Semantic search                         │
      │ update(id, data) │ Modify memory content                   │
      │ delete(id)       │ Remove memory                           │
      │ delete_all()     │ Bulk delete                             │
      │ history(id)      │ Get change history                      │
      └──────────────────┴─────────────────────────────────────────┘

  - topic: LLM Providers
    content: |
      ┌─────────────────┬─────────────────────────────────────────┐
      │ Provider        │ Notes                                   │
      ├─────────────────┼─────────────────────────────────────────┤
      │ openai          │ Default, requires OPENAI_API_KEY        │
      │ ollama          │ Local, set base_url                     │
      │ anthropic       │ Claude models                           │
      │ groq            │ Fast inference                          │
      │ together        │ Many open models                        │
      │ aws_bedrock     │ AWS managed                             │
      │ azure_openai    │ Azure-hosted OpenAI                     │
      │ gemini          │ Google models                           │
