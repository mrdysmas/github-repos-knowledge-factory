  source_file: repos/knowledge/deep/mem0.yaml
  as_of: '2026-02-25'
sparse: false

code_patterns:
  - name: Memory CRUD Operations
    description: Core memory add, get, search, update, delete operations
    code: |
      # File: mem0/memory/main.py
      from mem0 import Memory

      memory = Memory()

      # ADD - Create memory with LLM fact extraction
      result = memory.add(
          "I prefer dark roast coffee",
          user_id="user123",
          metadata={"category": "preferences"},
          infer=True,  # Use LLM to extract facts
      )

      # GET - Retrieve specific memory
      mem = memory.get(memory_id="mem_abc123")

      # GET_ALL - List all with filters
      memories = memory.get_all(user_id="user123", limit=100)

      # SEARCH - Semantic search
      results = memory.search(
          query="coffee preferences",
          user_id="user123",
          limit=5,
          threshold=0.7,
          rerank=True,
      )

      # UPDATE - Modify memory content
      memory.update(memory_id="mem_abc", data="Updated content")

      # DELETE - Remove memory
      memory.delete(memory_id="mem_abc")
    file_reference: mem0/memory/main.py

  - name: Session Scoping Pattern
    description: Multi-level memory hierarchy with user/agent/run scope
    code: |
      # At least ONE of user_id, agent_id, run_id is REQUIRED

      # User-level memory (persists across agents)
      memory.add(messages, user_id="user123")

      # Agent-level memory (specific to assistant)
      memory.add(messages, user_id="user123", agent_id="assistant_a")

      # Run-level memory (conversation-specific)
      memory.add(messages, user_id="user123", agent_id="assistant_a", run_id="session_xyz")

      # Hierarchy: User > Agent > Run
      # - user_id alone: memories shared across all user's agents
      # - agent_id: memories for specific agent
      # - run_id: ephemeral conversation memories
    file_reference: mem0/memory/main.py

  - name: LLM Provider Configuration
    description: Configure LLM for fact extraction and memory processing
    code: |
      # File: mem0/llms/configs.py
      from mem0.configs.base import MemoryConfig

      config = MemoryConfig(
          llm={
              "provider": "openai",  # 18+ providers
              "config": {
                  "model": "gpt-4o-mini",
                  "temperature": 0.2,
                  "api_key": "sk-...",
              }
          }
      )
      memory = Memory.from_config(config)

      # Supported providers:
      # openai, ollama, anthropic, groq, together, aws_bedrock,
      # litellm, azure_openai, gemini, deepseek, xai, lmstudio, vllm
    file_reference: mem0/llms/configs.py

  - name: Vector Store Backend Configuration
    description: Configure vector database for memory storage
    code: |
      # File: mem0/vector_stores/configs.py
      from mem0 import Memory
      from mem0.configs.vector_stores.qdrant import QdrantConfig

      # Qdrant configuration
      config = {
          "vector_store": {
              "provider": "qdrant",
              "config": {
                  "collection_name": "memories",
                  "host": "localhost",
                  "port": 6333,
                  # or for local:
                  "path": "/tmp/qdrant",
                  "on_disk": True,
              }
          }
      }
      memory = Memory.from_config(config)

      # 26 supported providers:
      # qdrant, chroma, pgvector, pinecone, mongodb, milvus,
      # redis, elasticsearch, weaviate, faiss, supabase, etc.
    file_reference: mem0/vector_stores/configs.py

  - name: Client API Pattern (Cloud)
    description: Cloud API client for hosted Mem0 service
    code: |
      # File: mem0/client/main.py
      from mem0 import MemoryClient

      # Initialize with API key
      client = MemoryClient(api_key="mem0-xxx")  # or MEM0_API_KEY env

      # Core operations (same as OSS Memory)
      client.add([{"role": "user", "content": "I love Python"}], user_id="user1")
      client.search("programming", user_id="user1", limit=5)
      client.get_all(user_id="user1")

      # Async client
      from mem0 import AsyncMemoryClient
      async with AsyncMemoryClient(api_key="...") as client:
          memories = await client.search("query", user_id="user1")

      # Advanced filtering
      filters = {
          "AND": [
              {"category": {"eq": "preferences"}},
              {"priority": {"gte": 3}},
              {"tags": {"in": ["important"]}}
          ]
      }
      client.search("query", user_id="user1", filters=filters)
    file_reference: mem0/client/main.py

  - name: Agent Integration Pattern
    description: Memory tools for AI agents
    code: |
      # Example agent integration
      from mem0 import MemoryClient
      from agents import Agent, function_tool

      mem0 = MemoryClient()

      @function_tool
      def search_memory(query: str, user_id: str) -> str:
          """Search through past conversations and memories"""
          memories = mem0.search(query, user_id=user_id, limit=3)
          return "\n".join([f"- {m['memory']}" for m in memories])

      @function_tool
      def save_memory(content: str, user_id: str) -> str:
          """Save important information to memory"""
          mem0.add([{"role": "user", "content": content}], user_id=user_id)
          return "Information saved."

      agent = Agent(
          name="Assistant",
          instructions="Use memory tools for personalization",
          tools=[search_memory, save_memory],
      )
    file_reference: examples/misc/test.py

