# Key Techniques
techniques:
  - name: Zero-Shot Prompting
    description: Prompts without examples, relying on model's pre-trained knowledge
    use_case: Simple tasks, classification, when examples unavailable

  - name: Few-Shot Prompting
    description: Include examples in prompt to guide model behavior
    use_case: Complex tasks, domain-specific formatting, style imitation

  - name: Chain-of-Thought (CoT)
    description: Explicit step-by-step reasoning in prompt
    use_case: Math, logic, multi-step problems

  - name: Self-Consistency
    description: Multiple reasoning paths, aggregate results
    use_case: High-stakes decisions, reducing variance

  - name: Tree of Thoughts (ToT)
    description: Explore multiple reasoning branches
    use_case: Complex search, planning, creative tasks

  - name: ReAct
    description: Interleave reasoning and external actions
    use_case: Tool use, information retrieval, agents

  - name: RAG
    description: Retrieve relevant context before generation
    use_case: Knowledge-intensive tasks, factual accuracy

  - name: PAL
    description: Generate code to solve problems
    use_case: Mathematical reasoning, data manipulation

  - name: APE
    description: Automatically generate/optimize prompts
    use_case: Prompt optimization, discovery

