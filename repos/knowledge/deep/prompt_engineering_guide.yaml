    description: Deploy documentation site

# Troubleshooting
troubleshooting:
  - issue: Build errors with MDX
    symptom: Syntax errors in markdown files
    cause: Invalid MDX syntax, unclosed tags
    solution: |
      Check MDX syntax validity.
      Ensure all JSX tags are properly closed.
      Verify frontmatter format.

  - issue: Missing translations
    symptom: Pages show in wrong language
    cause: Incomplete localization files
    solution: |
      Check _meta.*.json files for language.
      Add missing translations.
      Verify language code matches.

  - issue: Notebook execution errors
    symptom: Jupyter notebooks fail to run
    cause: Missing dependencies, API keys
    solution: |
      Install required packages.
      Set environment variables for API keys.
      Check kernel configuration.

