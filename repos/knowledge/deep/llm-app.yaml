name: llm-app
node_id: repo::pathwaycom/llm-app
github_full_name: pathwaycom/llm-app
html_url: https://github.com/pathwaycom/llm-app
source: repos
provenance:
  shard: repos
  source_file: repos/knowledge/deep/llm-app.yaml
  as_of: '2026-02-25'
  sourcing_method: code_verified
  extraction_model: glm-5
  extraction_agent: kgraph-repos
sparse: false

code_patterns:
  - name: Basic RAG Query
    description: Question answering with context retrieval
    code: |
      curl -X 'POST' \
        'http://localhost:8000/v2/answer' \
        -H 'Content-Type: application/json' \
        -d '{
          "prompt": "What is the start date of the contract?",
          "k": 6
        }'
    file_reference: templates/question_answering_rag/README.md

  - name: Real-time Document Indexing
    description: Automatically index documents with live updates
    code: |
      # app.yaml
      $sources:
        - !pw.io.fs.read
          path: data
          format: binary
          with_metadata: true
    file_reference: templates/question_answering_rag/app.yaml

  - name: HTTP API Server
    description: RESTful endpoints for RAG operations
    code: |
      # app.py
      from pathway.xpacks.llm.servers import QASummaryRestServer

      server = QASummaryRestServer(
          host="0.0.0.0",
          port=8000,
          question_answerer=qa
      )
    file_reference: templates/question_answering_rag/app.py

  - name: Local Embedding Model
    description: Use local Sentence Transformers without API calls
    code: |
      $embedder: !pw.xpacks.llm.embedders.SentenceTransformerEmbedder
        model: "avsolatorio/GIST-small-Embedding-v0"
        call_kwargs:
          show_progress_bar: False
    file_reference: templates/private_rag/app.yaml

  - name: Docker Deployment
    description: Containerized deployment with volume mounting
    code: |
      # docker-compose.yml
      services:
        app:
          build: .
          ports:
            - "8000:8000"
          volumes:
            - ./data:/app/data
            - ./Cache:/app/Cache
    file_reference: templates/question_answering_rag/docker-compose.yml

  - name: Ollama LLM Integration
    description: Connect to local Ollama for private RAG
    code: |
      $llm: !pw.xpacks.llm.llms.LiteLLMChat
        model: "ollama/mistral"
        api_base: "http://localhost:11434"
        temperature: 0
    file_reference: templates/private_rag/app.yaml

configuration:
  - name: LLM Providers
    options:
      - key: OpenAIChat
        default: "gpt-4.1-mini"
        description: OpenAI chat model (requires API key)
      - key: LiteLLMChat (Ollama)
        default: "ollama/mistral"
        description: Local Ollama model
      - key: api_base
        default: required for Ollama
        description: 'http://localhost:11434 or http://host.docker.internal:11434'

  - name: Embedding Models
    options:
      - key: OpenAIEmbedder
        default: "text-embedding-3-small"
        description: OpenAI embeddings (cloud)
      - key: SentenceTransformerEmbedder
        default: "avsolatorio/GIST-small-Embedding-v0"
        description: Local embeddings (no API)

  - name: Document Sources
    options:
      - key: pw.io.fs.read
        default: required
        description: Local filesystem source
      - key: pw.io.gdrive.read
        default: optional
        description: Google Drive with OAuth credentials
      - key: pw.xpacks.connectors.sharepoint.read
        default: optional
        description: SharePoint (requires license)

  - name: Server Settings
    options:
      - key: host
        default: "0.0.0.0"
        description: Server bind address
      - key: port
        default: "8000"
        description: Server port
      - key: persistence_mode
        default: "UDF_CACHING"
        description: Cache strategy

  - name: Docker Environment
    options:
      - key: OPENAI_API_KEY
        default: required for cloud
        description: OpenAI API key
      - key: PATHWAY_LICENSE_KEY
        default: optional
        description: Pathway enterprise license

common_tasks:
  - task: Set up basic RAG pipeline
    steps:
      - "Choose template: question_answering_rag"
      - "Install: pip install -r requirements.txt"
      - "Set API key in .env: OPENAI_API_KEY=sk-..."
      - "Add documents to data/ folder"
      - "Run: python app.py"
    gotchas:
      - Ensure data/ directory exists
      - First indexing takes time

  - task: Connect to Ollama for local LLM
    steps:
      - "Install Ollama: curl -fsSL https://ollama.com/install.sh | sh"
      - "Start: ollama serve"
      - "Pull model: ollama run mistral"
      - "Use private_rag template"
      - "Set api_base: http://localhost:11434"
    gotchas:
      - Use host.docker.internal:11434 for Docker on Mac/Windows
      - Ensure Ollama running before Pathway

  - task: Configure Google Drive source
    steps:
      - "Create service account credentials JSON"
      - "Set DRIVE_ID environment variable"
      - "Configure refresh_interval: 30"
      - "Specify file_name_pattern filters"
    gotchas:
      - Needs proper OAuth setup
      - File size limits may apply

  - task: Deploy with Docker
    steps:
      - "Build: docker compose build"
      - "Run: docker compose up"
      - "Access at http://localhost:8000"
    gotchas:
      - Mount volumes for data persistence
      - Port mapping might conflict

  - task: Full private RAG (no external APIs)
    steps:
      - "Use private_rag template"
      - "Set local SentenceTransformer embedder"
      - "Configure local Ollama LLM"
      - "No external API calls needed"
    gotchas:
      - GPU recommended for performance
      - Local models are slower than cloud

troubleshooting:
  - symptom: Connection timeouts or refused connections
    cause: Service not running or port conflicts
    fix: |
      ps aux | grep pathway
      lsof -i :8000
      # Try different port in app.yaml

  - symptom: Documents not being indexed
    cause: File permissions or format issues
    fix: |
      ls -la data/
      file data/*.pdf
      # Check logs for parser errors

  - symptom: API authentication or rate limit errors
    cause: Invalid API keys or quota exceeded
    fix: |
      echo $OPENAI_API_KEY
      # Add retry_strategy to config:
      retry_strategy: !pw.udfs.ExponentialBackoffRetryStrategy
        max_retries: 6

  - symptom: Can't connect from Docker host
    cause: Network configuration issues
    fix: |
      # Use host network
      services:
        app:
          network_mode: host

quick_reference:
  - topic: API Endpoints
    content: |
      POST /v1/retrieve      - Retrieve documents
        {"query": "search", "k": 6}

      POST /v2/answer        - Answer question
        {"prompt": "question", "return_context_docs": true}

      POST /v2/list_documents - List indexed docs
      POST /v1/statistics    - Get statistics
      POST /v2/summarize     - Summarize text

  - topic: Environment Variables
    content: |
      OPENAI_API_KEY      - OpenAI API key (cloud models)
      PATHWAY_PORT        - Server port (default: 8000)
      PATHWAY_LICENSE_KEY - Pathway license
      DRIVE_ID            - Google Drive folder ID

  - topic: Docker Commands
    content: |
      docker compose build    - Build image
      docker compose up       - Run (foreground)
      docker compose up -d    - Run (background)
      docker compose logs -f  - View logs
      docker compose down     - Stop
