code_patterns:
  - name: Quart Async API Setup
    description: Flask-like async API with CORS and OpenAPI
    code: |
      # File: api/apps/__init__.py
      from quart import Quart
      from quart_cors import cors
      from quart_schema import QuartSchema

      app = Quart(__name__)
      app = cors(app, allow_origin="*")
      QuartSchema(app)  # OpenAPI support
      app.url_map.strict_slashes = False
      app.json_encoder = CustomJSONEncoder

      # Timeout for LLM responses
      app.config["RESPONSE_TIMEOUT"] = int(
          os.environ.get("QUART_RESPONSE_TIMEOUT", 600)
      )
    file_reference: api/apps/__init__.py

