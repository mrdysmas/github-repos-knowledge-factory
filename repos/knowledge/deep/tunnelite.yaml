name: tunnelite
node_id: repo::cristipufu/tunnelite
github_full_name: cristipufu/tunnelite
html_url: https://github.com/cristipufu/tunnelite
source: repos
provenance:
  shard: repos
  source_file: repos/knowledge/deep/tunnelite.yaml
  as_of: '2026-02-25'
  sourcing_method: code_verified
  extraction_model: glm-5
  extraction_agent: kgraph-repos
