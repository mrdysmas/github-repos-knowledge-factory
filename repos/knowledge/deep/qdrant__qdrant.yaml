description: Rust vector database and search engine with REST and gRPC interfaces.

tech_stack:
  - Rust
  - Actix Web
  - gRPC
  - OpenAPI 3.0
  - Docker

testing:
  framework: cargo test plus integration shell and pytest/openapi checks
  structure: Rust unit tests with HTTP/gRPC integration scripts in tests/
  coverage_areas:
    - collections and point query APIs
    - gRPC parity with REST behavior
    - snapshot and cluster-related operations
  test_patterns:
    - cargo test
    - pytest tests/openapi --durations=10
    - ./tests/basic_grpc_test.sh
    - ./tests/basic_query_grpc_test.sh

quick_reference:
  - topic: Local run
    content: |
      docker run -p 6333:6333 qdrant/qdrant

  - topic: Basic REST examples
    content: |
      curl -X PUT http://localhost:6333/collections/test_collection
      curl http://localhost:6333/collections/test_collection

  - topic: Default ports
    content: |
      6333
      6334

integrations:
  clients:
    - Python client
    - Go client
    - JavaScript/TypeScript client
    - Rust client
    - Java client
  ecosystem:
    - LangChain
    - LlamaIndex
    - Haystack
    - Cohere
  api_endpoints:
    - path: /collections
      method: GET
      description: list collections
    - path: /collections/{collection_name}/points/query
      method: POST
      description: query points with vector and filter
    - path: /collections/{collection_name}/points/search
      method: POST
      description: nearest-neighbor point search

api_structure:
  rest:
    - path: /collections
      operations:
        - GET
    - path: /collections/{collection_name}
      operations:
        - GET
        - PUT
        - DELETE
    - path: /collections/{collection_name}/points/query
      operations:
        - POST
    - path: /collections/{collection_name}/points/search
      operations:
        - POST
    - path: /collections/{collection_name}/points/scroll
      operations:
        - POST
  grpc:
    - path: /grpc/Collections/List
      operations:
        - POST
    - path: /grpc/Points/Upsert
      operations:
        - POST

troubleshooting:
  - symptom: "Collection search returns stale results or HNSW index is not used after bulk upsert"
    cause: "Optimizer has not finished building the HNSW index; segments below indexing_threshold_kb (default 10 MB) use plain brute-force scan rather than the graph index"
    fix: "Wait for optimizer to complete — poll GET /collections/{name} until optimizer_status is ok — or lower indexing_threshold_kb in config.yaml for smaller collections"
  - symptom: "Service fails to start with address already in use on port 6333 or 6334"
    cause: "Another process is bound to the REST port (6333) or gRPC port (6334) configured in service.http_port / service.grpc_port"
    fix: "Change http_port and grpc_port in production.yaml, or stop the conflicting process before starting Qdrant"
  - symptom: "Vector dimension mismatch error on point upsert"
    cause: "Points were inserted with a vector length that does not match the dimension declared when the collection was created"
    fix: "Delete and recreate the collection with the correct dimension, or re-embed data to match the existing collection's vector size"
  - symptom: "WAL segment fills causing write latency spikes"
    cause: "wal_capacity_mb (default 32 MB) segments fill quickly under high write throughput, stalling upserts while a new segment is created"
    fix: "Increase storage.wal.wal_capacity_mb in config.yaml, or reduce write batch sizes to spread segment boundaries"
  - symptom: "Disk full causes Qdrant to stop accepting writes but REST API remains up"
    cause: "Qdrant writes WAL and segment files to storage_path; when disk is exhausted it cannot flush and returns storage errors on write paths"
    fix: "Free disk space or mount a larger volume at the storage_path; Qdrant will resume writes automatically once space is available"
