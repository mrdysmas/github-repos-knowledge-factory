name: ytunnel
node_id: repo::yetidevworks/ytunnel
github_full_name: yetidevworks/ytunnel
html_url: https://github.com/yetidevworks/ytunnel
source: repos
provenance:
  shard: repos
  source_file: repos/knowledge/deep/ytunnel.yaml
  as_of: '2026-02-25'
  sourcing_method: code_verified
  extraction_model: glm-5
  extraction_agent: kgraph-repos
directory: ytunnel-master
category: tunneling

# Inherited from shallow file
summary: |
  TUI-first CLI for managing Cloudflare Tunnels with custom domains - ngrok alternative using your own Cloudflare-managed domain with persistent URLs, multi-account support, and real-time metrics dashboard.

# Deep additions
architecture:
  module_breakdown:
    - module: src/main.rs
      responsibility: Entry point - parses CLI args, dispatches to command handlers or opens TUI
      key_files: [src/main.rs]
    - module: src/cli.rs
      responsibility: CLI command definitions using clap
      key_files: [src/cli.rs]
    - module: src/config.rs
      responsibility: Multi-account configuration management with legacy format migration
      key_files: [src/config.rs]
    - module: src/state.rs
      responsibility: Persistent tunnel state and metadata storage
      key_files: [src/state.rs]
    - module: src/cloudflare.rs
      responsibility: Cloudflare API client for tunnels and DNS management
      key_files: [src/cloudflare.rs]
    - module: src/daemon.rs
      responsibility: Platform-specific service management (launchd/systemd)
      key_files: [src/daemon.rs]
    - module: src/tunnel.rs
      responsibility: Ephemeral tunnel runner with process spawning
      key_files: [src/tunnel.rs]
    - module: src/metrics.rs
      responsibility: Prometheus metrics parsing and collection
      key_files: [src/metrics.rs]
    - module: src/tui/
      responsibility: Terminal UI with ratatui
      key_files: [src/tui/mod.rs, src/tui/app.rs, src/tui/ui.rs]
  data_flow: |
    1. User runs ytunnel command or opens TUI
    2. CLI parses args, loads account config
    3. For persistent tunnels: creates cloudflared tunnel via API
    4. Generates launchd/systemd service file
    5. Service manages cloudflared process lifecycle
    6. TUI polls metrics from cloudflared Prometheus endpoint
  key_abstractions:
    - name: Config
      purpose: Multi-account configuration with selected_account and accounts list
    - name: PersistentTunnel
      purpose: Tunnel metadata including name, account, target, zone, enabled status
    - name: TunnelStatus
      purpose: Running/Stopped/Error status enum
    - name: TunnelMetrics
      purpose: Prometheus metrics including requests, errors, edge locations

implementation_patterns:
  - pattern: Two-Mode Persistence
    description: Ephemeral (ytunnel run) vs persistent (ytunnel add) with different lifecycles
    location: src/main.rs:22-85
  - pattern: Command Layer
    description: Match on CLI commands to dispatch handlers
    location: src/main.rs:22-85
  - pattern: Platform Abstraction
    description: Conditional compilation for macOS launchd vs Linux systemd
    location: src/daemon.rs:13-657
  - pattern: State Migration
    description: Graceful handling of configuration format changes
    location: src/config.rs:133-156
  - pattern: Metrics Port Assignment
    description: Hash-based port calculation in 21000-21999 range
    location: src/metrics.rs

configuration:
  file: TOML format (~/.config/ytunnel/)
  options:
    - name: selected_account
      type: String
      default:
      description: Currently selected account name
    - name: accounts[].name
      type: String
      required: true
      description: Account identifier
    - name: accounts[].api_token
      type: String
      required: true
      description: Cloudflare API token
    - name: accounts[].account_id
      type: String
      required: true
      description: Cloudflare account ID
    - name: accounts[].default_zone_id
      type: String
      description: Default zone for tunnels
    - name: accounts[].default_zone_name
      type: String
      description: Default zone domain name
  tunnel_options:
    - name: name
      type: String
      required: true
      description: Tunnel identifier
    - name: target
      type: String
      required: true
      description: Local address to forward (e.g., localhost:3000)
    - name: hostname
      type: String
      required: true
      description: Public hostname for tunnel
    - name: enabled
      type: bool
      default: true
      description: Whether tunnel is active
    - name: auto_start
      type: bool
      default: false
      description: Start on login (RunAtLoad)
    - name: metrics_port
      type: u16
      description: Prometheus metrics endpoint port

api_surface:
  public_functions:
    - name: config::load_config
      signature: pub fn load_config() -> Result<Config>
      purpose: Load account configuration
      location: src/config.rs
    - name: state::TunnelState::load
      signature: pub fn load() -> Result<TunnelState>
      purpose: Load tunnel state
      location: src/state.rs
    - name: cloudflare::Client
      signature: pub struct Client { ... }
      purpose: Cloudflare API operations
      location: src/cloudflare.rs
    - name: daemon::start_daemon
      signature: "pub async fn start_daemon(...) -> Result<()>"
      purpose: Control background services
      location: src/daemon.rs
    - name: metrics::TunnelMetrics::fetch
      signature: "pub async fn fetch(port: u16) -> Result<TunnelMetrics>"
      purpose: Fetch tunnel metrics
      location: src/metrics.rs
    - name: tui::run_tui
      signature: "pub async fn run_tui(account: String) -> Result<()>"
      purpose: Main interactive dashboard
      location: src/tui/mod.rs
  cli_commands:
    - command: "ytunnel init"
      purpose: Interactive setup
    - command: "ytunnel account [list|select|remove]"
      purpose: Manage accounts
    - command: "ytunnel zones [list|default]"
      purpose: Manage zones
    - command: "ytunnel [add|start|stop|restart|delete] name"
      purpose: Persistent tunnel management
    - command: "ytunnel run [name] target [zone]"
      purpose: Ephemeral tunnel
    - command: "ytunnel logs name [-f]"
      purpose: View logs
    - command: "ytunnel list"
      purpose: List all tunnels

testing:
  framework: Built-in Rust tests with #[test]
  structure: Inline tests in modules
  coverage_areas:
    - Metrics parsing (src/metrics.rs:134-164)
    - Configuration format migration
    - Error handling paths
  notes: Limited test coverage; primarily integration testing via actual usage

extension_points:
  - location: src/cloudflare.rs
    hook: Cloudflare API integration
    example: Custom ingress rules, certificate management
  - location: src/daemon.rs
    hook: Daemon management
    example: Health checks, auto-restart policies, resource limits
  - location: src/metrics.rs
    hook: Metrics collection
    example: Custom metrics, alerts, historical data storage
  - location: src/tui/app.rs
    hook: TUI App state
    example: Custom dashboard widgets, additional views
  - location: src/config.rs
    hook: Configuration management
    example: Environment variables, configuration profiles
