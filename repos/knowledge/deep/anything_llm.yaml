# Deep Knowledge: AnythingLLM
# Repository: anything-llm-master
# Last Updated: 2026-02-22

name: anything_llm
node_id: repo::mintplex-labs/anything-llm
github_full_name: mintplex-labs/anything-llm
html_url: https://github.com/mintplex-labs/anything-llm
source: repos
provenance:
  shard: repos
  source_file: repos/knowledge/deep/anything_llm.yaml
  as_of: '2026-02-25'
description: All-in-one document chat application with multi-LLM support
tech_stack:
  - Node.js
  - Express
  - React
  - Prisma
  - SQLite/PostgreSQL

# Core Architecture
architecture:
  pattern: Monorepo
  components:
    - name: Server
      path: server/
      description: Express API server with authentication and LLM routing
    - name: Collector
      path: collector/
      description: Document processing service for file ingestion
    - name: Frontend
      path: frontend/
      description: React-based web UI
    - name: Docker
      path: docker/
      description: Container orchestration for production deployment

# Code Patterns
code_patterns:
  - pattern: Provider Factory
    file: server/utils/helpers/index.js
    key_functions:
      - getLLMProvider()
      - getVectorDbClass()
      - getEmbeddingEngineSelection()
    description: |
      Factory pattern using environment variables to select providers.
      Supports 35+ LLM providers and 10+ vector databases.
      Each provider implements consistent interface: getChatCompletion(),
      streamGetChatCompletion(), embedTextInput().

  - pattern: Streaming Chat
    file: server/endpoints/chat.js
    key_functions:
      - streamChatWithWorkspace()
      - writeResponseChunk()
    description: |
      Server-Sent Events (SSE) implementation with Express.
      Sets Content-Type: text/event-stream with Connection: keep-alive.
      Chunks include chatId, text, sources, and close signals.

  - pattern: Document Pipeline
    file: collector/index.js
    key_functions:
      - processSingleFile()
      - processLink()
      - processRawText()
    description: |
      Express server with 3 main endpoints for document processing.
      Supports multiple file types with MIME validation.
      Processes files into documents with metadata and vector embeddings.
      Enforces 3GB file size limit.

  - pattern: Prisma ORM
    file: server/prisma/schema.prisma
    key_models:
      - workspaces
      - workspace_documents
      - workspace_chats
      - users
      - workspace_threads
    description: |
      SQLite by default with PostgreSQL option.
      Models cover workspace settings, document vectors,
      chat history, and user management with roles.

  - pattern: Middleware Chain
    files:
      - server/utils/middleware/validatedRequest.js
      - server/utils/middleware/multiUserProtected.js
      - server/utils/middleware/validWorkspace.js
    key_functions:
      - validatedRequest()
      - flexUserRoleValid()
      - validWorkspaceSlug()
    description: |
      Multi-layered authentication supporting single/multi-user modes.
      JWT tokens with role-based permissions (admin, manager, default).
      Workspace and thread validation guards.

# Configuration
environment:
  required:
    - key: JWT_SECRET
      description: JWT signing secret (12+ chars required for multi-user)
    - key: AUTH_TOKEN
      description: Authentication token for API access

  optional:
    - key: SERVER_PORT
      default: "3001"
      description: API server port
    - key: LLM_PROVIDER
      default: openai
      description: LLM provider selection
    - key: VECTOR_DB
      default: lancedb
      description: Vector database backend
    - key: EMBEDDING_ENGINE
      default: native
      description: Embedding model engine
    - key: TTS_PROVIDER
      default: native
      description: Text-to-speech provider

supported_providers:
  llm:
    providers:
      - openai
      - azure
      - anthropic
      - gemini
      - ollama
      - localai
      - togetherai
      - perplexity
      - groq
      - cohere
      - koboldcpp
      - lmstudio
      - mistral
      - huggingface
    count: 35+

  vector_db:
    providers:
      - lancedb
      - chroma
      - pinecone
      - weaviate
      - qdrant
      - milvus
      - zilliz
      - pgvector
      - astradb
      - astra
    count: 10+

  embedding:
    providers:
      - native
      - openai
      - azure
      - ollama
      - cohere
      - voyageai
      - litellm
      - localai
      - mistral

# Commands
commands:
  setup:
    command: yarn setup
    description: Initialize environment and run migrations

  development:
    command: yarn dev:all
    description: Run all services (server + collector + frontend)
    alternatives:
      - yarn dev:server
      - yarn dev:collector
      - yarn dev:frontend

  database:
    command: yarn prisma:setup
    description: Generate, migrate, and seed database
    alternatives:
      - yarn prisma:generate
      - yarn prisma:migrate
      - yarn prisma:seed

  production:
    command: yarn prod:server
    description: Start production server

  linting:
    command: yarn lint
    description: Run code linting

# Troubleshooting
troubleshooting:
  - issue: Vector DB fallback
    symptom: Using LanceDB despite other config
    cause: VECTOR_DB env var not set or invalid
    solution: Set VECTOR_DB environment variable explicitly

  - issue: File upload rejected
    symptom: Files over 3GB fail
    cause: Hard limit enforced in server + collector
    solution: Split large files or increase limit in source

  - issue: Multi-user mode not working
    symptom: No login screen, single user only
    cause: JWT_SECRET not configured
    solution: Set JWT_SECRET with 12+ characters

  - issue: Authentication failures
    symptom: 401 errors on requests
    cause: AUTH_TOKEN or JWT_SECRET mismatch
    solution: Verify tokens match between env and requests

  - issue: CORS errors
    symptom: Cross-origin requests blocked
    cause: Frontend URL mismatch
    solution: Configure CORS origin in server settings

# Integration Points
integrations:
  api_endpoints:
    - path: /api/v1/chat
      method: POST
      description: Streaming chat with workspace
    - path: /api/v1/document/upload
      method: POST
      description: Document upload endpoint
    - path: /api/v1/workspace
      method: GET/POST
      description: Workspace management

  embeddable:
    - path: /embed
      description: Embeddable chat widget

  webhooks:
    - description: Event hooks for document processing
