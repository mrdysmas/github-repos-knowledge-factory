category: agent_cli
key_features:
  - feature: "Global CLI entrypoint with multi-command dispatch"
    description: "The package publishes `ccs` and `ccsd` bins, and `src/ccs.ts` imports handlers for install, doctor, sync, update, shell completion, API, cursor, cliproxy, and config flows."
  - feature: "Profile auto-detection from the first positional argument"
    description: "The `detectProfile` helper treats the first non-flag token as a profile name and otherwise defaults to `default`."
  - feature: "Embedded proxy execution for third-party providers"
    description: "The `execClaudeWithProxy` path starts a local proxy, injects `ANTHROPIC_BASE_URL`, `ANTHROPIC_AUTH_TOKEN`, and `ANTHROPIC_MODEL`, then launches the Claude CLI with profile-specific hook environments."
  - feature: "Dashboard server combines REST, SPA assets, and WebSockets"
    description: "The web server starts Express, mounts `/api`, `/api/shared`, `/api/overview`, and `/api/usage`, then attaches a WebSocket server and optional Vite middleware."
architecture:
  module_breakdown:
    - module: "src/ccs.ts"
      responsibility: "Main CLI dispatcher that detects profiles, resolves target adapters, and launches proxy-backed or direct CLI execution."
      key_files: ["src/ccs.ts"]
    - module: "src/commands/"
      responsibility: "Command handlers for setup, install, doctor, sync, cursor, cliproxy, config, and persistence flows."
      key_files: ["src/commands/install-command.ts", "src/commands/doctor-command.ts"]
    - module: "src/cliproxy/"
      responsibility: "Local proxy management, quota tracking, sync, and provider-specific adapter helpers."
      key_files: ["src/cliproxy/index.ts", "src/cliproxy/quota-manager.ts"]
    - module: "src/web-server/"
      responsibility: "Express dashboard, route registration, health checks, and WebSocket updates."
      key_files: ["src/web-server/index.ts", "src/web-server/routes/index.ts"]
    - module: "src/api/services/"
      responsibility: "Profile lifecycle, preset, validation, and catalog services used by the dashboard API."
      key_files: ["src/api/services/profile-lifecycle-service.ts", "src/api/services/openrouter-catalog.ts"]
api_surface:
  public_functions:
    - name: "startServer"
      purpose: "Start the dashboard HTTP server with WebSocket support, REST routes, and optional Vite middleware."
      signature: "async function startServer(options: ServerOptions): Promise<ServerInstance>"
      location: "src/web-server/index.ts"
key_files:
  - path: "package.json"
    purpose: "Publishes the global CLI, build pipeline, and Node and Bun engine requirements."
  - path: "src/ccs.ts"
    purpose: "Primary CLI entrypoint for profile detection and command dispatch."
  - path: "src/web-server/index.ts"
    purpose: "Creates the Express and WebSocket dashboard server."
  - path: "src/api/index.ts"
    purpose: "Barrel export for API service modules."

commands:
  - name: ccs
    description: "Launch the CCS CLI with a provider profile — detects the first positional argument as a profile name and proxies the session through the configured adapter."
  - name: "ccs install"
    description: "Run the install flow to set up CCS, configure targets, and register the global CLI."
  - name: "ccs doctor"
    description: "Check environment health — verifies that required API keys, proxy ports, and provider config are correctly set up."
  - name: "ccs sync"
    description: "Sync provider profiles and credentials with the configured upstream or local store."
  - name: "ccs config"
    description: "Open or edit the CCS configuration file to manage profiles, targets, and proxy settings."
  - name: ccsd
    description: "Start the CCS dashboard server, including REST API, WebSocket updates, and optionally the Vite dev middleware."

troubleshooting:
  - symptom: "Authentication fails on first launch with a provider profile"
    cause: "The API key for the selected provider is not set in the environment or profile config"
    fix: "Run `ccs config` to set the correct API key, or export the provider's token environment variable (e.g., ANTHROPIC_AUTH_TOKEN) before invoking ccs."
  - symptom: "Proxy port conflict error on startup"
    cause: "The local proxy used by cliproxy is already bound to the configured port from a previous session"
    fix: "Kill the stale proxy process or change the proxy port in the CCS config, then retry."
  - symptom: "Dashboard fails to load in browser after starting ccsd"
    cause: "Vite dev middleware not built or Express failed to bind to the configured port"
    fix: "Run the project build step first, confirm no other process is listening on the dashboard port, and restart ccsd."
  - symptom: "Profile not detected — falls back to default unexpectedly"
    cause: "The first positional argument does not match any configured profile name"
    fix: "Check available profiles with `ccs config` and pass the exact profile name as the first argument."
  - symptom: "Rate limit quota exceeded mid-session"
    cause: "The quota-manager has detected the provider's hourly or daily limit has been reached for the active profile"
    fix: "Switch to a different profile with remaining quota, or wait for the quota window to reset before retrying."
