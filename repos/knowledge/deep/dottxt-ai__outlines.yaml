name: outlines
node_id: repo::dottxt-ai/outlines
github_full_name: dottxt-ai/outlines
html_url: https://github.com/dottxt-ai/outlines
source: remote_metadata
provenance:
  shard: repos
  source_file: repos/knowledge/deep/dottxt-ai__outlines.yaml
  as_of: '2026-03-05'
  sourcing_method: code_verified
  extraction_model: gpt-unknown
  extraction_agent: codex
directory: remote::dottxt-ai/outlines
category: structured_outputs

architecture:
  module_breakdown:
    - module: outlines/generator.py
      responsibility: "Builds generator objects that route output constraints into model-specific generation flows."
      key_files:
        - outlines/generator.py
    - module: outlines/models
      responsibility: "Defines provider adapters and from_<provider> constructors for external model backends."
      key_files:
        - outlines/models/__init__.py
        - outlines/models/base.py
        - outlines/models/openai.py
        - outlines/models/transformers.py
    - module: outlines/backends
      responsibility: "Creates logits processors for regex, JSON schema, and CFG constraints."
      key_files:
        - outlines/backends/__init__.py
        - outlines/backends/base.py
    - module: outlines/types
      responsibility: "Defines structured output DSL primitives and helper type constructors."
      key_files:
        - outlines/types/__init__.py
        - outlines/types/dsl.py
    - module: outlines/templates.py
      responsibility: "Provides prompt templating utilities built on Jinja2."
      key_files:
        - outlines/templates.py
    - module: outlines/applications.py
      responsibility: "Combines templates, output types, and models into reusable application wrappers."
      key_files:
        - outlines/applications.py
  key_abstractions:
    - name: Generator
      purpose: "Factory that selects steerable or black-box generation strategy for a model."
    - name: SteerableGenerator
      purpose: "Uses backend logits processors to enforce regex, JSON schema, or CFG constraints during generation."
    - name: BlackBoxGenerator
      purpose: "Delegates constrained output types directly to API-based model adapters."
    - name: Application
      purpose: "Reusable composition of prompt template and output type over a target model."
    - name: Template
      purpose: "Jinja-backed prompt template abstraction with file and string constructors."

code_patterns:
  - pattern: "Generator strategy dispatch"
    description: "Generator selects SteerableGenerator, BlackBoxGenerator, or AsyncBlackBoxGenerator by model type."
    location: outlines/generator.py
  - pattern: "Type-to-constraint compilation"
    description: "Output types are converted to CFG, JSON schema, or regex terms before processor construction."
    location: outlines/generator.py
  - pattern: "Provider adapter constructors"
    description: "Model modules expose from_<provider> factories that normalize clients into a common model API."
    location: outlines/models/__init__.py
  - pattern: "Backend plug-in selection"
    description: "Backends are selected by string name and produce logits processors for constraint modes."
    location: outlines/backends/__init__.py
  - pattern: "Template rendering with strict undefineds"
    description: "Template rendering uses a Jinja environment configured to error on missing values."
    location: outlines/templates.py

implementation_patterns:
  - pattern: "Model type adapter abstraction"
    description: "Each model carries a type adapter responsible for formatting inputs and output constraints."
    location: outlines/models/base.py
  - pattern: "Reusable generator caching in Application"
    description: "Application caches generator instances and rebuilds only when model identity changes."
    location: outlines/applications.py
  - pattern: "Backend defaults per constraint class"
    description: "Different constraint families map to default backend names."
    location: outlines/backends/__init__.py

core_modules:
  generation_runtime:
    path: outlines/generator.py
    description: "Generator classes and dispatch factory for constrained generation."
  model_adapters:
    path: outlines/models
    description: "Provider-specific model adapters and constructors for local and API models."
    submodules:
      - outlines/models/openai.py
      - outlines/models/ollama.py
      - outlines/models/transformers.py
      - outlines/models/vllm.py
  constraint_backends:
    path: outlines/backends
    description: "Logits processor backends for JSON schema, regex, and CFG constraints."
    submodules:
      - outlines/backends/outlines_core.py
      - outlines/backends/llguidance.py
      - outlines/backends/xgrammar.py
  types_dsl:
    path: outlines/types
    description: "Structured output type constructors and regex/CFG helper primitives."
    submodules:
      - outlines/types/dsl.py
      - outlines/types/__init__.py
  templating:
    path: outlines/templates.py
    description: "Jinja-based prompt template composition."

key_features:
  - feature: "Structured output constraints during generation"
    description: "Applies regex, JSON schema, or CFG constraints while tokens are generated."
  - feature: "Multi-provider model adapters"
    description: "Supports OpenAI, Ollama, Transformers, vLLM, TGI, and other providers through adapter factories."
  - feature: "Synchronous and asynchronous generation flows"
    description: "Provides both sync and async black-box generators."
  - feature: "Typed output DSL"
    description: "Exposes Regex, CFG, JsonSchema, and helper constructors in outlines.types."
  - feature: "Prompt templating integration"
    description: "Template class supports prompt rendering from strings and files via Jinja2."

key_files:
  - path: pyproject.toml
    description: "Package metadata, provider extras, and testing configuration."
  - path: README.md
    description: "Usage overview with installation and integration examples."
  - path: outlines/__init__.py
    description: "Top-level namespace exports for applications, models, and utilities."
  - path: outlines/generator.py
    description: "Generator strategy implementations and dispatch function."
  - path: outlines/models/__init__.py
    description: "Provider adapter exports and model type unions."
  - path: outlines/backends/__init__.py
    description: "Backend registry and default backend mapping."
  - path: outlines/templates.py
    description: "Template abstraction and Jinja environment setup."

configuration:
  - name: package_constraints
    options:
      - key: requires-python
        default: ">=3.10,<3.14"
        description: "Declared supported Python runtime range."
      - key: outlines_core
        default: "0.2.14"
        description: "Pinned core dependency used for constrained generation internals."
  - name: backend_defaults
    options:
      - key: CFG_DEFAULT_BACKEND
        default: "llguidance"
        description: "Default backend for CFG constraints."
      - key: JSON_SCHEMA_DEFAULT_BACKEND
        default: "outlines_core"
        description: "Default backend for JSON schema constraints."
      - key: REGEX_DEFAULT_BACKEND
        default: "outlines_core"
        description: "Default backend for regex constraints."
  - name: provider_extras
    options:
      - key: openai
        description: "Optional dependency group for OpenAI provider adapter."
      - key: ollama
        description: "Optional dependency group for Ollama provider adapter."
      - key: transformers
        description: "Optional dependency group for Transformers local model integration."
      - key: vllm
        description: "Optional dependency group for vLLM-compatible adapter paths."
      - key: anthropic
        description: "Optional dependency group for Anthropic provider adapter."
      - key: gemini
        description: "Optional dependency group for Google Gemini provider adapter."

testing:
  framework: pytest
  structure: "Tests cover backends, models, processors, types, and utility behavior under tests/."
  coverage_areas:
    - "Constraint backend behavior for regex, JSON schema, and CFG"
    - "Provider adapters and model dispatch behavior"
    - "Output type conversion and DSL correctness"
    - "Template rendering and application wrappers"
  test_patterns:
    - "pytest tests"

integrations:
  model_providers:
    - OpenAI
    - Ollama
    - Transformers
    - vLLM
    - TGI
    - Anthropic
    - Gemini
    - LMStudio
    - Mistral
  backend_engines:
    - outlines_core
    - llguidance
    - xgrammar
  runtime_libraries:
    - pydantic
    - jinja2
    - jsonschema

quick_reference:
  - topic: "Install base package"
    command: "pip install outlines"
  - topic: "Install OpenAI integration extras"
    command: "pip install outlines[openai]"
  - topic: "Run tests"
    command: "pytest tests"

commands:
  - name: "pip install outlines"
    description: "Install base outlines package and core dependencies."
    usage: "pip install outlines"
  - name: "pip install outlines[openai]"
    description: "Install package with OpenAI provider integration extras."
    usage: "pip install outlines[openai]"
  - name: "pytest tests"
    description: "Run repository test suite discovered from tests/."
    usage: "pytest tests"

api_surface:
  public_functions:
    - name: Generator
      purpose: "Factory that creates model-specific generator implementations."
      signature: "def Generator(model, output_type=None, backend=None, *, processor=None)"
      location: outlines/generator.py
    - name: Application
      purpose: "Reusable callable that combines template rendering and constrained generation."
      signature: "class Application"
      location: outlines/applications.py
    - name: Template
      purpose: "Prompt template abstraction with from_string and from_file constructors."
      signature: "class Template"
      location: outlines/templates.py
    - name: from_transformers
      purpose: "Build model adapters from Hugging Face Transformers models/tokenizers."
      signature: "def from_transformers(...)"
      location: outlines/models/transformers.py
    - name: from_openai
      purpose: "Build model adapter for OpenAI-compatible clients."
      signature: "def from_openai(...)"
      location: outlines/models/openai.py
    - name: from_ollama
      purpose: "Build model adapter for Ollama client integrations."
      signature: "def from_ollama(...)"
      location: outlines/models/ollama.py
