    as_of: '2026-02-25'
  extras:
    directory: streisand-master
    raw_core_concepts_structured:
    - name: Multi-protocol VPN suite
      description: Deploys 6+ VPN protocols on a single server (WireGuard, OpenVPN,
        OpenConnect, Shadowsocks, Tor bridge, SSH tunneling) to ensure at least one
        works in hostile network environments.
    - name: Builder/server architecture
      description: The "builder" is your local machine running Ansible; it provisions
        a separate "server" in the cloud. Keeps VPN config separate from your daily
        driver.
    - name: Gateway interface
