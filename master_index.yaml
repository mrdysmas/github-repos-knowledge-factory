    interface for

    various training approaches (LoRA, QLoRA, Full, Freeze). Zero-code CLI and Gradio
    Web UI

    (LLaMA Board). Used by Amazon, NVIDIA, Aliyun. Supports distributed training,
    quantization,

    and multiple precision types.

    '
  core_concepts:
  - Training Approaches
  - Model Support
  - Data Processing
  - Web UI (LLaMA Board)
  - Evaluation
  key_entry_points:
  - src/llamafactory/
  - src/llamafactory/train/
  - src/llamafactory/webui/
  - data/
  build_run:
    language: Python
    install: pip install llamafactory
    cli: llamafactory-cli train config.yaml
    webui: llamafactory-cli webui
    docker: docker run -it --gpus all hiyouga/llamafactory:latest
