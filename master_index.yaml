    language: JavaScript (ES modules)
    package_manager: npm
    build_command: npm run build
    run_command: npx hsync (or npm install -g hsync && hsync)
    test_command: npm test (uses Vitest)
  provenance:
    shard: merged
    source_file: ssh_repos/knowledge/repos/hsync.yaml
    as_of: '2026-02-25'
  extras:
    directory: hsync-master
    raw_core_concepts_structured:
    - name: MQTT-based reverse proxy
      description: 'Uses MQTT protocol to communicate with hsync-server for web request
        handling.

        HTTP requests to the public URL are proxied through the server via MQTT topics

        (e.g., web/{hostname}/{segment}/{action}) back to the local client.

        '
    - name: WebRTC peer-to-peer tunneling
      description: 'Establishes direct P2P connections between hsync clients using
        WebRTC data channels.

        Once connected, TCP socket data flows directly between peers, bypassing the
        server

        entirely. Uses rawr library for JSON-RPC over the data channel.

        '
    - name: Socket relays and listeners
      description: 'Two tunneling modes: listeners (accept local connections, forward
        to remote target)

        and relays (accept remote requests, connect to local target). Supports whitelist/blacklist

        for access control on relay ports.

        '
    raw_key_entry_points_structured:
    - path: cli.js:1
      purpose: CLI entry point using Commander; parses flags and creates tunnel connections
    - path: hsync.js:31
      purpose: Main export for Node.js; provides createConnection() and dynamicConnect()
        APIs
    - path: connection.js:29
      purpose: Core createHsync() function that sets up MQTT connection, peer management,
        and tunnel infrastructure
    - path: lib/peers.js:40
      purpose: Peer management and WebRTC connection handling; creates RPC peers for
