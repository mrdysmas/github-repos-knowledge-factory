        and invokes appropriate Ansible playbook.
    - path: playbooks/streisand.yml:1
      purpose: Master playbook that orchestrates all role imports (VPN services, SSL,
        firewall, gateway generation).
    - path: global_vars/default-site.yml:1
      purpose: Configuration file controlling which VPN services are enabled by default.
    - path: playbooks/roles/:1
