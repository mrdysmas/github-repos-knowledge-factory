    as public URLs via hsync-server, with peer-to-peer TCP tunneling via WebRTC for
    direct

    client-to-client connections without server intermediary.

    '
  core_concepts:
  - MQTT-based reverse proxy
  - WebRTC peer-to-peer tunneling
  - Socket relays and listeners
  key_entry_points:
  - cli.js:1
  - hsync.js:31
  - connection.js:29
  - lib/peers.js:40
  - lib/socket-relays.js:63
