    raw_core_concepts_structured:
    - name: Tunnel Management Layer
      description: 'ytunnel is a management orchestrator, not a daemon itself. It
        generates cloudflared configs, creates launchd (macOS) or systemd (Linux)
        service files, and delegates actual tunneling to Cloudflare''s cloudflared
        binary. The tool runs only when invoked; persistent tunnels survive via OS
        service managers.

        '
    - name: Ephemeral vs Persistent Tunnels
      description: 'Two modes: ephemeral (ytunnel run) creates foreground tunnels
        that auto-cleanup on Ctrl+C - ideal for quick testing; persistent (ytunnel
        add) creates background daemons with auto-restart, optional login auto-start,
        and survives reboots via launchd/systemd integration.

        '
    - name: Multi-Account/Multi-Zone Architecture
      description: 'Supports multiple Cloudflare accounts and zones per account. Each
        tunnel is scoped to an account_name, enabling work/personal environment isolation.
        DNS CNAME records are auto-managed per zone, and credentials are stored per-tunnel
        in the config directory.

        '
