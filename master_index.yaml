- node_id: repo::josephdove/netmask
  github_full_name: josephdove/netmask
  html_url: https://github.com/josephdove/netmask
  source: compiled_master
  name: netmask
  category: network_utils
  summary: 'Self-hosted TCP/UDP reverse proxy/tunneling solution (Ngrok alternative)
    with encrypted client-server communication, dual-stack IPv4/IPv6 support, and
    optional terminal GUI.

    '
  core_concepts:
  - Client-Server Tunnel Architecture
  - Rolling Key Encryption
  - Protocol-Agnostic Forwarding
  key_entry_points:
  - netmask/netmasks.py:15
  - netmask/netmaskc.py:6
  - netmask/server/main.py:342
  - netmask/client/main.py:228
  - netmask/impl/packets.py:7
  - netmask/utils/encryption.py:3
  build_run:
    language: python
    package_manager: pip
    build_command: pip install -e . or python3 setup.py install
    run_command: 'Server: netmasks 0.0.0.0 :: --port 1024 --key mykey

      Client: netmaskc tcp 8080 4 server.example.com:1024 --key mykey

      '
    test_command: No tests included in repository
  provenance:
    shard: merged
    source_file: ssh_repos/knowledge/repos/netmask.yaml
    as_of: '2026-02-25'
  extras:
    directory: netmask-main
    raw_core_concepts_structured:
    - name: Client-Server Tunnel Architecture
      description: 'Two-component design: netmasks (server) listens for incoming connections
        and manages tunnel endpoints; netmaskc (client) connects to server and forwards
        local ports. Server dynamically allocates public ports for each tunnel.

        '
    - name: Rolling Key Encryption
      description: 'XOR-based stream cipher with SHA-256 rolling keys that change
        per packet. Key derivation from communication key via shake_256. Proof-of-encryption
        handshake validates both sides share the same key before tunnel establishment.

        '
    - name: Protocol-Agnostic Forwarding
      description: 'Supports both TCP and UDP protocols with unified architecture.
        TCP uses async handlers with bidirectional forwarding; UDP uses datagram protocols
        with address-based client tracking. Both support IPv4 and IPv6 simultaneously.

        '
    raw_key_entry_points_structured:
    - path: netmask/netmasks.py:15
      purpose: Server CLI entry point (netmasks command), parses args and starts NetmaskServer
    - path: netmask/netmaskc.py:6
      purpose: Client CLI entry point (netmaskc command), parses args and starts NetmaskClient
        with optional GUI
    - path: netmask/server/main.py:342
      purpose: NetmaskServer class - core server implementation handling TCP/UDP listeners,
        client connections, and tunnel management
    - path: netmask/client/main.py:228
      purpose: NetmaskClient class - client implementation with TCP/UDP forwarding
        threads and connection management
    - path: netmask/impl/packets.py:7
      purpose: ProtocolHandler base class - packet serialization/deserialization with
        encryption layer
    - path: netmask/utils/encryption.py:3
      purpose: NetmaskEncryption class - rolling key XOR cipher implementation
- node_id: repo::juanfont/headscale
  github_full_name: juanfont/headscale
  html_url: https://github.com/juanfont/headscale
  source: compiled_master
  name: headscale
  category: vpn_mesh
  summary: 'Open-source, self-hosted implementation of the Tailscale control server
    - enables private WireGuard-based mesh VPNs without relying on Tailscale''s proprietary
    control plane, ideal for self-hosters and small organizations who want full control
    over their tailnet infrastructure.

    '
  core_concepts:
  - Control Server
  - Tailnet (Network Namespace)
  - MapRequest/MapResponse Protocol
  key_entry_points:
  - cmd/headscale/headscale.go:13
  - hscontrol/app.go:91
  - hscontrol/state/state.go:67
  - hscontrol/state/node_store.go
  - hscontrol/poll.go
  - hscontrol/noise.go
  - hscontrol/mapper/mapper.go
  build_run:
    language: go
    go_version: '1.26'
    package_manager: go mod
    build_command: make build (or go build ./cmd/headscale)
    run_command: headscale serve (daemon) or headscale [cli-commands]
    test_command: make test (unit) or go run ./cmd/hi run "TestName" (integration
      with Docker)
    dev_setup: nix develop (recommended for consistent toolchain)
    dependencies:
    - tailscale.com (core networking/protocol libraries)
    - gorm.io (database ORM with SQLite/PostgreSQL support)
    - spf13/cobra (CLI framework)
    - spf13/viper (configuration)
    - grpc (management API)
    - rs/zerolog (structured logging)
  provenance:
    shard: merged
    source_file: ssh_repos/knowledge/repos/headscale.yaml
    as_of: '2026-02-25'
  extras:
    directory: headscale-main
    raw_core_concepts_structured:
    - name: Control Server
      description: Acts as the coordination point for Tailscale networks (tailnets),
        managing node registration, WireGuard public key exchange, IP allocation,
        policy/ACL enforcement, and DERP relay routing - the one proprietary component
        in Tailscale's otherwise open stack.
    - name: Tailnet (Network Namespace)
      description: A private network namespace containing nodes (devices) that can
        communicate securely. Headscale implements a single tailnet suitable for personal
        use or small organizations, with users providing logical grouping/ownership
        within the network.
    - name: MapRequest/MapResponse Protocol
      description: The core Tailscale wire protocol where clients poll the control
        server (via poll.go) to receive network topology updates, peer information,
        and policy changes - enabling real-time mesh network coordination.
    raw_key_entry_points_structured:
    - path: cmd/headscale/headscale.go:13
      purpose: Main CLI entry point - initializes logging and delegates to cobra CLI
        for command parsing
    - path: hscontrol/app.go:91
      purpose: Headscale struct definition - core application with state management,
        DERP server, and HTTP/gRPC handlers
    - path: hscontrol/state/state.go:67
      purpose: State coordinator - thread-safe central hub managing database, policy,
        IP allocation, and node store
    - path: hscontrol/state/node_store.go
      purpose: In-memory node cache with copy-on-write semantics - performance-critical
        for high-frequency operations
    - path: hscontrol/poll.go
      purpose: Handles Tailscale MapRequest/MapResponse protocol - processes client
        updates every 15-60 seconds
    - path: hscontrol/noise.go
      purpose: Noise protocol implementation for secure client-to-control-server communication
    - path: hscontrol/mapper/mapper.go
      purpose: Converts internal Headscale state to Tailscale wire protocol format
        for distribution to clients
