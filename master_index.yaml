    raw_core_concepts_structured:
    - name: client-server proxy architecture
      description: frps (server) runs on a public-facing machine; frpc (client) runs
        behind NAT/firewall and establishes outbound connections. Server forwards
        incoming traffic through the persistent tunnel back to internal services.
    - name: proxy types and multiplexing
      description: Supports tcp, udp, http, https, stcp (secret TCP), tcpmux (HTTP
        CONNECT multiplexing), and xtcp (P2P). TCP stream multiplexing via yamux allows
        multiple logical connections over a single TCP connection.
    - name: visitor pattern for secure access
      description: STCP and XTCP modes use visitors - separate frpc instances that
        connect to the server to access exposed services, requiring preshared keys
        for authentication instead of opening ports publicly.
    - name: plugin extensibility
