    - path: README.md
      purpose: 'Main documentation covering complete workflow: environment preparation,
        software installation, GPG configuration, key generation, YubiKey setup, SSH/GitHub/email
        integration, key rotation, troubleshooting.

        '
    - path: SECENV.md
      purpose: 'Supplemental guide for creating a secure Alpine Linux environment
        for GPG key management, with emphasis on offline package installation and
        verification for ARM-based devices like Raspberry Pi.

        '
    - path: config/gpg.conf
      purpose: 'Hardened GnuPG configuration with strong cipher preferences (AES256),
        SHA512 digests, UTF-8 support, and security-focused options like require-secmem
        and throw-keyids.

        '
    - path: config/gpg-agent.conf
      purpose: 'GPG agent configuration enabling SSH support, cache TTLs, and platform-specific
        pinentry paths for Linux, macOS (Intel/Apple silicon), and Windows.

        '
    - path: scripts/reset-yubikey
      purpose: 'GPG connect-agent script to factory reset YubiKey OpenPGP applet by
        exhausting PIN retries and issuing terminate/reset APDUs.

        '
    - path: nix/flake.nix
      purpose: 'NixOS flake for building an air-gapped live ISO image with all required
        GPG/YubiKey tools pre-installed.

        '
