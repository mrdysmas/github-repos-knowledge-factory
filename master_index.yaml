  extras:
    directory: hysteria-master
    raw_core_concepts_structured:
    - name: Brutal Congestion Control
      description: Custom bandwidth-aware congestion control that uses fixed-rate
        transmission based on configured tx/rx limits, unlike traditional BBR/Cubic.
        Designed for lossy networks where packet loss should not throttle throughput.
    - name: HTTP/3 Masquerading
      description: Protocol disguise - server behaves as standard HTTP/3 web server
        to unauthorized clients. Authentication happens via custom HTTP headers (Hysteria-Auth)
        on a POST to /auth endpoint. Failed auth returns normal HTTP responses, making
        detection difficult.
    - name: QUIC Datagram Transport
      description: TCP proxying uses QUIC streams; UDP uses QUIC unreliable datagrams
        with fragmentation support. Both wrapped in TLS 1.3, appearing as standard
        HTTP/3 traffic to observers.
    raw_key_entry_points_structured:
