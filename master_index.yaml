- node_id: repo::infiniflow/ragflow
  github_full_name: infiniflow/ragflow
  html_url: https://github.com/infiniflow/ragflow
  source: compiled_master
  name: ragflow
  category: rag_frameworks
  summary: 'Full-stack RAG engine with deep document understanding capabilities. Unlike
    LangChain/LlamaIndex

    which are frameworks, RAGFlow is an end-to-end platform with a Web UI, Docker
    deployment, and

    built-in document parsing (OCR, layout analysis via DeepDoc). Excels at handling
    complex document

    formats (scanned PDFs, tables, images) with template-based chunking. Now includes
    agent

    capabilities with MCP support.

    '
  core_concepts:
  - DeepDoc
  - RAG Pipeline
  - LLM Abstractions
  - GraphRAG Module
  - Agent System
  - API Server
  key_entry_points:
  - api/ragflow_server.py
  - api/apps/
  - deepdoc/
  - rag/llm/
  - agent/
  - web/
  build_run:
    language: Python + TypeScript
    manager: uv (Python), npm (frontend)
    run_docker: 'cd docker

      docker compose -f docker-compose.yml up -d

      '
    run_dev: '# Backend

      uv sync --python 3.12

      docker compose -f docker/docker-compose-base.yml up -d

      bash docker/launch_backend_service.sh

      # Frontend

      cd web && npm install && npm run dev

      '
    test: uv run pytest
  provenance:
    shard: merged
    source_file: llm_repos/knowledge/repos/ragflow.yaml
    as_of: '2026-02-25'
  ecosystem_connections:
  - target: langchain
    relation: alternative_to
    note: RAGFlow is a platform; LangChain is a framework
  - target: llama_index
    relation: alternative_to
    note: Both RAG-focused; RAGFlow is end-to-end with UI
  - target: graphrag
    relation: related_to
    note: RAGFlow has its own graphrag module
  - target: milvus
    relation: integrates_with
    note: Can use Milvus as vector backend
  - target: ollama
    relation: integrates_with
    note: Supports Ollama as LLM provider
  - target: open_webui
    relation: alternative_to
    note: Both provide web UIs; RAGFlow focuses on documents
  extras:
    architecture:
      backend: Python (Flask)
      frontend: React/TypeScript (UmiJS)
      data_stores:
      - MySQL
      - Elasticsearch (default) or Infinity
      - Redis
      - MinIO (object storage)
      deployment: Docker Compose
