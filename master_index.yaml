      description: Client runs behind NAT, connects outbound to a public server; server
        forwards incoming traffic back through the persistent tunnel. Auto-detects
        mode based on config.
    - name: service-based token authentication
      description: Each forwarded service has its own mandatory token for authentication.
        Tokens are validated during handshake, preventing unauthorized access.
    - name: transport layer abstraction
      description: Supports multiple transport types (TCP, TLS, Noise protocol, WebSocket)
        with a unified interface. Noise protocol provides encryption without certificate
        management.
    - name: hot reload
