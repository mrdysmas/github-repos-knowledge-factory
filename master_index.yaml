  name: teleport
  category: remote_access
  summary: 'Identity-aware access plane that provides unified connectivity, authentication,
    access controls,

    and audit for infrastructure. Replaces SSH keys, VPNs, and bastion hosts with
    short-lived

    certificate-based auth and Just-in-Time access across SSH, Kubernetes, databases,
    and cloud APIs.

    '
  core_concepts:
  - Short-lived Certificates
  - Auth Service (Certificate Authority)
  - Proxy Service
  - Cluster and Trusted Clusters
  key_entry_points:
  - tool/teleport/main.go:32
  - tool/teleport/common/teleport.go:76
  - tool/teleport/common/teleport.go:894
  - lib/service/service.go
  - lib/auth/auth.go
  - tool/tsh/main.go:26
  - tool/tctl/main.go:32
  build_run:
    language: go
    go_version: '1.25'
    package_manager: go mod
    build_command: make full
    run_command: teleport start --config=/etc/teleport.yaml
    test_command: go test ./...
    additional_deps:
    - Rust (for some components)
    - Node.js (for Web UI)
    - libfido2 (for FIDO2/ WebAuthn support)
  provenance:
    shard: merged
    source_file: repos/knowledge/repos/teleport.yaml
    as_of: '2026-02-25'
  extras:
    directory: teleport-master
    notes: 'Architecture highlights:

      - Single Go binary with multiple roles (auth, proxy, node, app, db, kube)

      - gRPC for internal service communication

      - Multiple backend options: SQLite, DynamoDB, etcd, Firestore, PostgreSQL

      - Web UI built in TypeScript (web/ directory)

      - Supports both self-hosted and Teleport Cloud (SaaS)


      Key binaries produced:

      - teleport: Main daemon

      - tsh: User client (SSH, kubectl, db proxy)

      - tctl: Admin tool

      - tbot: Machine identity agent for workloads


      License: AGPL-3.0 (core), Apache 2.0 (API module), commercial for Enterprise

      '
    raw_core_concepts_structured:
    - name: Short-lived Certificates
      description: 'Instead of long-lived SSH keys or passwords, Teleport issues auto-expiring
        TLS/SSH certificates

        bound to user identity. Eliminates credential rotation and vault dependencies.

        '
    - name: Auth Service (Certificate Authority)
      description: 'Central CA that issues certificates, enforces RBAC/ABAC policies,
        and maintains cluster state.

        Integrates with SSO providers (Okta, GitHub, Entra ID) for identity.

        '
    - name: Proxy Service
      description: 'Identity-aware reverse proxy that terminates connections and enforces
        access policies.

        Provides Web UI, CLI access (`tsh`), and tunnels to resources behind NAT/firewalls.

        '
    - name: Cluster and Trusted Clusters
      description: 'A Teleport deployment forms a cluster with Auth + Proxy services.
        Trusted clusters enable

        federation across multiple Teleport deployments for multi-team/multi-cloud
        scenarios.

        '
    raw_key_entry_points_structured:
    - path: tool/teleport/main.go:32
      purpose: Main daemon entry point - delegates to common.Run() for CLI parsing
        and service startup
    - path: tool/teleport/common/teleport.go:76
      purpose: CLI command routing - handles start, configure, status, and all subcommands
    - path: tool/teleport/common/teleport.go:894
      purpose: OnStart() - initializes and runs the Teleport service with merged configuration
    - path: lib/service/service.go
      purpose: Core service orchestration - manages Auth, Proxy, SSH, DB, Kube, App
        services lifecycle
    - path: lib/auth/auth.go
      purpose: Auth server implementation - certificate signing, access control, user
        management
    - path: tool/tsh/main.go:26
      purpose: tsh client entry point - user CLI for connecting to Teleport clusters
    - path: tool/tctl/main.go:32
      purpose: tctl admin tool - cluster management, user provisioning, configuration
