  github_full_name: ekzhang/bore
  html_url: https://github.com/ekzhang/bore
  source: compiled_master
  name: bore
  category: tunneling
  summary: 'A minimalist TCP tunnel (~400 lines of async Rust) that exposes local
    ports to a public server, bypassing NAT firewalls. Designed for simplicity and
    self-hosting with no frills.

    '
  core_concepts:
  - Control Protocol
  - Connection Proxying
  - HMAC Authentication
  key_entry_points:
  - src/main.rs:63
  - src/client.rs:36
  - src/client.rs:105
  - src/server.rs:59
  - src/server.rs:118
  - src/server.rs:81
  - src/shared.rs:15
  build_run:
    language: rust
    package_manager: cargo
    build_command: cargo build --release
    run_command: bore [local <port> --to <server> | server]
    test_command: cargo test
  provenance:
    shard: merged
    source_file: ssh_repos/knowledge/repos/bore.yaml
    as_of: '2026-02-25'
  extras:
    directory: bore-main
    raw_core_concepts_structured:
    - name: Control Protocol
      description: Client-server handshake over TCP port 7835 using null-delimited
        JSON messages. Client sends Hello with desired port, server responds with
        assigned port and forwards incoming connections via UUID-tagged messages.
    - name: Connection Proxying
      description: When external traffic hits the server's exposed port, server generates
        a UUID, notifies client via control channel, client opens new TCP stream and
        sends Accept with UUID, then server bidirectionally proxies bytes between
        both connections.
    - name: HMAC Authentication
      description: Optional shared-secret auth using HMAC challenge-response. Server
        sends random challenge (UUID), client must respond with correct HMAC-SHA256
        to prove secret possession. Only secures handshake, not data.
    raw_key_entry_points_structured:
    - path: src/main.rs:63
      purpose: CLI entry point with clap subcommands (Local, Server), spawns async
        runtime and dispatches to Client or Server
    - path: src/client.rs:36
      purpose: Client::new() establishes control connection, performs auth handshake,
        sends Hello; Client::listen() receives Connection messages and spawns handlers
    - path: src/client.rs:105
      purpose: handle_connection() opens new stream to server, sends Accept with UUID,
        then bidirectionally copies bytes between local and remote
    - path: src/server.rs:59
      purpose: Server::listen() accepts control connections on port 7835, spawns handler
        for each client
    - path: src/server.rs:118
      purpose: handle_connection() handles auth, processes Hello/Accept messages,
