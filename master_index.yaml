  category: tunneling
  summary: 'A high-performance reverse proxy for NAT traversal written in Rust, designed
    to expose services behind NAT/firewalls to the public internet with lower resource
    consumption and higher throughput than alternatives like frp or ngrok.

    '
  core_concepts:
