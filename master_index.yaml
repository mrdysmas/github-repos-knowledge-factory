    - name: GnuPG Key Hierarchy
      description: 'Master Certify key (offline) with three subkeys stored on YubiKey:
        Signature (signing commits/files), Encryption (decrypting messages), Authentication
        (SSH login). Keys are non-exportable from YubiKey, providing hardware-backed
        security.

        '
    - name: Air-Gapped Key Generation
      description: 'Recommended practice of generating cryptographic keys in isolated
        environments (Debian Live, Tails, Alpine Linux) booted from removable media
        without network access or internal storage, minimizing exposure to compromise.

        '
    - name: SSH via GPG Agent
      description: 'Using YubiKey''s authentication subkey for SSH by configuring
        gpg-agent with enable-ssh-support. The private key never leaves the device;
        SSH operations require physical touch and PIN entry. Supports agent forwarding
        to remote hosts.

        '
