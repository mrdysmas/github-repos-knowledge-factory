contract_version: "1.0.0-ws1"
artifact_type: "ws1_node_schema"
source_enums:
  - repos
  - remote_metadata
  - remote_api
  - compiled_master
schema:
  $schema: "https://json-schema.org/draft/2020-12/schema"
  title: "WS1 Canonical Graph Node"
  type: object
  additionalProperties: false
  required:
    - node_id
    - kind
    - label
    - source
    - provenance
  properties:
    node_id:
      type: string
      minLength: 1
    kind:
      type: string
      enum:
        - repo
        - external_tool
        - concept
    label:
      type: string
      minLength: 1
    source:
      type: string
      enum:
        - repos
        - remote_metadata
        - remote_api
        - compiled_master
    repo_ref:
      type: string
      minLength: 1
    external_ref:
      type: object
      additionalProperties: true
      required:
        - provider
        - value
      properties:
        provider:
          type: string
          minLength: 1
        value:
          type: string
          minLength: 1
    aliases:
      type: array
      items:
        type: string
    provenance:
      type: object
      additionalProperties: false
      required:
        - as_of
        - source_refs
      properties:
        as_of:
          type: string
          minLength: 1
        source_refs:
          type: array
          minItems: 1
          items:
            type: string
  allOf:
    - if:
        properties:
          kind:
            const: repo
      then:
        required:
          - repo_ref
    - if:
        properties:
          kind:
            const: external_tool
      then:
        required:
          - external_ref
