contract_version: "1.0.0-ws1"
artifact_type: "ws1_repo_schema"
source_enums:
  - repos
  - remote_metadata
  - remote_api
  - compiled_master
schema:
  $schema: "https://json-schema.org/draft/2020-12/schema"
  title: "WS1 Canonical Repo Record"
  type: object
  additionalProperties: false
  required:
    - node_id
    - github_full_name
    - html_url
    - source
    - name
    - category
    - summary
    - core_concepts
    - key_entry_points
    - build_run
    - provenance
  properties:
    node_id:
      type: string
      minLength: 1
    github_full_name:
      type: string
      pattern: "^[^/]+/[^/]+$"
    html_url:
      type: string
      pattern: "^https://"
    source:
      type: string
      enum:
        - repos
        - remote_metadata
        - remote_api
        - compiled_master
    name:
      type: string
      minLength: 1
    category:
      type: string
      minLength: 1
    summary:
      type: string
      minLength: 1
    core_concepts:
      type: array
      minItems: 1
      items:
        type: string
    key_entry_points:
      type: array
      minItems: 1
      items:
        type: string
    build_run:
      type: object
      minProperties: 1
      additionalProperties: true
      properties:
        language:
          type: string
          minLength: 1
    provenance:
      type: object
      additionalProperties: false
      required:
        - shard
        - source_file
        - as_of
      properties:
        shard:
          type: string
          enum:
            - repos
            - merged
        source_file:
          type: string
          minLength: 1
        as_of:
          type: string
          minLength: 1
    local_cache_dir:
      type:
        - string
        - "null"
    ecosystem_connections:
      type: array
      items:
        type: object
        additionalProperties: false
        required:
          - target
          - relation
        properties:
          target:
            type: string
            minLength: 1
          relation:
            type: string
            minLength: 1
          note:
            type: string
    extras:
      type: object
      additionalProperties: true
  allOf:
    - if:
        properties:
          category:
            const: documentation
      then: {}
      else:
        properties:
          build_run:
            required:
              - language
