version: 1
as_of_utc: "2026-03-04T05:10:20Z"

phase:
  number: "2"
  name: "Sequential Extractor Coverage Then Calibration"
  status: "PENDING"
  workflow: "PENDING -> STAGE_2A -> STAGE_2A_COMPLETE -> STAGE_2B -> COMPLETE"
  date_initiated: "2026-03-04"
  date_started: null
  date_completed: null

objective: |
  Execute Phase 2 as two sequential stages. First, close the highest-impact
  known WS6 extractor gaps in the current corpus (Phase 2A). Only after that
  baseline cleanup is complete, run a structurally diverse 8-12 repo
  calibration batch (Phase 2B).

rationale: |
  This is a debt-first stabilization pattern: if new repos are added before
  extractor coverage improves, unmapped-section debt can grow faster than it is
  closed. Phase 2A validates the extractor expansion workflow itself before
  intake scale-up.

dependencies:
  - "reports/ws6_deep_integration/mismatch_report.yaml is the source of truth for current unmapped-section debt."
  - "Queue sync gate remains enforced before any execution."
  - "Phase 2A completion is a hard gate for starting Phase 2B."

sequencing_rule: "Phase 2A must complete before Phase 2B begins."

stage_2a:
  name: "Extractor Coverage Cleanup"
  status: "COMPLETE"
  objective: "Close top known unmapped section types in existing corpus and prove repeatable extractor expansion workflow."
  baseline:
    deep_facts: 1908
    unmapped_sections_count: 55
    source_of_truth:
      mismatch_report: "reports/ws6_deep_integration/mismatch_report.yaml"
      coverage_report: "reports/ws6_deep_integration/coverage.yaml"
      query_stats_command: "python3 tools/query_master.py stats"
  target_sections:
    - section: "key_features"
      instances: 3
    - section: "content_coverage"
      instances: 3
    - section: "key_sections"
      instances: 3
    - section: "cross_references"
      instances: 3
    - section: "key_files"
      instances: 2
    - section: "cli_arguments"
      instances: 2
    - section: "core_modules"
      instances: 2
    - section: "sdk_usage"
      instances: 2
    - section: "supplementary_files"
      instances: 2
  non_negotiable_gates:
    - "python3 tools/check_intake_queue_sync.py --workspace-root . => PASS"
    - "python3 tools/ws6_deep_integrator.py --workspace-root . --reports-dir reports/ws6_deep_integration --materialize-spec reports/ws6_deep_integration/spec.yaml --run-validation-suite => PASS"
    - "python3 tools/query_master.py stats => deep_facts > 1908"
    - "python3 -m unittest discover -s tests/ws6_deep_integration -p 'test_*.py' => PASS"
    - "python3 -m unittest discover -s tests/intake_queue_sync -p 'test_*.py' => PASS"
  out_of_scope:
    - "No new repo intake (no clone operations, no WS5 ingestion runs, no queue edits for intake execution)."
    - "No schema or contract modifications."
    - "No changes to master_repo_list.yaml."
    - "No changes to inputs/intake/intake_queue.yaml."
  execution_approach:
    - "Inspect 2-3 mismatch_report examples for one target section type."
    - "Read corresponding raw deep YAML to confirm section shape."
    - "Add extractor mapping in tools/ws6_deep_integrator.py using existing fact_type/predicate/object_kind enums."
    - "Run WS6 validation suite and confirm section reduction plus fact recovery."
    - "Iterate one or two section types per cycle; do not batch all nine at once."
  done_when:
    - "Extractors added for all 9 target section types."
    - "WS6 full validation run reports gate_ready=true, blocking_mismatches=0, unknown_predicates=0."
    - "unmapped_sections_count <= 35 (drop of at least 20 from baseline 55)."
    - "deep_facts > 1908."
    - "WS6 and intake_queue_sync test suites pass."
    - "Metrics are recorded in upcoming_progress_tracker.yaml under results.phase_2a."

stage_2b:
  name: "Calibration Batch"
  status: "PENDING"
  objective: "Stress-test structural diversity handling on 8-12 new repos after Phase 2A completion."
  scope:
    repo_count_target: "8-12"
    selection_strategy: "Structural diversity first, not just domain coverage."
    required_structural_shapes:
      minimum_count: 3
      shapes:
        - "Monorepo with multiple packages/modules."
        - "Rust or Go dominant project."
        - "Repo with minimal or nonstandard documentation."
        - "Repo with unusual directory structure."
        - "Very small CLI tool (< 1000 LOC)."
    source_inputs:
      - "inputs/intake/intake_queue.yaml"
      - "tools/add_repo_candidate.py for net-new candidates only"
  non_negotiable_gates:
    - "python3 tools/check_intake_queue_sync.py --workspace-root . => PASS"
    - "python3 tools/ws5_remote_ingestion.py --workspace-root . --input inputs/ws5/ws5_input_manifest.yaml => PASS"
    - "python3 tools/ws4_master_compiler.py --workspace-root . => PASS"
    - "python3 tools/ws1_contract_validator.py --workspace-root . --external-node-policy first_class => PASS"
    - "python3 tools/trust_gates.py llm_repos/knowledge --production => PASS"
    - "python3 tools/trust_gates.py ssh_repos/knowledge --production => PASS"
    - "python3 tools/ws6_deep_integrator.py --workspace-root . --reports-dir reports/ws6_deep_integration --materialize-spec reports/ws6_deep_integration/spec.yaml --run-validation-suite => PASS"
    - "python3 tools/query_master.py stats => PASS"
    - "python3 -m unittest discover -s tests/ws6_deep_integration -p 'test_*.py' => PASS"
    - "python3 -m unittest discover -s tests/intake_queue_sync -p 'test_*.py' => PASS"
  out_of_scope:
    - "No schema/contract redesign."
    - "No SQLite/DuckDB read-model implementation."
    - "No shard-model redesign."
    - "No manual edits to generated reports."
  done_when:
    - "8-12 calibration repos canonicalized end-to-end via WS5 -> WS4 -> WS6."
    - "blocking_mismatches=0 and unknown_predicates=0 after full run."
    - "query_master.py returns consistent repo and facts outputs for calibration repos."
    - "New unmapped sections, if any, are explicitly counted and recorded."
    - "Metrics snapshot captured in upcoming_progress_tracker.yaml."
    - "project_status.yaml handoff updated for Phase 3."

acceptance_criteria:
  - "Phase 2A done_when is fully satisfied before any Phase 2B intake execution begins."
  - "All listed non-negotiable gates pass in each stage."
  - "Phase-2 sequencing is documented in status artifacts and reflected in operator handoff."

key_metrics:
  - name: "phase_2a_unmapped_sections_delta"
    target: "<= -20"
    actual: -22
  - name: "phase_2a_deep_facts_delta"
    target: "> 0"
    actual: 111
  - name: "phase_2a_blocking_mismatches_count"
    target: 0
    actual: 0
  - name: "phase_2b_calibration_repo_count"
    target: "8-12"
    actual: null
  - name: "phase_2b_blocking_mismatches_count"
    target: 0
    actual: null

execution_checklist:
  - "[ ] Stage 2A cycle 1: implement 1-2 section extractors and validate."
  - "[ ] Stage 2A cycle 2: implement next 1-2 section extractors and validate."
  - "[ ] Stage 2A cycle N: complete all 9 target section extractors with iterative validations."
  - "[ ] Verify Phase 2A done_when and record results.phase_2a in upcoming_progress_tracker.yaml."
  - "[ ] Start Stage 2B only after Phase 2A complete gate is recorded."
  - "[ ] Execute calibration batch through WS5 -> WS4 -> WS6 with required gates."
  - "[ ] Record Phase 2B metrics and update project_status.yaml handoff toward Phase 3."

