  shard: llm_repos
  source_file: llm_repos/knowledge/deep/xinference.yaml
  as_of: '2026-02-25'
sparse: false

code_patterns:
  - name: CLI Model Launch
    description: Launch models with engine and configuration
    code: |
      # File: xinference/deploy/cmdline.py
      # CLI command: xinference launch

      xinference launch \
          --model-name qwen2-instruct \
          --model-type LLM \
          --model-engine vLLM \
          --size-in-billions 7 \
          --model-format pytorch \
          --quantization int4 \
          --replica 2 \
          --n-gpu auto \
          --gpu-idx 0,1

      # Python client
      from xinference.client import RESTfulClient
      client = RESTfulClient("http://localhost:9997")
      model_uid = client.launch_model(
          model_name="qwen2-instruct",
          model_type="LLM",
          model_engine="vLLM",
          model_format="pytorch",
          quantization="int4",
          replica=2,
      )
    file_reference: xinference/deploy/cmdline.py

  - name: REST API Launch Model
    description: HTTP API for model deployment
    code: |
      # File: xinference/api/restful_api.py
      # POST /v1/models

      import requests

      response = requests.post(
          "http://localhost:9997/v1/models",
          json={
              "model_uid": "my-llama",
              "model_name": "llama-3",
              "model_type": "LLM",
              "model_engine": "vLLM",
              "model_format": "pytorch",
              "quantization": "int4",
              "replica": 1,
              "n_gpu": "auto",
              "gpu_idx": [0],
          }
      )
      model_uid = response.json()["model_uid"]

      # Check launch progress
      GET /v1/models/{model_uid}/progress
      # Cancel launch
      POST /v1/models/{model_uid}/cancel
    file_reference: xinference/api/restful_api.py

  - name: Multi-Engine Configuration
    description: Engine-specific model and generation configs
    code: |
      # File: xinference/model/llm/vllm/core.py

      # vLLM Model Config
      class VLLMModelConfig(TypedDict, total=False):
          tokenizer_mode: Optional[str]
          trust_remote_code: bool
          tensor_parallel_size: int
          pipeline_parallel_size: int
          gpu_memory_utilization: float
          max_num_batched_tokens: int
          max_num_seqs: int
          quantization: Optional[str]
          max_model_len: Optional[int]

      # vLLM Generation Config
      class VLLMGenerateConfig(TypedDict, total=False):
          temperature: float
          top_p: float
          top_k: int
          max_tokens: int
          stop_token_ids: Optional[List[int]]
          stream: bool
          lora_name: Optional[str]

      # Engines: transformers, vLLM, llama.cpp, sglang, lmdeploy, mlx
    file_reference: xinference/model/llm/vllm/core.py

  - name: Model Family Specification
    description: Model registration with capabilities
    code: |
      # File: xinference/model/llm/llm_family.py

      class LLMFamilyV2(BaseModel):
          version: Literal[2]
          model_name: str
          model_lang: List[str]  # ["en", "zh"]
          model_ability: List[Literal[
              "embed", "generate", "chat", "tools",
              "vision", "audio", "reasoning"
          ]]
          context_length: int = 2048
          model_specs: List[LLMSpecV2]
          chat_template: Optional[str]
          architectures: Optional[List[str]]

      class PytorchLLMSpecV2(BaseModel):
          model_format: Literal["pytorch", "gptq", "awq", "fp4", "fp8", "bnb"]
          model_size_in_billions: Union[str, int]
          quantization: str
          model_id: Optional[str]

      class LlamaCppLLMSpecV2(BaseModel):
          model_format: Literal["ggufv2"]
          model_size_in_billions: Union[str, int]
          quantization: str  # q4_k_m, q8_0, etc.
          model_file_name_template: str
    file_reference: xinference/model/llm/llm_family.py

  - name: Supervisor-Worker Distribution
    description: Distributed model deployment across workers
    code: |
      # File: xinference/core/supervisor.py

      class SupervisorActor(xo.StatelessActor):
          async def launch_model(self, model_uid, model_name, model_engine,
                                 replica=1, n_worker=1, worker_ip=None, gpu_idx=None):
              # Select workers for deployment
              for replica_index in range(replica):
                  worker_refs = self._select_workers_for_replica(
                      n_worker, worker_ip, gpu_idx
                  )
                  for worker_ref in worker_refs:
                      await worker_ref.launch_model(
                          model_uid=f"{model_uid}-{replica_index}",
                          model_name=model_name,
                          model_engine=model_engine,
                          ...
                      )

      # Start distributed:
      # xinference-supervisor --host 0.0.0.0 --port 9997
      # xinference-worker --endpoint http://supervisor:9997
    file_reference: xinference/core/supervisor.py

  - name: Local Cluster Startup
    description: Single-node cluster initialization
    code: |
      # File: xinference/deploy/local.py

      # Start local cluster
      def main(host, port, metrics_exporter_host, metrics_exporter_port):
          multiprocessing.set_start_method("spawn")

          supervisor_address = f"{host}:{get_next_port()}"

          # Start supervisor in subprocess
          local_cluster = run_in_subprocess(
              supervisor_address, metrics_exporter_host, metrics_exporter_port
          )

          # Health check
          if not health_check(address=supervisor_address, max_attempts=20):
              raise RuntimeError("Cluster not available")

          # Start REST API
          restful_api.run(
              supervisor_address=supervisor_address,
              host=host,
              port=port,
          )

      # CLI: xinference-local --host 0.0.0.0 --port 9997
    file_reference: xinference/deploy/local.py

configuration:
  - name: Model Launch Parameters
    options:
      - key: model_name
        default: "required"
        description: Built-in model name (e.g., qwen2-instruct, llama-3)
      - key: model_type
        default: "LLM"
        description: "LLM, embedding, rerank, image, audio"
      - key: model_engine
        default: "required"
        description: "transformers, vLLM, llama.cpp, sglang, mlx, lmdeploy"
      - key: model_format
        default: "pytorch"
        description: "pytorch, ggufv2, gptq, awq, fp4, fp8, bnb, mlx"
      - key: size_in_billions
        default: "varies"
        description: "Model size: 7, 13, 70, etc. (or '1_8' for 1.8B)"
      - key: quantization
        default: "none"
        description: "int4, int8, fp4, fp8, q4_k_m, q8_0"
      - key: replica
        default: "1"
        description: Number of model replicas
      - key: n_worker
        default: "1"
        description: Workers per replica (distributed)
      - key: n_gpu
        default: "auto"
        description: "GPU count: auto, none, or number"
      - key: gpu_idx
        default: "all"
        description: "Comma-separated GPU IDs: 0,1,2"

  - name: vLLM Engine Config
    options:
      - key: gpu_memory_utilization
        default: "0.9"
        description: GPU memory fraction
      - key: max_num_seqs
        default: "256"
        description: Max concurrent sequences
      - key: tensor_parallel_size
        default: "1"
        description: TP degree
      - key: max_model_len
        default: "auto"
        description: Max context length
      - key: block_size
        default: "16"
        description: KV cache block size

  - name: llama.cpp Engine Config
    options:
      - key: n_gpu_layers
        default: "-1"
        description: GPU layers (-1 = all)
      - key: n_ctx
        default: "2048"
        description: Context length
      - key: use_mmap
        default: "false"
        description: Memory-mapped model
      - key: use_mlock
        default: "true"
        description: Lock memory

  - name: Transformers Engine Config
    options:
      - key: trust_remote_code
        default: "true"
        description: Allow custom model code
      - key: device
        default: "auto"
        description: "auto, cuda, cpu, mps"
      - key: max_num_seqs
        default: "16"
        description: Max concurrent requests

common_tasks:
  - task: Deploy Local Server
    steps:
      - "pip install xinference"
      - "xinference-local --host 0.0.0.0 --port 9997"
      - "Access at http://localhost:9997"
      - "Query models: xinference list"
    gotchas:
      - "First launch downloads model - can take time"
      - "Default uses transformers engine - vLLM faster for production"

  - task: Launch Model via CLI
    steps:
      - "Query engines: xinference engine --model-name llama-3"
      - "Launch: xinference launch -n llama-3 -en vLLM -f pytorch"
      - "Test: curl http://localhost:9997/v1/chat/completions"
    gotchas:
      - "Model name must match built-in registry exactly"
      - "GGUF models need llama.cpp engine"

  - task: Register Custom Model
    steps:
      - "Create model config JSON with LLMFamilyV2 schema"
      - "Register: xinference register --model-type LLM --file model.json"
      - "Add --persist to save across restarts"
      - "Launch: xinference launch -n my-custom-model"
    gotchas:
      - "model_id must be valid HuggingFace repo or local path"
      - "chat_template format matters for conversation models"

  - task: Distributed Deployment
    steps:
      - "Start supervisor: xinference-supervisor -H 0.0.0.0 -p 9997"
      - "Start workers: xinference-worker --endpoint http://supervisor:9997"
      - "Launch with replica > 1 or n_worker > 1"
    gotchas:
      - "Workers need network access to supervisor"
      - "Model files must be accessible on all workers"

troubleshooting:
  - symptom: Model not found
    cause: Model name doesn't match registry
    fix: "Use 'xinference list' to see available models, check spelling"

  - symptom: GPU not detected
    cause: Driver or engine mismatch
    fix: "Check CUDA works, verify engine supports GPU (llama.cpp needs GGUF)"

  - symptom: Out of memory
    cause: Model too large for GPU
    fix: "Use quantization, reduce gpu_memory_utilization, or use CPU"

  - symptom: Slow first request
    cause: Model loading or compilation
    fix: "Pre-warm model, use smaller quantization, increase load timeout"

quick_reference:
  - topic: CLI Commands
    content: |
      ┌──────────────────────────────┬─────────────────────────────────┐
      │ Command                      │ Description                     │
      ├──────────────────────────────┼─────────────────────────────────┤
      │ xinference-local             │ Start local server              │
      │ xinference-supervisor        │ Start distributed supervisor    │
      │ xinference-worker            │ Start distributed worker        │
      │ xinference launch            │ Launch a model                  │
      │ xinference list              │ List running models             │
      │ xinference terminate         │ Stop a model                    │
      │ xinference engine            │ Query supported engines         │
      │ xinference register          │ Register custom model           │
      │ xinference registrations     │ List registered models          │
      └──────────────────────────────┴─────────────────────────────────┘

  - topic: Supported Engines
    content: |
      ┌──────────────────┬─────────────────────────────────────────────┐
      │ Engine           │ Best For                                    │
      ├──────────────────┼─────────────────────────────────────────────┤
      │ vLLM             │ Production throughput, OpenAI-compatible    │
      │ transformers     │ Development, flexibility                    │
      │ llama.cpp        │ GGUF models, CPU inference                  │
      │ sglang           │ Low latency, structured output              │
      │ lmdeploy         │ Turbomind engine, quantization              │
      │ mlx              │ Apple Silicon (M1/M2/M3)                    │
      └──────────────────┴─────────────────────────────────────────────┘

  - topic: Model Formats
    content: |
      ┌──────────────────┬─────────────────────────────────────────────┐
      │ Format           │ Compatible Engines                           │
      ├──────────────────┼─────────────────────────────────────────────┤
      │ pytorch          │ transformers, vLLM, sglang, lmdeploy        │
      │ ggufv2           │ llama.cpp                                   │
      │ gptq             │ transformers, vLLM, auto_gptq               │
      │ awq              │ transformers, vLLM, lmdeploy                │
      │ fp4/fp8          │ vLLM, transformers                          │
      │ bnb              │ transformers (bitsandbytes)                 │
      │ mlx              │ mlx (Apple only)                            │
      └──────────────────┴─────────────────────────────────────────────┘

  - topic: REST API Endpoints
    content: |
      ┌─────────────────────────────────┬────────┬──────────────────┐
      │ Endpoint                        │ Method │ Description      │
      ├─────────────────────────────────┼────────┼──────────────────┤
      │ /v1/models                      │ POST   │ Launch model     │
      │ /v1/models                      │ GET    │ List models      │
      │ /v1/models/{uid}                │ GET    │ Model info       │
      │ /v1/models/{uid}                │ DELETE │ Terminate model  │
      │ /v1/models/{uid}/progress       │ GET    │ Launch progress  │
      │ /v1/completions                 │ POST   │ Text completion  │
      │ /v1/chat/completions            │ POST   │ Chat completion  │
      │ /v1/embeddings                  │ POST   │ Embeddings       │
      │ /v1/engines/{model}             │ GET    │ Query engines    │
      │ /anthropic/v1/messages          │ POST   │ Anthropic API    │
      └─────────────────────────────────┴────────┴──────────────────┘

  - topic: Launch Flags
    content: |
      xinference launch \
        -n, --model-name        # Model name (required)
        -t, --model-type        # LLM/embedding/rerank/image/audio
        -en, --model-engine     # vLLM/transformers/llama.cpp/etc
        -f, --model-format      # pytorch/ggufv2/gptq/awq
        -s, --size-in-billions  # 7/13/70/etc
        -q, --quantization      # int4/int8/fp4/q4_k_m
        -r, --replica           # Number of replicas
        --n-worker              # Workers per replica
        --n-gpu                 # GPUs per worker (auto/none/N)
        --gpu-idx               # GPU IDs (0,1,2)
        --model-path            # Custom model path
