# Deep Knowledge: Self-LLM
# Repository: self-llm_HOW-TO
# Last Updated: 2026-02-22

name: self-llm
node_id: repo::datawhalechina/self-llm
github_full_name: datawhalechina/self-llm
html_url: https://github.com/datawhalechina/self-llm
source: llm_repos
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/deep/self_llm.yaml
  as_of: '2026-02-23'
description: Chinese educational collection for open-source LLM deployment, fine-tuning, and application development
tech_stack:
  - Python
  - PyTorch
  - Transformers
  - LangChain
  - Streamlit
  - FastAPI
  - Jupyter Notebooks

# Core Architecture
architecture:
  pattern: Educational Repository Collection
  components:
    - name: self-llm-master
      path: self-llm-master/
      description: 50+ LLM deployment/fine-tuning tutorials
    - name: llm-universe-main
      path: llm-universe-main/
      description: LLM application development course
    - name: tiny-universe-main
      path: tiny-universe-main/
      description: From-scratch RAG/Agent/Eval implementations
    - name: so-large-lm-main
      path: so-large-lm-main/
      description: LLM theory course

# Sub-Repository Details
sub_repos:
  - name: self-llm-master
    organization: Datawhale
    description: Open-source LLM deployment and fine-tuning guide
    content:
      - Environment configuration for various models
      - Local deployment tutorials
      - LangChain integration guides
      - WebDemo implementations
      - LoRA fine-tuning tutorials
    supported_models: 50+
    model_families:
      - LLaMA (3, 3.1, 4)
      - Qwen (1.5, 2, 2.5, 3, Audio, VL, Coder)
      - InternLM (1, 2, 3)
      - ChatGLM / GLM-4
      - DeepSeek (Base, Coder, R1)
      - Gemma (1, 2, 3)
      - Yi
      - Baichuan
      - MiniCPM
      - Phi (3, 4)
      - Kimi (K2.5, VL)
      - ERNIE-4.5
      - Hunyuan
      - Step-3.5-Flash
      - And 30+ more
    hardware_support:
      - NVIDIA GPU (CUDA)
      - AMD GPU (ROCm)
      - Ascend NPU

  - name: llm-universe-main
    organization: Datawhale
    description: Hands-on LLM application development course
    content:
      - LLM introduction for beginners
      - API calling (Baidu, iFlytek, Zhipu, etc.)
      - Knowledge base construction
      - RAG application building
      - LangChain integration
      - Streamlit deployment
      - Validation and iteration
    structure:
      - docs/ - Markdown documentation
      - notebook/ - Jupyter tutorials
      - data_base/ - Knowledge base examples
    key_chapters:
      - C1: LLM introduction
      - C2: API calling methods
      - C3: Knowledge base setup
      - C4: RAG chain construction
      - C5: Validation and evaluation
      - C6: Application examples

  - name: tiny-universe-main
    organization: Datawhale
    description: White-box LLM construction guide
    content:
      - Tiny Diffusion (image generation from scratch)
      - Tiny Llama3 (pre-training from scratch)
      - Tiny RAG (RAG framework from scratch)
      - Tiny Agent (agent system from scratch)
      - Tiny Eval (evaluation from scratch)
      - Tiny GraphRAG (GraphRAG from scratch)
      - Tiny Transformer (foundation)
    philosophy: "No high-level APIs, pure PyTorch implementations"

  - name: so-large-lm-main
    organization: Datawhale
    description: LLM theory course
    content:
      - Model architecture theory
      - Training methodology
      - Scaling laws
      - Attention mechanisms

# Tutorial Pattern (per model)
tutorial_pattern:
  typical_files:
    - "01-{model} FastApi 部署调用.md"
    - "02-{model} langchain 接入.md"
    - "03-{model} WebDemo 部署.md"
    - "04-{model} Lora 微调.md"
    - "{model}.ipynb"
  covers:
    - Environment setup (CUDA, dependencies)
    - Model download and loading
    - FastAPI server deployment
    - LangChain integration
    - Streamlit WebDemo
    - LoRA fine-tuning with XTuner/LLaMA-Factory

# Example Projects
examples:
  - name: Chat-嬛嬛
    path: examples/Chat-嬛嬛/
    description: Persona chatbot fine-tuned on Zhen Huan dialogue
    technique: LoRA fine-tuning on character dialogue

  - name: Tianji-天机
    path: examples/Tianji-天机/
    description: Social etiquette LLM system
    techniques:
      - Prompt engineering
      - Agent creation
      - Data collection
      - Model fine-tuning
      - RAG implementation

  - name: AMChat
    path: examples/AMchat-高等数学/
    description: Advanced mathematics tutor
    base_model: InternLM2-Math-7B
    technique: XTuner fine-tuning on math problems

  - name: 数字生命 (Digital Life)
    path: examples/数字生命/
    description: Personal AI clone
    technique: Fine-tuning on personal data

# Supported Operations
operations:
  deployment:
    - FastAPI REST server
    - Command-line inference
    - Streamlit WebDemo
    - LangChain integration
    - vLLM acceleration

  fine_tuning:
    - LoRA (Low-Rank Adaptation)
    - P-Tuning
    - Full fine-tuning
    - QLoRA (quantized LoRA)

  hardware:
    nvidia:
      - CUDA environment setup
      - cuDNN configuration
      - Multi-GPU support
    amd:
      - ROCm setup
      - Supported models: Gemma3, Qwen3
    ascend:
      - NPU support documentation

# Language and Audience
metadata:
  language: Chinese (中文)
  organization: Datawhale (开源学习社区)
  target_audience:
    - Students without API access
    - Developers learning LLM deployment
    - NLP practitioners
    - Anyone building custom LLMs
  skill_level: Beginner to Intermediate

# Integration Points
integrations:
  frameworks:
    - LangChain
    - LlamaIndex
    - XTuner
    - LLaMA-Factory
    - vLLM
    - Streamlit
    - FastAPI

  model_sources:
    - HuggingFace
    - ModelScope (魔搭社区)
    - WiseModel (智星)

  apis_covered:
    - OpenAI
    - Baidu Wenxin (文心)
    - iFlytek Spark (讯飞星火)
    - Zhipu AI (智谱)
    - Alibaba Tongyi (通义千问)

