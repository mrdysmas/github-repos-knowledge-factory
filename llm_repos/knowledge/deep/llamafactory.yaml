name: llamafactory
node_id: repo::hiyouga/llama-factory
github_full_name: hiyouga/llama-factory
html_url: https://github.com/hiyouga/llama-factory
source: llm_repos
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/deep/llamafactory.yaml
  as_of: '2026-02-23'
sparse: false
code_patterns:
  - name: LoRA SFT Training Config
    description: Standard YAML configuration for supervised fine-tuning with LoRA
    file_reference: examples/train_lora/qwen3_lora_sft.yaml
    code: |
      ### model
      model_name_or_path: Qwen/Qwen3-4B-Instruct-2507
      trust_remote_code: true

      ### method
      stage: sft
      do_train: true
      finetuning_type: lora
      lora_rank: 8
      lora_target: all

      ### dataset
      dataset: identity,alpaca_en_demo
      template: qwen3_nothink
      cutoff_len: 2048
      max_samples: 1000

      ### output
      output_dir: saves/qwen3-4b/lora/sft
      logging_steps: 10
      save_steps: 500
      plot_loss: true
      overwrite_output_dir: true

      ### train
      per_device_train_batch_size: 1
      gradient_accumulation_steps: 8
      learning_rate: 1.0e-4
      num_train_epochs: 3.0
      lr_scheduler_type: cosine
      warmup_ratio: 0.1
      bf16: true

  - name: DPO Preference Training Config
    description: Direct Preference Optimization configuration for alignment
    file_reference: examples/train_lora/qwen3_lora_dpo.yaml
    code: |
      ### model
      model_name_or_path: Qwen/Qwen3-4B-Instruct-2507
      trust_remote_code: true

      ### method
      stage: dpo
      do_train: true
      finetuning_type: lora
      lora_rank: 8
      lora_target: all
      pref_beta: 0.1
      pref_loss: sigmoid  # choices: [sigmoid (dpo), orpo, simpo]

      ### dataset
      dataset: dpo_en_demo
      template: qwen3_nothink
      cutoff_len: 2048

      ### train
      learning_rate: 5.0e-6
      num_train_epochs: 3.0
      bf16: true

  - name: CLI Entry Point
    description: Main CLI dispatcher that routes to launcher based on USE_V1 env var
    file_reference: src/llamafactory/cli.py
    code: |
      def main():
          from .extras.misc import is_env_enabled

          if is_env_enabled("USE_V1"):
              from .v1 import launcher
          else:
              from . import launcher

          launcher.launch()

      if __name__ == "__main__":
          from multiprocessing import freeze_support
          freeze_support()
          main()

  - name: Dataset Configuration Format
    description: JSON structure defining dataset sources and column mappings
    file_reference: data/dataset_info.json
    code: |
      {
        "alpaca_en_demo": {
          "file_name": "alpaca_en_demo.json"
        },
        "glaive_toolcall_en_demo": {
          "file_name": "glaive_toolcall_en_demo.json",
          "formatting": "sharegpt",
          "columns": {
            "messages": "conversations",
            "tools": "tools"
          }
        },
        "dpo_en_demo": {
          "file_name": "dpo_en_demo.json",
          "ranking": true,
          "formatting": "sharegpt",
          "columns": {
            "messages": "conversations",
            "chosen": "chosen",
            "rejected": "rejected"
          }
        },
        "ultrachat_200k": {
          "hf_hub_url": "HuggingFaceH4/ultrachat_200k",
          "split": "train_sft",
          "formatting": "sharegpt",
          "columns": {"messages": "messages"},
          "tags": {
            "role_tag": "role",
            "content_tag": "content",
            "user_tag": "user",
            "assistant_tag": "assistant"
          }
        }
      }

  - name: LoRA Arguments Definition
    description: Dataclass defining LoRA-specific hyperparameters
    file_reference: src/llamafactory/hparams/finetuning_args.py
    code: |
      @dataclass
      class LoraArguments:
          additional_target: str | None = field(default=None)
          lora_alpha: int | None = field(default=None)  # default: lora_rank * 2
          lora_dropout: float = field(default=0.0)
          lora_rank: int = field(default=8)
          lora_target: str = field(default="all")  # comma-separated or "all"
          loraplus_lr_ratio: float | None = field(default=None)
          use_rslora: bool = field(default=False)
          use_dora: bool = field(default=False)
          pissa_init: bool = field(default=False)

      @dataclass
      class FinetuningArguments(LoraArguments, RLHFArguments, ...):
          stage: Literal["pt", "sft", "rm", "ppo", "dpo", "kto"] = "sft"
          finetuning_type: Literal["lora", "oft", "freeze", "full"] = "lora"

  - name: Model Arguments Definition
    description: Dataclass for model loading and inference configuration
    file_reference: src/llamafactory/hparams/model_args.py
    code: |
      @dataclass
      class BaseModelArguments:
          model_name_or_path: str | None = field(default=None)
          adapter_name_or_path: str | None = field(default=None)
          cache_dir: str | None = field(default=None)
          use_fast_tokenizer: bool = field(default=True)
          trust_remote_code: bool = field(default=False)
          flash_attn: AttentionFunction = field(default=AttentionFunction.AUTO)
          quantization_method: QuantizationMethod = field(default=QuantizationMethod.BNB)
          quantization_bit: int | None = field(default=None)
          infer_backend: EngineName = field(default=EngineName.HF)

configuration:
  - key: model_name_or_path
    type: str
    default: required
    description: HuggingFace model ID or local path
  - key: stage
    type: str
    default: sft
    description: Training stage - pt/sft/rm/ppo/dpo/kto
  - key: finetuning_type
    type: str
    default: lora
    description: Fine-tuning method - lora/oft/freeze/full
  - key: lora_rank
    type: int
    default: 8
    description: LoRA rank (intrinsic dimension)
  - key: lora_target
    type: str
    default: all
    description: Target modules (comma-separated or "all" for all linear)
  - key: dataset
    type: str
    default: required
    description: Comma-separated dataset names from dataset_info.json
  - key: template
    type: str
    default: required
    description: Chat template name (e.g., qwen3_nothink, llama3)
  - key: cutoff_len
    type: int
    default: 2048
    description: Maximum sequence length
  - key: learning_rate
    type: float
    default: 1e-4
    description: Learning rate (use 5e-6 for DPO)
  - key: num_train_epochs
    type: float
    default: 3.0
    description: Number of training epochs
  - key: bf16
    type: bool
    default: true
    description: Use bfloat16 precision
  - key: output_dir
    type: str
    default: required
    description: Output directory for checkpoints
  - key: quantization_bit
    type: int
    default:
    description: Bits for QLoRA (4 or 8)
  - key: pref_beta
    type: float
    default: 0.1
    description: Beta parameter for DPO/KTO preference loss
  - key: pref_loss
    type: str
    default: sigmoid
    description: DPO loss type - sigmoid/hinge/ipo/orpo/simpo

common_tasks:
  - task: Launch Web UI
    command: llamafactory-cli webui
    description: Start browser-based training interface
  - task: Train with config file
    command: llamafactory-cli train examples/train_lora/qwen3_lora_sft.yaml
    description: Run training from YAML configuration
  - task: Chat with trained model
    command: llamafactory-cli chat examples/inference/qwen3_lora_sft.yaml
    description: Interactive chat with fine-tuned model
  - task: Start API server
    command: llamafactory-cli api examples/inference/qwen3.yaml infer_backend=vllm
    description: Launch OpenAI-compatible API server
  - task: Export merged model
    command: llamafactory-cli export examples/merge_lora/qwen3_lora_sft.yaml
    description: Merge LoRA weights into base model
  - task: Train with CLI overrides
    command: llamafactory-cli train --stage sft --model_name_or_path Qwen/Qwen2-7B --dataset alpaca_en --template qwen --output_dir output
    description: Train without config file using CLI args

troubleshooting:
  - issue: OOM during training
    solution: |
      - Reduce per_device_train_batch_size to 1
      - Increase gradient_accumulation_steps to maintain effective batch size
      - Use QLoRA: set quantization_bit=4
      - Reduce cutoff_len (sequence length)
      - Enable gradient_checkpointing (default on)
  - issue: Model not found
    solution: |
      - Verify model_name_or_path is correct HuggingFace ID or local path
      - Set trust_remote_code=true for models with custom code
      - Check HF_TOKEN environment variable for gated models
  - issue: Template errors
    solution: |
      - Use correct template name for your model (qwen3_nothink, llama3, etc.)
      - Check templates in src/llamafactory/data/template.py
      - For custom models, create new template entry
  - issue: Dataset loading fails
    solution: |
      - Verify dataset name exists in data/dataset_info.json
      - For HuggingFace datasets, check hf_hub_url
      - Ensure column mappings match your data format

quick_reference:
  - "# List available templates"
  - "grep -r 'register_template' src/llamafactory/data/template.py"
  - ""
  - "# Quick SFT training"
  - "llamafactory-cli train --stage sft --model_name_or_path Qwen/Qwen2-7B --dataset alpaca_en --template qwen --output_dir saves/test"
  - ""
  - "# QLoRA training (4-bit)"
  - "llamafactory-cli train config.yaml quantization_bit=4 finetuning_type=lora"
  - ""
  - "# Multi-GPU training"
  - "torchrun --nproc_per_node 4 -m llamafactory.cli train config.yaml"
