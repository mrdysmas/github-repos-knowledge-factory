category: agent_orchestration

architecture:
  module_breakdown:
  - module: src/cli
    responsibility: "Command-line entrypoints for orchestrating multi-agent workflows."
    key_files:
    - src/cli/index.ts
    - src/cli/commands
  - module: src/core
    responsibility: "Workflow graph execution, task routing, and state coordination."
    key_files:
    - src/core/orchestrator.ts
    - src/core/workflow.ts
  - module: src/integrations
    responsibility: "Provider and tool adapters used by orchestration flows."
    key_files:
    - src/integrations
  key_abstractions:
  - name: FlowOrchestrator
    purpose: "Coordinates task planning and execution across agent steps."
  - name: WorkflowGraph
    purpose: "Represents task dependencies and ordered execution paths."
  - name: AgentTask
    purpose: "Single unit of work with input context and completion output."

code_patterns:
- pattern: "Graph-driven orchestration"
  description: "Workflow execution is represented as nodes and edges with explicit dependencies."
  location: src/core/workflow.ts
- pattern: "CLI command dispatch"
  description: "CLI handlers route user commands to orchestration services."
  location: src/cli/index.ts
- pattern: "Provider abstraction layer"
  description: "Integrations are encapsulated behind adapter interfaces."
  location: src/integrations

implementation_patterns:
- pattern: "Task-state checkpointing"
  description: "Execution state is updated between stages to support resumable flow runs."
  location: src/core/orchestrator.ts
- pattern: "Config-driven pipeline assembly"
  description: "Workflow structure can be assembled from declarative configuration."
  location: src/core/workflow.ts

core_modules:
  cli_surface:
    path: src/cli
    description: "CLI interface for creating and running flow definitions."
  orchestration_engine:
    path: src/core
    description: "Core runtime for task scheduling and agent handoff."
  integration_layer:
    path: src/integrations
    description: "External tool and provider bindings."

key_features:
- feature: "Multi-agent workflow orchestration"
  description: "Coordinates multiple agent tasks within a single execution graph."
- feature: "CLI-first operations"
  description: "Exposes orchestration capabilities as command-line commands."
- feature: "Configurable flow definitions"
  description: "Supports declarative setup for repeatable workflow execution."
- feature: "Integration adapter model"
  description: "Allows external tools and providers to plug into orchestration pipelines."

key_files:
- path: README.md
  description: "High-level setup and usage examples."
- path: package.json
  description: "Dependency and script definitions for the Node project."
- path: src/cli/index.ts
  description: "CLI bootstrap and command routing."
- path: src/core/orchestrator.ts
  description: "Runtime orchestrator implementation."
- path: src/core/workflow.ts
  description: "Workflow graph and execution definitions."

configuration:
- name: runtime_config
  options:
  - key: provider
    description: "Selected model or orchestration provider backend."
  - key: workflow_file
    description: "Path to workflow graph definition."
  - key: concurrency
    description: "Parallel task execution limit."
- name: environment_settings
  options:
  - key: API_KEY
    description: "Credential used by integration providers."
  - key: LOG_LEVEL
    description: "Runtime logging verbosity."

testing:
  framework: javascript
  structure: "Tests cover CLI command routing and core orchestration behavior."
  coverage_areas:
  - "Workflow graph execution correctness"
  - "Task dependency handling"
  - "Integration adapter behavior"
  test_patterns:
  - "npm test"

integrations:
  tooling:
  - CLI automation
  - provider APIs
  - local developer workflows

quick_reference:
- topic: "Install dependencies"
  command: "npm install"
- topic: "Build project"
  command: "npm run build"
- topic: "Run tests"
  command: "npm test"

commands:
- name: "npm install"
  description: "Install Node dependencies."
  usage: "npm install"
- name: "npm run build"
  description: "Compile TypeScript sources."
  usage: "npm run build"
- name: "npm test"
  description: "Run unit and integration test suite."
  usage: "npm test"

api_surface:
  public_functions:
  - name: runWorkflow
    purpose: "Execute a workflow graph with the configured orchestrator."
    location: src/core/orchestrator.ts
  - name: loadWorkflow
    purpose: "Load workflow definitions from configuration files."
    location: src/core/workflow.ts
