# Deep Knowledge: Pathway
# Repository: pathway-main
# Last Updated: 2026-02-22

name: pathway
node_id: repo::pathwaycom/pathway
github_full_name: pathwaycom/pathway
html_url: https://github.com/pathwaycom/pathway
source: llm_repos
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/deep/pathway.yaml
  as_of: '2026-02-25'
description: Python ETL framework for stream processing, real-time analytics, LLM pipelines, and RAG
tech_stack:
  - Python 3.10+
  - Rust (Differential Dataflow engine)
  - maturin (Python-Rust binding)
  - Docker
  - Kubernetes

# Core Architecture
architecture:
  pattern: Hybrid (Python API + Rust Engine)
  components:
    - name: Python API
      path: python/pathway/
      description: Primary user-facing API for data pipelines
    - name: IO Connectors
      path: python/pathway/io/
      description: 30+ data source/sink connectors
    - name: Standard Library
      path: python/pathway/stdlib/
      description: graphs, indexing, ml, temporal, stateful
    - name: Rust Engine
      path: src/
      description: Differential dataflow computation engine
    - name: LLM Extensions
      path: python/pathway/xpacks/llm/
      description: OpenAI, Anthropic, Cohere integrations
    - name: CLI
      path: python/pathway/cli.py
      description: spawn, run, deployment commands

# Code Patterns
code_patterns:
  - pattern: Table-based Dataflow
    file: python/pathway/__init__.py
    key_classes:
      - Table
      - Promise
    key_functions:
      - pw.debug.table_to_str()
      - pw.run()
      - pw.universes
    description: |
      Data represented as Tables with typed schemas.
      Operations are lazily evaluated until pw.run().
      Supports incremental updates via differential dataflow.

  - pattern: IO Connectors
    base_path: python/pathway/io/
    implementations:
      - connector: kafka
        file: python/pathway/io/kafka/__init__.py
        type: Streaming
      - connector: redpanda
        file: python/pathway/io/redpanda/__init__.py
        type: Streaming
      - connector: kinesis
        file: python/pathway/io/kinesis/__init__.py
        type: Streaming
      - connector: pubsub
        file: python/pathway/io/pubsub/__init__.py
        type: Streaming
      - connector: nats
        file: python/pathway/io/nats/__init__.py
        type: Streaming
      - connector: postgres
        file: python/pathway/io/postgres/__init__.py
        type: Database
      - connector: mysql
        file: python/pathway/io/mysql/__init__.py
        type: Database
      - connector: sqlite
        file: python/pathway/io/sqlite/__init__.py
        type: Database
      - connector: mongodb
        file: python/pathway/io/mongodb/__init__.py
        type: Database
      - connector: bigquery
        file: python/pathway/io/bigquery/__init__.py
        type: Cloud
      - connector: s3
        file: python/pathway/io/s3/__init__.py
        type: Cloud Storage
      - connector: gdrive
        file: python/pathway/io/gdrive/__init__.py
        type: Cloud Storage
      - connector: minio
        file: python/pathway/io/minio/__init__.py
        type: Cloud Storage
      - connector: deltalake
        file: python/pathway/io/deltalake/__init__.py
        type: Lakehouse
      - connector: iceberg
        file: python/pathway/io/iceberg/__init__.py
        type: Lakehouse
      - connector: airbyte
        file: python/pathway/io/airbyte/__init__.py
        type: 300+ connectors via Airbyte
      - connector: elasticsearch
        file: python/pathway/io/elasticsearch/__init__.py
        type: Search
      - connector: dynamodb
        file: python/pathway/io/dynamodb/__init__.py
        type: NoSQL
    description: |
      Unified API for batch and streaming sources.
      Connectors handle change data capture (CDC).
      Airbyte integration provides 300+ additional sources.

  - pattern: LLM Extensions (xpacks)
    base_path: python/pathway/xpacks/llm/
    modules:
      - llm.chat
      - llm.embedders
      - llm.parsers
      - llm.splitters
    providers:
      - OpenAI
      - Anthropic
      - Cohere
      - Custom endpoints
    description: |
      Built-in LLM integrations for RAG pipelines.
      Real-time document processing and embedding.
      Supports function calling and tool use.

  - pattern: Standard Library Modules
    base_path: python/pathway/stdlib/
    modules:
      - name: graphs
        path: python/pathway/stdlib/graphs/
        description: Graph algorithms
      - name: indexing
        path: python/pathway/stdlib/indexing/
        description: Data indexing
      - name: ml
        path: python/pathway/stdlib/ml/
        description: ML integrations
      - name: temporal
        path: python/pathway/stdlib/temporal/
        description: Windowing, temporal joins
      - name: stateful
        path: python/pathway/stdlib/stateful/
        description: State management
      - name: statistical
        path: python/pathway/stdlib/statistical/
        description: Statistical functions
      - name: viz
        path: python/pathway/stdlib/viz/
        description: Visualization utilities

  - pattern: CLI Spawn Command
    file: python/pathway/cli.py
    key_functions:
      - create_process_handles()
      - wait_for_process_handles()
      - spawn()
    description: |
      Multi-process deployment with scaling support.
      Exit codes for downscale (10) and upscale (12).
      Worker coordination via environment variables.

# Configuration
environment:
  required: []

  optional:
    - key: PW_THREADS
      default: "1"
      description: Worker threads per process
    - key: PW_PROCESSES
      default: "1"
      description: Number of processes
    - key: PW_MONITORING_PORT
      default: "3000"
      description: Dashboard port
    - key: PW_PERSISTENCE_MODE
      default: ""
      description: Persistence settings
    - key: PW_LICENSE_KEY
      default: ""
      description: Enterprise license key
    - key: PATHWAY_THREADS
      default: "1"
      description: Internal thread count
    - key: PATHWAY_FIRST_PORT
      default: ""
      description: First port for distributed mode

cli_arguments:
  - flag: spawn
    args: "[python main.py]"
    description: Run with monitoring dashboard
  - flag: spawn --threads
    args: "N"
    description: Set worker threads
  - flag: spawn --processes
    args: "N"
    description: Set process count

# Commands
commands:
  installation:
    command: pip install pathway
    alternatives:
      - pip install pathway[xpack-llm]
      - pip install -e .[dev]
    description: Install Pathway (with optional LLM extras)

  running:
    command: python main.py
    description: Run Pathway script
    alternatives:
      - pathway spawn python main.py
      - pathway spawn --threads 4 python main.py

  docker:
    command: docker run -v $(pwd):/app pathwaycom/pathway python main.py
    description: Run in Docker container

# Troubleshooting
troubleshooting:
  - issue: Connection refused to data source
    symptom: Kafka, Postgres, etc. connection errors
    cause: Network configuration or credentials
    solution: |
      Verify connection string and credentials.
      Check firewall rules and network access.
      Test with simple Python client first.

  - issue: Out of memory errors
    symptom: Pipeline crashes, memory warnings
    cause: Large data volume, insufficient heap
    solution: |
      Reduce batch size, increase PW_THREADS.
      Enable persistence to offload state.
      Consider data partitioning.

  - issue: Slow incremental updates
    symptom: Updates take longer than expected
    cause: Not leveraging incremental computation
    solution: |
      Ensure using streaming connectors.
      Check that pw.run() is called once.
      Review table operations for re-computation.

  - issue: LLM timeout errors
    symptom: API calls timeout, incomplete responses
    cause: Large documents, rate limiting
    solution: |
      Increase timeout settings.
      Implement chunking for large documents.
      Add retry logic with exponential backoff.

