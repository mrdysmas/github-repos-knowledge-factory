code_patterns:
  - name: Runnable LCEL Chain
    description: Compose chains using pipe operator for sequential execution
    code: |
      from langchain_core.runnables import RunnableLambda, RunnableParallel

      # Sequential chain with pipe operator
      chain = (
          RunnableLambda(lambda x: x + 1)
          | RunnableLambda(lambda x: x * 2)
      )
      chain.invoke(3)  # Returns 8

      # Parallel execution with dict
      parallel = RunnableParallel({
          "add": RunnableLambda(lambda x: x + 1),
          "mul": RunnableLambda(lambda x: x * 2),
      })
      parallel.invoke(3)  # Returns {'add': 4, 'mul': 6}
    file_reference: libs/core/langchain_core/runnables/base.py

  - name: RunnablePassthrough with Assign
    description: Preserve input while adding computed fields for RAG context injection
    code: |
      from langchain_core.runnables import RunnablePassthrough

      # Pass through input while adding context from retriever
      rag_chain = (
          {"context": retriever, "question": RunnablePassthrough()}
          | prompt
          | llm
      )

      # Or use assign for more control
      chain = RunnablePassthrough.assign(
          context=lambda x: retriever.invoke(x["query"])
      ) | prompt | llm
    file_reference: libs/core/langchain_core/runnables/passthrough.py

  - name: RunnableBranch Conditional Routing
    description: Route inputs to different chains based on condition evaluation
    code: |
      from langchain_core.runnables import RunnableBranch

      branch = RunnableBranch(
          (lambda x: isinstance(x, str), lambda x: x.upper()),
          (lambda x: isinstance(x, int), lambda x: x + 1),
          (lambda x: isinstance(x, float), lambda x: x * 2),
          lambda x: "unknown type",  # default
      )
      branch.invoke("hello")  # "HELLO"
      branch.invoke(5)        # 6
    file_reference: libs/core/langchain_core/runnables/branch.py

  - name: BaseRetriever Implementation
    description: Custom retriever by implementing _get_relevant_documents
    code: |
      from langchain_core.retrievers import BaseRetriever
      from langchain_core.documents import Document
      from typing import List

      class MyRetriever(BaseRetriever):
          def _get_relevant_documents(self, query: str) -> List[Document]:
              # Custom retrieval logic
              docs = []
              for item in search(query):
                  docs.append(Document(
                      page_content=item.text,
                      metadata={"source": item.source}
                  ))
              return docs

          async def _aget_relevant_documents(self, query: str) -> List[Document]:
              # Optional async implementation
              return self._get_relevant_documents(query)
    file_reference: libs/core/langchain_core/retrievers.py

  - name: ChatOpenAI with Tool Calling
    description: LLM integration with structured output and tool binding
    code: |
      from langchain_openai import ChatOpenAI
      from langchain_core.tools import tool

      llm = ChatOpenAI(model="gpt-4", temperature=0.7)

      @tool
      def get_weather(location: str) -> str:
          """Get weather for a location."""
          return f"Weather in {location}: Sunny"

      llm_with_tools = llm.bind_tools([get_weather])
      response = llm_with_tools.invoke("What's the weather in Paris?")
    file_reference: libs/partners/openai/langchain_openai/chat_models/base.py

  - name: Agent Action Schema
    description: Agent execution loop with tool calls and observations
    code: |
      from langchain_core.agents import AgentAction, AgentFinish

      # Agent decides to use a tool
      action = AgentAction(
          tool="search",
          tool_input="LangChain documentation",
          log="Thought: I should search for docs"
      )

      # After tool execution, get observation
      observation = tool_executor.execute(action)

      # Final result
      finish = AgentFinish(
          return_values={"output": "The answer is..."},
          log="Final Answer: ..."
      )
    file_reference: libs/core/langchain_core/agents.py

configuration:
  - name: pyproject.toml
    options:
      - key: python_requires
        default: ">=3.10"
        description: Python version support (3.10-3.14)
      - key: langchain-core
        default: ">=1.2.5"
        description: Core abstractions dependency
      - key: pydantic
        default: ">=2.7.4"
        description: Data validation
      - key: langsmith
        default: ">=0.1.17"
        description: Tracing and observability

  - name: ChatOpenAI Parameters
    options:
      - key: model
        default: "gpt-3.5-turbo"
        description: OpenAI model name
      - key: temperature
        default: "0.7"
        description: Sampling randomness (0-2)
      - key: max_tokens
        default: "null"
        description: Max output tokens
      - key: streaming
        default: "false"
        description: Enable streaming responses
      - key: api_key
        default: "env OPENAI_API_KEY"
        description: API key or env variable

  - name: Runnable Configuration
    options:
      - key: max_concurrency
        default: "null"
        description: Max parallel executions in batch
      - key: return_exceptions
        default: "false"
        description: Return exceptions instead of raising
      - key: callbacks
        default: "[]"
        description: Callback handlers for tracing

common_tasks:
  - task: Build RAG Pipeline
    steps:
      - "Load documents: docs = PyPDFLoader('file.pdf').load()"
      - "Split text: splits = RecursiveCharacterTextSplitter(chunk_size=1000).split_documents(docs)"
      - "Create embeddings: vectorstore = FAISS.from_documents(splits, embeddings)"
      - "Build chain: rag = ({'context': retriever, 'question': RunnablePassthrough()} | prompt | llm)"
    gotchas:
      - "Chunk overlap should be 10-20% of chunk size for context continuity"
      - "Use RunnablePassthrough to preserve original query in RAG chains"
      - "Retriever returns List[Document], need to format for prompt"

  - task: Create Custom Tool
    steps:
      - "Define function with @tool decorator"
      - "Add docstring (used as tool description for LLM)"
      - "Type hints required for input schema"
      - "Bind to LLM: llm.bind_tools([my_tool])"
    gotchas:
      - "Docstring becomes tool description - make it descriptive"
      - "Complex types need Pydantic models for schema"

  - task: Run Tests
    steps:
      - "uv sync --all-groups  # Install all deps"
      - "make test  # Unit tests only"
      - "uv run --group test pytest tests/unit_tests/ -v"
    gotchas:
      - "Set LANGCHAIN_TRACING_V2=false to disable tracing in tests"
      - "Integration tests require API keys - use unit tests for CI"

troubleshooting:
  - symptom: Runnable sequence fails with type mismatch
    cause: Output of one runnable doesn't match input schema of next
    fix: "Add RunnablePassthrough.assign to transform/add keys, or use RunnableLambda for adaptation"

  - symptom: Tool not being called by agent
    cause: Tool description unclear or LLM doesn't know when to use it
    fix: "Improve docstring with specific examples of when to use the tool"

  - symptom: Streaming not working
    cause: Not using stream() method or callbacks not set up
    fix: "Use chain.stream(input) instead of invoke(), or set streaming=True on LLM"

  - symptom: Pydantic validation errors
    cause: LangChain v0.2+ requires Pydantic v2
    fix: "Upgrade pydantic>=2.7.4, update model definitions to use model_config"

quick_reference:
  - topic: LCEL Operators
    content: |
      ┌──────────────────┬────────────────────────────────────────┐
      │ Operator         │ Description                            │
      ├──────────────────┼────────────────────────────────────────┤
      │ r1 | r2          │ Sequential composition                 │
      │ {"a": r1, "b": r2}│ Parallel execution (RunnableParallel) │
      │ r1.assign(k=r2)  │ Add key to dict output                 │
      │ r1.pick("key")   │ Extract specific key from dict         │
      │ r1.batch([i1,i2])│ Process multiple inputs                │
      │ r1.stream(input) │ Stream output chunks                   │
      └──────────────────┴────────────────────────────────────────┘

  - topic: Common Imports
    content: |
      from langchain_core.runnables import (
          RunnableLambda,      # Wrap functions
          RunnableParallel,    # Concurrent execution
          RunnablePassthrough, # Identity pass-through
          RunnableBranch,      # Conditional routing
          chain,               # Decorator for chains
      )
      from langchain_core.documents import Document
      from langchain_core.prompts import ChatPromptTemplate
      from langchain_openai import ChatOpenAI

  - topic: Test Commands
    content: |
      ┌───────────────────────────┬────────────────────────────────┐
      │ Command                   │ Purpose                        │
      ├───────────────────────────┼────────────────────────────────┤
      │ make test                 │ Run unit tests                 │
      │ make lint                 │ Ruff linting                   │
      │ make test_watch           │ Watch mode for tests           │
      │ uv run pytest -m requires │ Run tests with markers         │
      └───────────────────────────┴────────────────────────────────┘
