name: maxkb
node_id: repo::1panel-dev/maxkb
github_full_name: 1panel-dev/maxkb
html_url: https://github.com/1panel-dev/maxkb
source: llm_repos
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/deep/maxkb.yaml
  as_of: '2026-02-23'
type: application_platform
description: MaxKB - Knowledge base Q&A system built on Django with RAG capabilities

architecture:
  framework: Django 5.2.11
  api_framework: Django REST Framework
  frontend: Vue.js
  database: PostgreSQL + pgvector
  task_queue: Celery + Redis
  llm_framework: LangChain

  components:
    web: Django web server
    worker: Celery task worker
    beat: Celery beat scheduler

core_modules:
  knowledge:
    path: apps/knowledge/
    description: Knowledge base management
    models:
      - Knowledge: Knowledge base container
      - Document: Uploaded documents
      - Paragraph: Text segments
      - Problem: Q&A pairs
      - Embedding: Vector embeddings

  application:
    path: apps/application/
    description: Application configuration
    models:
      - Application: App config
      - ApplicationFolder: MPTT hierarchy for organization
      - ApplicationDatasetMapping: KB-to-app mapping

  models_provider:
    path: apps/models_provider/
    description: LLM provider management
    functions:
      - Provider registration
      - Model configuration
      - API key management
      - Model testing

  chat:
    path: apps/chat/
    description: Conversation handling
    components:
      - Chat session management
      - Message flow
      - AI response generation

  tools:
    path: apps/tools/
    description: Custom tools and integrations
    features:
      - Tool registration
      - MCP (Model Context Protocol) integration
      - Custom function tools

  setting:
    path: apps/setting/
    description: System configuration
    models:
      - System settings
      - User preferences
      - Team management

  opa:
    path: apps/opa/
    description: Open Policy Agent integration
    purpose: Authorization and access control

supported_llm_providers:
  international_cloud:
    - OpenAI
    - Anthropic
    - Google (Gemini)
    - DeepSeek

  chinese_cloud:
    - Baidu QianFan
    - Zhipu ChatGLM
    - Alibaba Dashscope
    - Tencent Hunyuan
    - Xunfei Spark

  local:
    - Ollama
    - Xinference

cli_commands:
  development:
    web: "python main.py dev web"
    description: Start development web server (0.0.0.0:8080)

    celery: "python main.py dev celery"
  production:
    all: "python main.py start all"
    description: Start all production services

    web: "python main.py start web"
    celery: "python main.py start celery"
  maintenance:
    upgrade_db: "python main.py upgrade_db"
    description: Run database migrations

configuration:
  config_path: /opt/maxkb/conf
  celery_data_path: /data/celery_task

  required_services:
    - PostgreSQL (with pgvector extension)
    - Redis

  environment_variables:
    - DATABASE_URL: PostgreSQL connection
    - REDIS_URL: Redis connection
    - SECRET_KEY: Django secret key

key_files:
  - path: main.py
    description: CLI entry point

  - path: apps/knowledge/
    description: Core knowledge base functionality

  - path: apps/application/
    description: Application management

  - path: apps/models_provider/
    description: LLM provider integrations

  - path: apps/chat/
    description: Chat/conversation logic

  - path: apps/tools/
    description: Tool and MCP integration

  - path: util/
    description: Shared utilities

  - path: common/
    description: Common Django configurations

database_models:
  knowledge_hierarchy: Knowledge -> Document -> Paragraph -> Embedding Knowledge -> Problem (Q&A pairs)

  application_hierarchy: ApplicationFolder (MPTT) -> Application Application -> ApplicationDatasetMapping -> Knowledge

  user_hierarchy: User -> Team -> Application

rag_pipeline:
  document_processing:
    - Upload document
    - Parse and segment into paragraphs
    - Generate embeddings
    - Store in vector database

  retrieval:
    - Query embedding
    - Vector similarity search
    - Re-ranking (optional)
    - Context assembly

  generation:
    - Prompt construction with context
    - LLM inference
    - Response streaming

api_structure:
  authentication: JWT-based
  versioning: URL-based (/api/v1/)

  endpoints:
    knowledge:
      - POST /api/v1/knowledge
      - GET /api/v1/knowledge/{id}
      - POST /api/v1/knowledge/{id}/document

    application:
      - POST /api/v1/application
      - GET /api/v1/application/{id}
      - POST /api/v1/application/{id}/chat

    models:
      - GET /api/v1/provider
      - POST /api/v1/provider/{id}/model

deployment:
  docker:
    dockerfile: Dockerfile
    compose: docker-compose.yml

  kubernetes:
    manifest_dir: deploy/kubernetes/ (if exists)

  requirements:
    - PostgreSQL 12+
    - Redis 6+
    - Python 3.10+
    - Node.js 18+ (for frontend build)

notes:
  - Chinese-language codebase with Chinese comments
  - Active development by 1Panel team
  - Designed for enterprise knowledge management
  - Supports multi-tenant via teams
  - MPTT (Modified Preorder Tree Traversal) for folder hierarchies
