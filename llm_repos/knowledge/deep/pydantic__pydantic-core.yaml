name: pydantic-core
node_id: repo::pydantic/pydantic-core
github_full_name: pydantic/pydantic-core
html_url: https://github.com/pydantic/pydantic-core
source: remote_metadata
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/deep/pydantic__pydantic-core.yaml
  as_of: '2026-03-05'
directory: remote::pydantic/pydantic-core
category: structured_outputs

architecture:
  module_breakdown:
    - module: src/lib.rs
      responsibility: "Defines the PyO3 extension module and exports validator and serializer entrypoints."
      key_files:
        - src/lib.rs
    - module: src/validators
      responsibility: "Implements schema-driven validation logic across Python and JSON inputs."
      key_files:
        - src/validators/mod.rs
        - src/validators/model.rs
        - src/validators/typed_dict.rs
    - module: src/serializers
      responsibility: "Implements to_python and to_json serialization pathways."
      key_files:
        - src/serializers/mod.rs
        - src/serializers/type_serializers
    - module: python/pydantic_core
      responsibility: "Exposes the Python import surface and typed helper structures."
      key_files:
        - python/pydantic_core/__init__.py
        - python/pydantic_core/core_schema.py
    - module: src/errors
      responsibility: "Defines validation and serialization error types and reporting structures."
      key_files:
        - src/errors
  key_abstractions:
    - name: SchemaValidator
      purpose: "Compiled validator that executes schema validation against runtime inputs."
    - name: SchemaSerializer
      purpose: "Compiled serializer for Python and JSON output generation."
    - name: CoreSchema
      purpose: "Schema contract consumed by Rust validator and serializer builders."
    - name: ValidationError
      purpose: "Structured error object returned when validation fails."

code_patterns:
  - pattern: "PyO3 export module for Python bindings"
    description: "Rust functions and classes are exposed through a single _pydantic_core pymodule."
    location: src/lib.rs
  - pattern: "DefinitionsBuilder for schema compilation"
    description: "Validator and serializer construction use shared definition graphs before finalization."
    location: src/validators/mod.rs
  - pattern: "Per-type validator modules"
    description: "Validation behavior is split into dedicated modules such as list, dict, tuple, and union."
    location: src/validators/mod.rs
  - pattern: "Serializer state with warning control"
    description: "Serialization paths track warnings and options through explicit state objects."
    location: src/serializers/mod.rs

implementation_patterns:
  - pattern: "Configurable partial JSON parsing"
    description: "from_json accepts partial parsing and string cache modes for controlled parsing behavior."
    location: src/lib.rs
  - pattern: "Rust-side JSON size caching"
    description: "SchemaSerializer tracks expected JSON size to optimize repeated serialization allocations."
    location: src/serializers/mod.rs
  - pattern: "Strict and extra behavior flags"
    description: "Validation entrypoints accept strict and extra controls for runtime behavior."
    location: src/validators/mod.rs

core_modules:
  rust_entrypoint:
    path: src/lib.rs
    description: "Extension module initialization and top-level function exports."
  validators:
    path: src/validators/mod.rs
    description: "SchemaValidator implementation and type-specific validator wiring."
    submodules:
      - src/validators/model.rs
      - src/validators/union.rs
      - src/validators/typed_dict.rs
  serializers:
    path: src/serializers/mod.rs
    description: "SchemaSerializer implementation and serialization pipelines."
    submodules:
      - src/serializers/type_serializers
      - src/serializers/shared.rs
  python_api:
    path: python/pydantic_core/__init__.py
    description: "Python-visible API exports and typed dictionaries for errors."

key_features:
  - feature: "Rust-backed schema validation"
    description: "Validation executes in Rust through SchemaValidator for performance and consistency."
  - feature: "Rust-backed serialization"
    description: "SchemaSerializer supports both Python object and JSON output pathways."
  - feature: "Direct JSON parsing helper"
    description: "from_json parses bytes, bytearray, or str with parser options."
  - feature: "Typed Python API surface"
    description: "Python package exports typed interfaces including CoreSchema and error structures."
  - feature: "Granular error reporting"
    description: "ValidationError and related error structures preserve location and context data."

key_files:
  - path: Cargo.toml
    description: "Rust crate metadata and dependency graph."
  - path: pyproject.toml
    description: "Python packaging metadata and maturin build settings."
  - path: src/lib.rs
    description: "Rust extension entrypoint and exported module wiring."
  - path: src/validators/mod.rs
    description: "Validator core implementation and module composition."
  - path: src/serializers/mod.rs
    description: "Serializer core implementation and JSON/Python output logic."
  - path: python/pydantic_core/__init__.py
    description: "Python import surface and __all__ export definitions."

configuration:
  - name: build_configuration
    options:
      - key: module-name
        default: "pydantic_core._pydantic_core"
        description: "Maturin module name for the compiled extension."
      - key: bindings
        default: "pyo3"
        description: "Build binding strategy defined in maturin config."
      - key: python-source
        default: "python"
        description: "Python source root for package layout."
  - name: runtime_validation_options
    options:
      - key: strict
        description: "Validation strictness toggle in SchemaValidator entrypoints."
      - key: extra
        description: "Controls extra-field handling behavior at validation time."
      - key: allow_partial
        description: "Controls partial parsing behavior for selected validation and JSON paths."
      - key: by_alias
        description: "Selects alias-based field mapping behavior."
  - name: runtime_serialization_options
    options:
      - key: exclude_none
        default: "false"
        description: "Controls omission of null-like values during serialization."
      - key: round_trip
        default: "false"
        description: "Controls serialization mode for round-trip compatibility."
      - key: serialize_as_any
        default: "false"
        description: "Controls permissive serialization fallback behavior."

testing:
  framework: pytest
  structure: "Tests are organized under tests/, including dedicated validators/ and serializers/ suites."
  coverage_areas:
    - "Validator behavior across scalar, collection, model, and union schemas"
    - "Serializer behavior for JSON and Python outputs"
    - "Python typing and API compatibility checks"
  test_patterns:
    - "uv run pytest"
    - "coverage run -m pytest"
    - "pytest tests/benchmarks"

integrations:
  build_tooling:
    - maturin
    - pyo3
    - cargo
  runtime_dependencies:
    - typing-extensions
    - jiter
  ecosystem:
    - pydantic

quick_reference:
  - topic: "Build development extension"
    command: "make build-dev"
  - topic: "Run full test suite"
    command: "make test"
  - topic: "Run lint suite"
    command: "make lint"
  - topic: "Build production extension"
    command: "make build-prod"

commands:
  - name: "make build-dev"
    description: "Compile and install the extension in development mode."
    usage: "make build-dev"
  - name: "make test"
    description: "Run pytest suite."
    usage: "make test"
  - name: "make lint"
    description: "Run rust and python lint checks."
    usage: "make lint"
  - name: "make testcov"
    description: "Run tests with coverage reporting."
    usage: "make testcov"

api_surface:
  public_functions:
    - name: SchemaValidator
      purpose: "Validate Python and JSON inputs against compiled CoreSchema definitions."
      signature: "class SchemaValidator"
      location: python/pydantic_core/__init__.py
    - name: SchemaSerializer
      purpose: "Serialize validated data into Python objects or JSON bytes."
      signature: "class SchemaSerializer"
      location: python/pydantic_core/__init__.py
    - name: from_json
      purpose: "Parse JSON input with pydantic-core parser controls."
      signature: "def from_json(...)"
      location: python/pydantic_core/__init__.py
    - name: to_json
      purpose: "Serialize objects into JSON using schema-aware serializers."
      signature: "def to_json(...)"
      location: python/pydantic_core/__init__.py
    - name: to_jsonable_python
      purpose: "Serialize objects into Python structures ready for JSON encoding."
      signature: "def to_jsonable_python(...)"
      location: python/pydantic_core/__init__.py
    - name: ValidationError
      purpose: "Expose structured validation failures to Python callers."
      signature: "class ValidationError"
      location: python/pydantic_core/__init__.py
