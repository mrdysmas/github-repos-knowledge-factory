code_patterns:
  - name: Document Loading with BaseReader
    description: Load documents from various sources using reader pattern
    code: |
      from llama_index.core import SimpleDirectoryReader, Document

      # Load from directory
      reader = SimpleDirectoryReader(
          input_dir="./data",
          required_exts=[".pdf", ".md"],
          recursive=True,
      )
      documents = reader.load_data()

      # Async loading
      documents = await reader.aload_data()

      # Each document has:
      # - page_content: str
      # - metadata: dict
      # - doc_id: str
    file_reference: llama-index-core/llama_index/core/readers/base.py

  - name: Node Parsing with SentenceSplitter
    description: Split documents into nodes with configurable chunk size
    code: |
      from llama_index.core.node_parser import SentenceSplitter

      splitter = SentenceSplitter(
          chunk_size=1024,
          chunk_overlap=200,
          separator=" ",
          paragraph_separator="\n\n\n",
          include_metadata=True,
          include_prev_next_rel=True,
      )

      # Parse documents into nodes
      nodes = splitter.get_nodes_from_documents(documents)

      # Or use global Settings
      from llama_index.core import Settings
      Settings.chunk_size = 512
      Settings.chunk_overlap = 50
    file_reference: llama-index-core/llama_index/core/node_parser/text/sentence.py

  - name: VectorStoreIndex Creation
    description: Create vector index from documents or nodes
    code: |
      from llama_index.core import VectorStoreIndex, StorageContext
      from llama_index.embeddings.openai import OpenAIEmbedding

      # Configure embedding model
      embed_model = OpenAIEmbedding(
          model="text-embedding-3-large",
          dimensions=1536,
          embed_batch_size=100,
      )

      # Create index from documents (applies transformations)
      index = VectorStoreIndex.from_documents(
          documents,
          embed_model=embed_model,
          insert_batch_size=2048,
          show_progress=True,
      )

      # Or from existing nodes
      index = VectorStoreIndex(nodes, embed_model=embed_model)
    file_reference: llama-index-core/llama_index/core/indices/vector_store/base.py

  - name: Query Engine with Retriever
    description: Configure query engine with retriever and postprocessors
    code: |
      # Basic query engine
      query_engine = index.as_query_engine(
          similarity_top_k=5,
          streaming=True,
          response_mode="compact",
      )

      # With retriever configuration
      retriever = index.as_retriever(
          similarity_top_k=10,
          vector_store_query_mode="mmr",  # Maximal Marginal Relevance
      )

      # With postprocessors
      from llama_index.core.postprocessor import LLMRerank

      query_engine = index.as_query_engine(
          retriever=retriever,
          node_postprocessors=[
              LLMRerank(top_n=5, choice_batch_size=5)
          ],
      )

      # Execute query
      response = query_engine.query("What is the main topic?")
    file_reference: llama-index-core/llama_index/core/base/base_query_engine.py

  - name: OpenAI LLM Integration
    description: Configure LLM with chat and completion support
    code: |
      from llama_index.llms.openai import OpenAI
      from llama_index.core import Settings

      # Configure LLM
      llm = OpenAI(
          model="gpt-4",
          temperature=0.1,
          max_tokens=2048,
          max_retries=3,
          timeout=60.0,
      )

      # Set globally
      Settings.llm = llm

      # Direct usage
      response = llm.complete("What is AI?")
      chat_response = llm.chat([
          ChatMessage(role="user", content="Hello")
      ])

      # Streaming
      for chunk in llm.stream_complete("Tell me a story"):
          print(chunk.delta, end="")
    file_reference: llama-index-integrations/llms/llama-index-llms-openai/llama_index/llms/openai/base.py

  - name: Custom Vector Store Integration
    description: Use external vector stores like Chroma, Pinecone, etc.
    code: |
      import chromadb
      from llama_index.vector_stores.chroma import ChromaVectorStore
      from llama_index.core import VectorStoreIndex, StorageContext

      # Create Chroma client
      client = chromadb.EphemeralClient()
      collection = client.create_collection("my_docs")

      # Create vector store wrapper
      vector_store = ChromaVectorStore(chroma_collection=collection)
      storage_context = StorageContext.from_defaults(
          vector_store=vector_store
      )

      # Create index with custom storage
      index = VectorStoreIndex.from_documents(
          documents,
          storage_context=storage_context,
      )
    file_reference: llama-index-integrations/vector_stores/llama-index-vector-stores-chroma/llama_index/vector_stores/chroma/base.py

configuration:
  - name: Global Settings
    options:
      - key: Settings.llm
        default: "OpenAI(gpt-3.5-turbo)"
        description: Default LLM instance
      - key: Settings.embed_model
        default: "OpenAIEmbedding(text-embedding-ada-002)"
        description: Default embedding model
      - key: Settings.chunk_size
        default: "1024"
        description: Token chunk size for splitting
      - key: Settings.chunk_overlap
        default: "200"
        description: Token overlap between chunks
      - key: Settings.node_parser
        default: "SentenceSplitter()"
        description: Default text splitter

  - name: SentenceSplitter
    options:
      - key: chunk_size
        default: "1024"
        description: Target tokens per chunk
      - key: chunk_overlap
        default: "200"
        description: Overlapping tokens
      - key: separator
        default: '" "'
        description: Word separator
      - key: paragraph_separator
        default: '"\n\n\n"'
        description: Paragraph boundary
      - key: include_metadata
        default: "true"
        description: Preserve document metadata
      - key: include_prev_next_rel
        default: "true"
        description: Add prev/next node relationships

  - name: VectorStoreIndex
    options:
      - key: embed_model
        default: "Settings.embed_model"
        description: Embedding model instance
      - key: insert_batch_size
        default: "2048"
        description: Batch size for vector inserts
      - key: use_async
        default: "false"
        description: Async embedding calls
      - key: store_nodes_override
        default: "false"
        description: Force node storage in docstore

  - name: OpenAIEmbedding
    options:
      - key: model
        default: "text-embedding-ada-002"
        description: Embedding model name
      - key: dimensions
        default: "null"
        description: Output dimensions (v3 models only)
      - key: embed_batch_size
        default: "100"
        description: API batch size
      - key: max_retries
        default: "10"
        description: Retry attempts

  - name: OpenAI LLM
    options:
      - key: model
        default: "gpt-3.5-turbo"
        description: Model name
      - key: temperature
        default: "0.1"
        description: Sampling randomness (0-2)
      - key: max_tokens
        default: "null"
        description: Max output tokens
      - key: max_retries
        default: "3"
        description: API retry attempts
      - key: timeout
        default: "60.0"
        description: Request timeout seconds

common_tasks:
  - task: Build Complete RAG Pipeline
    steps:
      - "Set global config: Settings.llm = OpenAI(model='gpt-4')"
      - "Set embeddings: Settings.embed_model = OpenAIEmbedding()"
      - "Load docs: documents = SimpleDirectoryReader('data/').load_data()"
      - "Create index: index = VectorStoreIndex.from_documents(documents)"
      - "Query: response = index.as_query_engine().query('question')"
    gotchas:
      - "OPENAI_API_KEY env var required for default models"
      - "Chunk size affects retrieval quality - test different values"
      - "Use show_progress=True for large document sets"

  - task: Add Custom Vector Store
    steps:
      - "Install integration: pip install llama-index-vector-stores-chroma"
      - "Create client and collection"
      - "Wrap in ChromaVectorStore"
      - "Create StorageContext with vector_store"
      - "Pass storage_context to VectorStoreIndex.from_documents()"
    gotchas:
      - "Must persist collection separately if using persistent client"
      - "Some vector stores require dimension matching with embed model"

  - task: Enable Streaming Responses
    steps:
      - "Create query engine with streaming=True"
      - "Use response = query_engine.query(...)"
      - "Iterate: for text in response.response_gen: print(text)"
    gotchas:
      - "response_gen only available when streaming=True"
      - "Can't access full response text until streaming complete"

troubleshooting:
  - symptom: OPENAI_API_KEY not found error
    cause: API key not set in environment
    fix: "export OPENAI_API_KEY=sk-... or pass api_key parameter to OpenAI()"

  - symptom: Chunk overlap >= chunk size error
    cause: SentenceSplitter validates overlap < chunk_size
    fix: "Set chunk_overlap < chunk_size, typically 10-20% of chunk_size"

  - symptom: Embedding dimension mismatch
    cause: Vector store expects different dimensions than embedding model
    fix: "Use dimensions parameter in OpenAIEmbedding (v3 models) or match vector store config"

  - symptom: Slow indexing on large documents
    cause: Synchronous embedding calls are sequential
    fix: "Set use_async=True in VectorStoreIndex or increase embed_batch_size"

quick_reference:
  - topic: Component Defaults
    content: |
      ┌─────────────────────┬─────────────────────────────────────┐
      │ Component           │ Default Value                       │
      ├─────────────────────┼─────────────────────────────────────┤
      │ LLM                 │ OpenAI gpt-3.5-turbo                │
      │ Embedding           │ OpenAI text-embedding-ada-002       │
      │ Chunk Size          │ 1024 tokens                         │
      │ Chunk Overlap       │ 200 tokens                          │
      │ Node Parser         │ SentenceSplitter                    │
      │ Similarity Top K    │ 10                                  │
      └─────────────────────┴─────────────────────────────────────┘

  - topic: Query Engine Modes
    content: |
      ┌──────────────────────┬─────────────────────────────────────┐
      │ response_mode        │ Description                         │
      ├──────────────────────┼─────────────────────────────────────┤
      │ compact              │ Combine chunks, single LLM call     │
      │ refine               │ Iterate through chunks, refine      │
      │ tree_summarize       │ Hierarchical summarization          │
      │ simple               │ Single chunk only                   │
      │ no_text              │ Return only source nodes            │
      └──────────────────────┴─────────────────────────────────────┘

  - topic: Vector Store Query Modes
    content: |
      ┌──────────────────────┬─────────────────────────────────────┐
      │ query_mode           │ Description                         │
      ├──────────────────────┼─────────────────────────────────────┤
      │ default              │ Standard cosine similarity          │
      │ mmr                  │ Maximal Marginal Relevance          │
      │ hybrid               │ Vector + keyword hybrid             │
      │ sparse               │ Keyword/BM25 only                   │
      │ text_search          │ Full-text search                    │
      └──────────────────────┴─────────────────────────────────────┘

  - topic: Common Imports
    content: |
      from llama_index.core import (
          VectorStoreIndex,
          SimpleDirectoryReader,
          Settings,
          StorageContext,
          Document,
      )
      from llama_index.core.node_parser import SentenceSplitter
      from llama_index.llms.openai import OpenAI
      from llama_index.embeddings.openai import OpenAIEmbedding
