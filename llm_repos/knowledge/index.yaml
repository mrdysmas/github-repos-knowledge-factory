metadata:
  created: 2026-02-20
  purpose: Quick reference for LLM-related repositories
  total_repos: 48
categories:
  rag_frameworks:
    description: RAG, orchestration, and LLM application frameworks
    repos:
    - name: awesome-llm-apps
      summary: Curated collection of practical LLM applications with RAG, agents,
        MCP examples
    - name: graphrag
      summary: Microsoft's knowledge graph-based RAG for narrative data
    - name: langchain
      summary: Dominant Python LLM framework with provider abstractions
    - name: llama_index
      summary: Data-focused RAG framework with 300+ integrations
    - name: llm-app
      summary: Pathway-based real-time RAG templates with live document indexing
    - name: ragflow
      summary: Full-stack RAG platform with deep document understanding
  inference_serving:
    description: Model serving and inference engines
    repos:
    - name: llama.cpp
      summary: C/C++ inference engine, GGUF format pioneer, CPU-optimized
    - name: lmdeploy
      summary: High-performance toolkit with TurboMind engine, strong quantization
    - name: nexa_sdk
      summary: On-device AI for mobile/edge with NPU support (Qualcomm, Apple, Intel)
    - name: ollama
      summary: Easiest way to run LLMs locally, wraps llama.cpp
    - name: vllm
      summary: High-throughput inference with PagedAttention, production-ready
    - name: xinference
      summary: Versatile serving for LLM/image/audio/multimodal, multi-backend
  ui_tools:
    description: Web UIs and developer tools
    repos:
    - name: anything_llm
      summary: All-in-one desktop/server app for document chat, no-code agents
    - name: JeecgBoot
      summary: Enterprise low-code platform with AI integration, MCP plugins (Java/Vue)
    - name: maxkb
      summary: Enterprise agent platform with RAG, workflows, MCP tools (Chinese)
    - name: open_webui
      summary: Feature-rich self-hosted ChatGPT UI with RAG, most popular for Ollama
  agent_frameworks:
    description: Agent orchestration and memory systems
    repos:
    - name: khoj
      summary: Personal AI second brain with RAG, multi-platform access, custom agents
    - name: mem0
      summary: Intelligent memory layer for personalized AI (Y Combinator S24)
    - name: parlant
      summary: Enterprise agent framework with ensured compliance and behavioral guidelines
  vector_databases:
    description: Vector storage and retrieval
    repos:
    - name: milvus
      summary: High-performance scalable vector DB, K8s-native, Go/C++
  fine_tuning:
    description: Model fine-tuning and training
    repos:
    - name: llamafactory
      summary: Zero-code fine-tuning for 100+ LLMs with Web UI
  evaluation:
    description: Model evaluation and benchmarking
    repos:
    - name: opencompass
      summary: Comprehensive LLM evaluation toolkit, 100+ benchmarks
  data_pipelines:
    description: Real-time data processing and ETL for AI/LLM
    repos:
    - name: mindsdb
      summary: Data federation platform with MCP server, knowledge bases
    - name: pathway
      summary: Stream processing framework with LLM/RAG xpack, Rust engine
  educational:
    description: Tutorials, guides, and learning resources for LLM development
    repos:
    - name: Prompt-Engineering-Guide
      summary: Comprehensive prompt engineering guide with techniques and patterns
    - name: self-llm
      summary: Chinese-language tutorials for open-source LLM deployment and fine-tuning
  agent_cli:
    description: 'Remote-ingested category: agent_cli'
    repos:
    - name: claude-code
      summary: Shallow intake pilot canonicalization for anthropics/claude-code in
        agent cli domain.
    - name: codex
      summary: Shallow intake pilot canonicalization for openai/codex in agent cli
        domain.
    - name: copilot-cli
      summary: Phase 4 Corpus Expansion P4-B1 intake for github/copilot-cli. Agent
        CLI repository routed explicitly to llm_repos.
    - name: kimi-cli
      summary: Phase 4 Corpus Expansion P4-B1 intake for MoonshotAI/kimi-cli. Agent
        CLI repository routed explicitly to llm_repos.
    - name: opencode
      summary: Phase 4 Corpus Expansion P4-B1 intake for anomalyco/opencode. Agent
        CLI repository routed explicitly to llm_repos.
  agent_platform:
    description: 'Remote-ingested category: agent_platform'
    repos:
    - name: dify
      summary: Shallow intake pilot canonicalization for langgenius/dify in agent
        platform domain.
  workflow_builder:
    description: 'Remote-ingested category: workflow_builder'
    repos:
    - name: Flowise
      summary: Shallow intake pilot canonicalization for flowiseai/flowise in workflow
        builder domain.
  vector_database:
    description: 'Remote-ingested category: vector_database'
    repos:
    - name: lancedb
      summary: Shallow intake pilot canonicalization for lancedb/lancedb in vector
        database domain.
    - name: qdrant
      summary: Shallow intake pilot canonicalization for qdrant/qdrant in vector database
        domain.
    - name: usearch
      summary: Phase 4 Corpus Expansion P4-B1 intake for unum-cloud/usearch. Vector
        database repository routed explicitly to llm_repos.
    - name: vectordbbench
      summary: Phase 4 Corpus Expansion P4-B1 intake for zilliztech/VectorDBBench.
        Vector database repository routed explicitly to llm_repos.
    - name: voyager
      summary: Phase 4 Corpus Expansion P4-B1 intake for spotify/voyager. Vector database
        repository routed explicitly to llm_repos.
    - name: weaviate
      summary: Shallow intake pilot canonicalization for weaviate/weaviate in vector
        database domain.
  agent_framework:
    description: 'Remote-ingested category: agent_framework'
    repos:
    - name: agent-skills
      summary: Phase 4 Corpus Expansion P4-B1 intake for anysiteio/agent-skills. Agent
        framework repository routed explicitly to llm_repos.
    - name: awesome-claude-skills
      summary: Phase 4 Corpus Expansion P4-B1 intake for ComposioHQ/awesome-claude-skills.
        Agent framework repository routed explicitly to llm_repos.
    - name: instructor
      summary: Phase 4 Corpus Expansion P4-B1 intake for instructor-ai/instructor.
        Agent framework repository routed explicitly to llm_repos.
    - name: llguidance
      summary: Phase 4 Corpus Expansion P4-B1 intake for microsoft/llguidance. Agent
        framework repository routed explicitly to llm_repos.
    - name: pydantic-ai
      summary: Shallow intake pilot canonicalization for pydantic/pydantic-ai in agent
        framework domain.
    - name: skills
      summary: Phase 4 Corpus Expansion P4-B1 intake for anthropics/skills. Agent
        framework repository routed explicitly to llm_repos.
  agent_orchestration:
    description: 'Remote-ingested category: agent_orchestration'
    repos:
    - name: claude-flow
      summary: Shallow intake pilot canonicalization for ruvnet/claude-flow in agent
        orchestration domain.
    - name: mini-agent
      summary: Phase 4 Corpus Expansion P4-B1 intake for MiniMax-AI/Mini-Agent. Agent
        orchestration repository routed explicitly to llm_repos.
  web_framework:
    description: 'Remote-ingested category: web_framework'
    repos:
    - name: gin
      summary: Shallow intake pilot canonicalization for gin-gonic/gin in web framework
        domain.
