    - name: obsidian-releases
      summary: Phase 4 B6 shallow intake for obsidianmd/obsidian-releases as a release-tracking
        and documentation-oriented repository.
  machine_learning:
    description: 'Remote-ingested category: machine_learning'
    repos:
    - name: smile
      summary: Phase 4 B3 shallow intake for haifengl/smile as a JVM machine learning
        and data mining toolkit.
