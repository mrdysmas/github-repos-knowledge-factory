name: maxkb
node_id: repo::1panel-dev/maxkb
github_full_name: 1panel-dev/maxkb
html_url: https://github.com/1panel-dev/maxkb
source: llm_repos
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/repos/maxkb.yaml
  as_of: '2026-02-23'
directory: MaxKB-2
category: ui_tools

summary: |
  Open-source enterprise-grade agent platform (Max Knowledge Brain). Combines RAG pipelines,
  agentic workflows, and MCP tool-use capabilities. Built for intelligent customer service,
  corporate knowledge bases, and education. Zero-code integration with existing systems.
  Chinese-developed with strong multi-model support including DeepSeek, Qwen.

core_concepts:
  - name: Application Builder
    description: Agent/knowledge base application configuration
    location: apps/application/

  - name: Knowledge Management
    description: Document upload, crawling, vectorization
    location: apps/knowledge/

  - name: Workflow Engine
    description: Visual agentic workflow orchestration
    location: apps/application/workflow/

  - name: Model Providers
    description: Multi-model support (DeepSeek, Llama, Qwen, OpenAI)
    location: apps/models_provider/

  - name: MCP Tools
    description: Model Context Protocol tool integration
    location: apps/tools/

key_entry_points:
  - path: apps/
    purpose: Django application modules

  - path: apps/application/
    purpose: Core agent/knowledge base logic

  - path: apps/knowledge/
    purpose: Document processing and RAG

  - path: ui/
    purpose: Vue.js frontend

build_run:
  language: Python (Django) + Vue.js
  install: "docker run -d --name=maxkb -p 8080:8080 1panel/maxkb"
  usage: |
    # Access at http://localhost:8080
    # Default: admin / MaxKB@123..

key_features:
  - RAG pipeline with auto-crawling
  - Visual workflow engine
  - MCP tool-use support
  - Multi-modal (text, image, audio, video)
  - Zero-code third-party integration
  - Model-agnostic (local and cloud models)
  - PostgreSQL + pgvector storage
  - Built on LangChain

use_cases:
  - Intelligent customer service
  - Corporate internal knowledge base
  - Academic research assistance
  - Educational chatbots

ecosystem_connections:
  - target: langchain
    relation: extends
    note: Built on LangChain framework

  - target: ragflow
    relation: alternative_to
    note: Both full-stack RAG platforms with visual UI

  - target: open_webui
    relation: alternative_to
    note: Both enterprise-ready; MaxKB has stronger workflow engine

  - target: milvus
    relation: integrates_with
    note: MaxKB could use Milvus for vector storage

further_reading:
  - README.md
  - README_CN.md
  - USE-CASES.md
  - web: https://maxkb.cn
