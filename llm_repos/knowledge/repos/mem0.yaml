name: mem0
node_id: repo::mem0ai/mem0
github_full_name: mem0ai/mem0
html_url: https://github.com/mem0ai/mem0
source: llm_repos
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/repos/mem0.yaml
  as_of: '2026-02-23'
directory: mem0-main
category: agent_frameworks

summary: |
  Intelligent memory layer for AI applications and agents (Y Combinator S24). Mem0
  provides multi-level memory (user, session, agent) for personalized AI interactions.
  Outperforms OpenAI Memory with +26% accuracy on LOCOMO benchmark, 91% faster responses,
  and 90% lower token usage. Supports self-hosted or managed platform.

core_concepts:
  - name: Multi-Level Memory
    description: User, session, and agent state management
    location: mem0/memory/

  - name: Memory Operations
    description: Add, search, update, delete memories
    location: mem0/client/

  - name: Vector Store Integration
    description: Multiple vector DB backends
    location: mem0/vector_stores/

  - name: LLM Integration
    description: Multiple LLM provider support
    location: mem0/llms/

key_entry_points:
  - path: mem0/
    purpose: Core memory library

  - path: mem0/client/
    purpose: Client SDK

  - path: mem0/vector_stores/
    purpose: Vector store backends

build_run:
  language: Python
  install: "pip install mem0ai"
  usage: |
    from mem0 import Memory
    m = Memory()
    m.add("likes pizza", user_id="alice")
    results = m.search("what does alice like", user_id="alice")

key_features:
  - Multi-level memory (user/session/agent)
  - +26% accuracy over OpenAI Memory
  - 91% faster than full-context
  - 90% lower token usage
  - Cross-platform SDKs (Python, JS)
  - Self-hosted or managed platform
  - Automatic memory extraction
  - Memory expiration support

use_cases:
  - AI assistants with persistent context
  - Customer support with history recall
  - Healthcare patient preferences
  - Personalized recommendations

ecosystem_connections:
  - target: langchain
    relation: integrates_with
    note: Can be used as memory layer in LangChain agents

  - target: llama_index
    relation: related_to
    note: Both handle conversation context/memory

  - target: open_webui
    relation: related_to
    note: Could enhance chat memory

further_reading:
  - README.md
  - research: https://mem0.ai/research
  - docs: https://docs.mem0.ai
  - platform: https://mem0.ai
