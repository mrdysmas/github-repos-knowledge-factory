name: xinference
node_id: repo::xorbitsai/inference
github_full_name: xorbitsai/inference
html_url: https://github.com/xorbitsai/inference
source: llm_repos
provenance:
  shard: llm_repos
  source_file: llm_repos/knowledge/repos/xinference.yaml
  as_of: '2026-02-23'
directory: inference-main
category: inference_serving

summary: |
  Versatile model serving platform from Xorbits. Xinference supports LLMs, embeddings,
  image models, audio models, and multimodal models through a unified interface. Offers
  multiple backend engines (vLLM, llama.cpp, SGLang, MLX) and distributed deployment.
  OpenAI-compatible API with function calling support.

core_concepts:
  - name: Model Registry
    description: Built-in catalog of state-of-the-art models
    location: xinference/model/

  - name: Multi-Backend Support
    description: vLLM, llama.cpp, SGLang, Transformers, MLX
    location: xinference/inference/

  - name: Distributed Deployment
    description: Multi-node, multi-GPU cluster support
    location: xinference/deploy/

  - name: API Server
    description: OpenAI-compatible RESTful API
    location: xinference/api/

  - name: Supervisor/Worker
    description: Cluster architecture with supervisor coordinating workers
    location: xinference/core/

key_entry_points:
  - path: xinference/api/
    purpose: RESTful API server

  - path: xinference/inference/
    purpose: Backend engine integrations

  - path: xinference/model/
    purpose: Built-in model definitions

  - path: xinference/core/
    purpose: Distributed cluster coordination

  - path: xinference/client/
    purpose: Python client SDK

supported_model_types:
  - LLMs (chat, completion)
  - Embedding models
  - Image models (text-to-image)
  - Audio models (ASR, TTS)
  - Multimodal models (VLM)
  - Rerank models

backends:
  - vLLM (high throughput)
  - llama.cpp / xllamacpp (GGUF, CPU-friendly)
  - SGLang (structured outputs)
  - MLX (Apple Silicon)
  - Transformers (HuggingFace)
  - TensorRT

build_run:
  language: Python
  install: "pip install xinference"
  run_server: "xinference-local --host 0.0.0.0 --port 9997"
  cli: "xinference launch --model-name <name> --model-format pytorch"

ecosystem_connections:
  - target: vllm
    relation: integrates_with
    note: Xinference can use vLLM as backend engine

  - target: ollama
    relation: alternative_to
    note: Both easy deployment; Xinference more model types

  - target: langchain
    relation: integrates_with
    note: LangChain has Xinference integration

  - target: llama_index
    relation: integrates_with
    note: LlamaIndex has Xinference integration

  - target: ragflow
    relation: integrates_with
    note: RAGFlow lists Xinference as integration

further_reading:
  - README.md
  - docs: https://inference.readthedocs.io
  - enterprise: https://xinference.io
