lifecycle_states:
  - state: discovered
    required_fields:
      - github_full_name
      - html_url
      - intake_path
      - discovered_at_utc
  - state: shallow_queued
    required_fields:
      - scan_mode
      - target_shard
  - state: shallow_complete
    required_fields:
      - shallow_artifact_paths
      - shallow_as_of
      - source_commit
  - state: deep_candidate
    required_fields:
      - deep_priority_reason
  - state: deep_queued
    required_fields:
      - deep_scope
      - source_commit
  - state: deep_complete
    required_fields:
      - deep_artifact_paths
      - deep_as_of
      - source_commit
  - state: metadata_only_retained
    required_fields:
      - source_commit
      - deletion_approved
      - deletion_timestamp_utc

record_template:
  repo_id: "repo::<owner>/<name>"
  github_full_name: "<owner>/<name>"
  html_url: "https://github.com/<owner>/<name>"
  intake_path: "/Users/szilaa/scripts/ext_sources/github_repos/intake_repos/<repo-dir>"
  domain_hint: "<metadata_classifier_only>"
  target_shard: "repos"
  current_state: "discovered"
  source:
    mode: "local_clone | remote_api | remote_metadata"
    source_commit: "<git_sha_or_null>"
    default_branch: "<branch_or_null>"
    observed_at_utc: "<timestamp>"
  outputs:
    shallow_artifact_paths: []
    deep_artifact_paths: []
    ws5_manifest_row: null
  deep_priority:
    score: 0
    reason: ""
  retention:
    clone_retention: "pending"
    eligible_for_deletion: false
    deletion_approved: false
    deletion_timestamp_utc: null

gates_for_progression:
  shallow_complete_requires:
    - "Shallow artifact generated and parseable."
    - "WS1 identity fields present."
    - "provenance.as_of populated."
  deep_complete_requires:
    - "Deep artifact generated and parseable."
    - "Identity parity with shallow artifact."
    - "Evidence/provenance fields captured for extracted details."
  metadata_only_retained_requires:
    - "source_commit recorded."
    - "canonical shallow/deep artifacts committed."
    - "no active deep follow-up task."
    - "prune policy allows deletion."

