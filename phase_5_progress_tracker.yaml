phase:
  number: "5"
  name: "TBD"
  status: "PLANNING"
  date_initiated: "2026-03-20"
  date_started: null
  date_completed: null

objective: |
  Phase 5 will strengthen the project as a coding-session advisory substrate.
  The phase is anchored on the seven coding-session questions and constrained by
  a non-inferability rule: core system value must come from cross-repo advisory
  knowledge that cannot be derived by inspecting the target repository alone.
  The intended value proposition is low-cost inference plus structured
  implementation priors, helping smaller models perform above their weight and
  stronger models spend less effort on avoidable exploration and rework.
  Candidate themes under discussion:
  - Query-surface refinement around the 7 anchor questions
  - Ontology tightening in support of advisory usefulness
  - Pipeline architecture improvements that strengthen trust and query quality
  - Corpus maintenance where it improves advisory coverage or typicality signals

definition_of_done:
  - "Phase 5 scope is explicitly mapped to the 7 coding-session anchor questions."
  - "Non-inferability is documented as an architectural acceptance criterion for core query/schema work."
  - "The Phase 5 anchor acceptance rubric exists and is referenced from high-signal project guidance."
  - "At least one near-term work item is defined to strengthen question-shaped querying rather than raw table access."
  - "Phase 5 planning distinguishes canonical knowledge work from workflow/tooling support layers."
  - "Planned ontology or pipeline changes justify how they improve advisory usefulness for one or more anchor questions."

baseline:
  # Captured at Phase 4 closeout (2026-03-20)
  query_master:
    repos: 122
    nodes: 136
    edges: 152
    deep_facts: 5687
  archetypes: 12
  unmatched_repos: 32

completed_threads:
  - "Query-gap pass mapped all 7 anchor questions to current query surface — see beads github_repos-9fd (closed) and docs/phase5_query_gap_assessment_2026-03-20.md."
  - "The 7-question anchor is now formalized as project policy in phase_5_anchor_acceptance_rubric.yaml v2 — see beads github_repos-byr (closed)."
  - "Architecture refinement memo translated into concrete Phase 5 planning inputs focused on question-first selection, smallest-layer changes, and core-before-surface sequencing — see beads github_repos-n14 (closed)."

planning_inputs:
  work_selection_rules:
    - "Prefer work that strengthens a single anchor question clearly rather than broad multi-surface expansion."
    - "Treat query-layer improvements as the default product work; ontology or pipeline changes should be selected only when query design alone cannot improve the target question."
    - "Favor the smallest layer change that improves advisory usefulness and can be verified with question-shaped examples."
    - "Keep workflow tooling and packaging outside the canonical core unless they depend on already-stable question semantics."
  near_term_priorities:
    - "Q3-first execution remains the strongest near-term path: strengthen failure-mode preflight before broader surface expansion."
    - "Use Q3 improvements to build reusable category-scoped and frequency-aware query primitives that Q7 can reuse."
    - "Treat Q7 as the capstone question, but avoid broadening it ahead of reliability and reusable query foundations."
  question_priority_ranking:
    note: "2026-03-21 planning clarification: Q3 and Q7 were prioritized first because they combine the strongest non-inferable advisory value with the smallest credible query-layer implementation path. The remaining questions are not 'done'; they rank lower because they are either less urgent, more weakly covered by current ontology/corpus shape, or require heavier ontology/structure work before they can produce trustworthy advisory output."
    order:
      - question: "Q3"
        short_name: "Failure-mode preflight"
        rank: 1
        why_now: "Highest non-inferable value and lowest-cost useful improvement path; category-scoped query design was enough to unlock a directly useful advisory surface."
        current_state: "Implemented and evaluated via pattern frequency primitives plus preflight command."
      - question: "Q7"
        short_name: "Implementation-risk check"
        rank: 2
        why_now: "Capstone decision-support question; reuses Q3-style category/frequency primitives and gives high-value typicality signals, but needed Q3 groundwork first."
        current_state: "Implemented in baseline form and partially stabilized; treat as the next advisory surface to harden or extend only where reliability remains acceptable."
      - question: "Q1"
        short_name: "Adjacent-pattern discovery"
        rank: 3
        why_now: "Strong future query-layer candidate once Q3/Q7 are stable; mainly blocked by adjacency-scoped aggregation and ranking, not by major ontology redesign."
        current_state: "Partially covered by existing pattern queries, but lacks adjacency-scoped grouped output."
      - question: "Q4"
        short_name: "Reference-repo selection"
        rank: 4
        why_now: "Another good query-layer expansion candidate after Q3/Q7; needs ranking and feature-aware justification rather than broad new schema."
        current_state: "Partially covered by graph neighbors and relations, but missing ranked, problem-aware recommendations."
      - question: "Q5"
        short_name: "Solution-variant comparison"
        rank: 5
        why_now: "Best later ontology candidate once query-first gains flatten; high-value question, but blocked more by ontology shape than by missing query surface alone."
        current_state: "Weakly covered; current ontology does not represent solution-variant groupings or tradeoff structure well."
      - question: "Q2"
        short_name: "Likely-component discovery"
        rank: 6
        why_now: "Useful but currently muddied by component normalization issues; likely needs both query work and ontology cleanup before it becomes a sharp advisory surface."
        current_state: "Partially covered by has_component facts, but normalization inconsistency weakens 'what is typical' answers."
      - question: "Q6"
        short_name: "Inspection-priority guidance"
        rank: 7
        why_now: "Weakest current fit for the smallest-layer rule; needs richer cross-repo structural abstraction and risks drifting into inferable repo-local guidance."
        current_state: "Weakly covered; current corpus/ontology does not yet support strong non-obvious structural guidance across repos."
    next_after_q3_q7_stabilize:
      - "Default next query-layer candidates: Q1 first, then Q4, unless a concrete use case makes Q4 clearly more urgent."
      - "Default first ontology-heavy candidate: Q5, but only if query-first gains have flattened and the need for solution-variant/tradeoff structure is still sharp."
      - "Do not treat Q2/Q6 as the immediate post-Q3/Q7 path unless new evidence shows their current blockers can be solved without broad ontology/structure expansion."
  deprioritized_until_core_gains_land:
    - "Broad ontology expansion that does not clearly improve one anchor question."
    - "New agent packaging or interface surfaces built on unstable query semantics."
    - "Workflow/tooling detours that do not improve advisory usefulness, trust, or rebuild discipline."

