        - "Extractors for the nine target section types are implemented in tools/ws6_deep_integrator.py."
        - "WS6 full validation run keeps gate_ready=true, blocking_mismatches=0, unknown_predicates=0."
        - "unmapped_sections_count drops by at least 20 from baseline 55."
        - "deep_facts increases above baseline 1908."
