      shallow_completed_at_utc: "2026-02-24T20:54:32Z"
      queue_sync_status: "PASS"
      pilot_batch_file: "inputs/intake/pilot_batch.yaml"
      repo_count: 10
      repo_dirs:
        - "intake_repos/anthropics__claude-code"
        - "intake_repos/openai__codex"
        - "intake_repos/langgenius__dify"
        - "intake_repos/FlowiseAI__Flowise"
        - "intake_repos/qdrant__qdrant"
        - "intake_repos/weaviate__weaviate"
        - "intake_repos/lancedb__lancedb"
        - "intake_repos/pydantic__pydantic-ai"
        - "intake_repos/ruvnet__claude-flow"
        - "intake_repos/gin-gonic__gin"
  growth_path:
    input_manifest: "inputs/ws5/ws5_input_manifest.yaml"
    ingestion: "tools/ws5_remote_ingestion.py"
    gates:
