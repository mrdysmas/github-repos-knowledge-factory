        - "Work iteratively: implement one or two target section extractors per cycle, run full WS6 validation, then continue."
        - "Do not run new intake/clone/WS5 ingestion operations during Phase 2A."
        - "Do not modify master_repo_list.yaml or inputs/intake/intake_queue.yaml during Phase 2A."
        - "Do not redesign schemas/contracts or manually edit generated reports."
      parallel_step:
