    pilot_batch: "inputs/intake/pilot_batch.yaml"
    queue: "inputs/intake/intake_queue.yaml"
    queue_generator: "tools/build_intake_queue_from_master_repo_list.py"
    queue_sync_gate: "tools/check_intake_queue_sync.py"
    queue_sync_enforcement:
      local_commit:
        installer: "tools/install_git_hooks.sh"
        hooks_path: ".githooks"
        pre_commit_hook: ".githooks/pre-commit"
      ci:
        workflow: ".github/workflows/intake-queue-sync.yml"
      shared_gate_script: "tools/enforce_intake_queue_sync.sh"
    add_candidate_command: "tools/add_repo_candidate.py"
    prune_policy: "inputs/intake/prune_policy.yaml"
    intake_directory: "intake_repos/"
    source_dirs_pending_consolidation: []
    strategy: "Queue-driven clone-on-demand from master_repo_list-derived intake queue."
    shard_routing_decision_ref: "docs/decisions/intake_shard_routing_decision.md"
    domain_hint_policy: "Metadata-only taxonomy classifier; it does not affect canonical destination because target_shard is compatibility-normalized to repos."
    domain_hint_enforcement:
      mode: "STRICT_WITH_ALIAS_CANONICALIZATION"
      gate: "tools/check_intake_queue_sync.py"
      behavior: "Canonical values required by default; --fix rewrites alias_map values to canonical domain_hint."
    active_pilot_batch:
      status: "SHALLOW_COMPLETE_CANONICALIZED"
      prepared_at_utc: "2026-02-24T17:06:16Z"
