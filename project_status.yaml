canonical:
  source_of_truth: "YAML artifacts"
  generated_artifacts:
    - "master_index.yaml"
    - "master_graph.yaml"
    - "knowledge.db (gitignored, derived from canonical YAML via WS7)"
  governing_documents:
    - "contracts/deep_narrative_contract.md"
  upcoming_workstreams:
    ws6:
      status: "COMPLETE"
      completed_at_utc: "2026-02-24T21:43:04Z"
      purpose: "Deep fact normalization + canonical queryability"
      primary_contracts:
        - "contracts/ws1/deep_fact.schema.yaml"
      primary_specs:
        - "tools/ws6_deep_integrator.py"
        - "tools/query_master.py"
      outputs:
        - "llm_repos/knowledge/deep_facts/*.yaml"
        - "ssh_repos/knowledge/deep_facts/*.yaml"
        - "master_deep_facts.yaml"
        - "reports/ws6_deep_integration/coverage.yaml"
        - "reports/ws6_deep_integration/mismatch_report.yaml"
        - "reports/ws6_deep_integration/validation_runs.yaml"
    ws7:
      status: "COMPLETE"
      completed_at_utc: "2026-03-05T03:15:18Z"
      purpose: "SQLite read model materialized from canonical YAML; non-negotiable compile gate"
      primary_specs:
        - "tools/ws7_read_model_compiler.py"
        - "tools/query_master.py"
      outputs:
        - "knowledge.db"
        - "reports/ws7_read_model/compile_log.yaml"
      schema_version: "1.1.0"
      query_commands:
        - "stats"
        - "repo"
        - "neighbors"
        - "facts"
        - "search"
        - "pattern"
        - "graph"
        - "aggregate"
  intake_controls:
    manifest: "inputs/intake/intake_manifest.yaml"
    pilot_batch: "inputs/intake/pilot_batch.yaml"
    queue: "inputs/intake/intake_queue.yaml"
    queue_generator: "tools/build_intake_queue_from_master_repo_list.py"
    queue_sync_gate: "tools/check_intake_queue_sync.py"
    queue_sync_enforcement:
      local_commit:
        installer: "tools/install_git_hooks.sh"
        hooks_path: ".githooks"
        pre_commit_hook: ".githooks/pre-commit"
      ci:
        workflow: ".github/workflows/intake-queue-sync.yml"
      shared_gate_script: "tools/enforce_intake_queue_sync.sh"
    add_candidate_command: "tools/add_repo_candidate.py"
    prune_policy: "inputs/intake/prune_policy.yaml"
    intake_directory: "intake_repos/"
    source_dirs_pending_consolidation: []
    strategy: "Queue-driven clone-on-demand from master_repo_list-derived intake queue."
    shard_routing_decision_ref: "docs/decisions/intake_shard_routing_decision.md"
    domain_hint_policy: "Metadata-only classifier for future shard split; does not affect current target_shard gate."
    domain_hint_enforcement:
      mode: "STRICT_WITH_ALIAS_CANONICALIZATION"
      gate: "tools/check_intake_queue_sync.py"
      behavior: "Canonical values required by default; --fix rewrites alias_map values to canonical domain_hint."
    active_pilot_batch:
