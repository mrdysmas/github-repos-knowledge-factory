      purpose: "SQLite read model materialized from canonical YAML; non-negotiable compile gate"
      primary_specs:
        - "tools/ws7_read_model_compiler.py"
        - "tools/query_master.py"
      outputs:
        - "knowledge.db"
        - "reports/ws7_read_model/compile_log.yaml"
      schema_version: "1.1.0"
      query_commands:
        - "stats"
        - "repo"
        - "neighbors"
        - "facts"
        - "search"
        - "pattern"
        - "graph"
        - "aggregate"
  operational_policy:
    expansion_run_order:
      - "tools/ws5_remote_ingestion.py"
      - "tools/ws4_master_compiler.py"
      - "tools/ws6_deep_integrator.py --run-validation-suite"
      - "tools/ws7_read_model_compiler.py (strict first)"
    ws7_gate_classes:
      blocking:
        - "row_count_parity"
        - "orphan_edge_detection"
        - "query_parity"
        - "deterministic_rebuild"
      warning_only:
        - "snapshot_consistency (timestamp divergence)"
    ws7_force_policy: "`--force` is compatibility-only (no-op); strict WS7 failures require stop-and-escalate."
    ws7_freshness_escalation_trigger:
      - "Snapshot divergence repeatedly causes incorrect query interpretations in practice."
      - "Deep-facts regeneration cadence is tightened such that timestamp alignment is expected by design."
    ws6_validation_source: "python3 tools/query_master.py --source yaml stats"
    batch_acceptance_freshness_report:
      - "master_index.generated_at_utc"
      - "master_graph.generated_at_utc"
      - "master_deep_facts.generated_at_utc"
      - "deep_facts delta vs baseline"
      - "WS7 strict result and snapshot status (pass/warn; include `--force` invocation status for audit)"
    standardization_trigger: "Adopt as default prompted workflow after two consecutive batch runs confirm policy behavior and no integrity-gate regressions."
    standardization_note: "Three hardened runs now exist in sequence (B3, B4, B5). B5 executed with strict-only WS7 semantics and canonical unmapped metric sourcing, then was accepted with notes after supervisor review. Template standardization is approved and the workflow has returned to corpus-expansion execution."
