  - name: "pilot_repos_with_provenance"
    target: 10
    actual: 10
  - name: "pilot_repos_with_domain_hint"
    target: 10
    actual: 10
  - name: "domain_hint_alias_policy_enforced"
    target: 1
    actual: 1
  - name: "pilot_repos_canonicalized"
    target: 10
    actual: 10
  - name: "deep_facts_materialized"
    target: 1
    actual: 1350
  - name: "unmapped_sections_count"
    target: 0
    actual: 123
  - name: "pilot_repos_deep_prioritized"
    target: 3
    actual: 4
  - name: "queue_sync_gate_pass_rate"
    target: "100%"
    actual: "100%"

execution_checklist:
  - "[x] Queue generated from master_repo_list and synced."
  - "[x] Pilot clone batch prepared in intake_repos."
  - "[x] Capture provenance metadata for each pilot repo."
  - "[x] Assign domain_hint metadata to each pilot repo record."
  - "[x] Enforce strict domain_hint alias canonicalization in intake preflight gate."
  - "[x] Run shallow-first intake and route outputs through WS5 -> WS4."
  - "[x] Implement WS6 materialization output and validator gate."
  - "[x] Prioritize at least 3 pilot repos for deep follow-up with explicit reasons."
  - "[ ] Extend query contract to read deep facts from canonical level."
  - "[x] Add commit-time intake sync enforcement."
  - "[ ] Update project_status.yaml and this tracker at each checkpoint."

risks:
  - description: "Schema drift between deep repo YAML and canonical deep_fact contract."
    mitigation: "Lock predicate vocabulary + enforce schema validation in WS6 gate."
    status: "OPEN"
  - description: "Queue and source list drift from manual edits."
    mitigation: "Enforce add path via tool + pre-commit sync check."
    status: "OPEN"
  - description: "Over-scanning before WS6 contract is stable."
    mitigation: "Limit to pilot + small calibration batch before expansion."
    status: "OPEN"

