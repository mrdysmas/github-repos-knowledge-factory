    - "inputs/intake/pilot_batch.yaml (10 pilot records advanced to shallow_complete with shallow_artifact_paths + ws5_manifest_row)"
    - "inputs/ws5/ws5_input_manifest.yaml (pilot rows merged onto canonical WS5 input path)"
    - "docs/decisions/intake_shard_routing_decision.md (two-shard hold decision + expansion trigger)"
