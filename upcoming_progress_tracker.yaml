findings: |
  INTAKE-PILOT-1 shallow execution remains complete and stable. WS6 v1 now also
  materializes canonical deep facts (1908) into shard-level deep_facts outputs
  plus master_deep_facts.yaml, with strict unknown_predicate blocking to prevent
  silent schema drift. This is the classic contract-first canonicalization
  pattern: strict schema gates keep draft narratives from silently mutating the
  top-level graph semantics. validation_runs semantics are now explicit:
  required_commands is plan-only, and execution_results is recorder-backed with
  no PENDING_EXECUTION states. Batch-2 extractor coverage reduced unmapped
  sections from 72 to 55 and fully burned down the five target sections
  (languages, related_repos, type, primary_language, ports) to 0 outstanding
  findings. Query bridge evidence is now documented with both repo resolution
  and predicate-filtered facts retrieval via tools/query_master.py.

