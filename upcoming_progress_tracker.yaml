    - "pilot deep-priority checkpoint => PASS (4 repos prioritized with explicit section-target reasons; baseline unmapped_sections_count=123 target<=113)"
  completion_status: null
  issues_encountered:
    - "Initial WS4 compile reported duplicate repo node IDs (cloudflared/tailscale) after an incorrect manifest default shard. Resolved by restoring WS5 default shard and cleaning accidental llm duplicate records before re-running gates."

findings: |
  INTAKE-PILOT-1 shallow execution remains complete and stable. WS6 v1 now also
  materializes canonical deep facts (1350) into shard-level deep_facts outputs
  plus master_deep_facts.yaml, with strict unknown_predicate blocking to prevent
  silent schema drift. This is the classic contract-first canonicalization
  pattern: strict schema gates keep draft narratives from silently mutating the
  top-level graph semantics. validation_runs semantics are now explicit:
  required_commands is plan-only, and execution_results is recorder-backed with
  no PENDING_EXECUTION states. Pilot deep follow-up is now explicitly queued by
  priority score to burn down recurring unmapped section families.

decision_rule: |
  IF M1+M2+M3+M4 all complete and acceptance criteria are met:
    -> Mark phase COMPLETE and scale intake beyond pilot
  IF M1 complete but M2/M3 blocked:
    -> Continue pilot shallow ingestion only; defer deep scale-out
  IF queue enforcement fails at any point:
    -> Stop intake expansion until sync/add gates are restored

decision: null
next_phase: "Phase 2 - Scale intake throughput and calibration batch execution"
