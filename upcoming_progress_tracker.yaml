version: 1
as_of_utc: "2026-02-25T16:22:54Z"

naming_legend:
  WS: "Workstream (pipeline lane/stage, e.g., WS1-WS6)"
  M: "Milestone (phase checkpoint, e.g., M1-M4)"

phase:
  number: "1"
  name: "Intake Pilot + WS6 Deep Integration"
  status: "IN_PROGRESS"
  workflow: "PENDING -> IN_PROGRESS -> CHECKPOINT_1 -> CHECKPOINT_2 -> COMPLETE"
  date_initiated: "2026-02-24"
  date_started: "2026-02-24"
  date_completed: null

objective: |
  Convert the queue-driven intake setup into repeatable canonical outputs while
  making deep findings queryable from canonical artifacts. This phase must prove:
  (1) pilot repos can be scanned and routed through WS5/WS4 with provenance, and
  (2) WS6 can materialize deep facts in a schema-bound way instead of leaving
  deep YAML as isolated repo notes.

dependencies:
  - "inputs/intake/intake_queue.yaml is generated from master_repo_list.yaml and sync gate passes."
  - "Pilot clone batch exists in intake_repos/."
  - "WS1 contracts stay strict; non-canonical kgraph output remains draft-only."

acceptance_criteria:
  - "All 10 pilot repos have lifecycle/provenance metadata (source_url, default_branch, source_commit, scan timestamps)."
  - "Pilot shallow outputs pass WS1 + trust gates and compile through WS4 into canonical artifacts."
  - "WS6 emits a materialized deep-facts artifact with schema-conformant records."
  - "Top-level query path can retrieve deep facts without opening per-repo deep YAML manually."
  - "Intake enforcement blocks drift (queue sync + controlled candidate-add path)."

milestones:
  - id: "M1"
    name: "Pilot provenance complete"
    status: "COMPLETE"
    completed_at_utc: "2026-02-24T19:46:56Z"
    done_when:
      - "10/10 pilot repos have provenance fields recorded."
      - "No missing source_commit/default_branch in pilot records."
  - id: "M2"
    name: "WS6 materialization v1"
    status: "COMPLETE"
    completed_at_utc: "2026-02-24T21:43:04Z"
    done_when:
      - "tools/ws6_deep_integrator.py writes materialized deep facts, not only spec output."
      - "Materialized output validates against contracts/ws1/deep_fact.schema.yaml."
  - id: "M3"
    name: "Canonical query bridge"
    status: "IN_PROGRESS"
    done_when:
      - "tools/query_master.py can surface deep facts by repo/node from canonical outputs."
      - "At least one end-to-end query example is documented in status artifacts."
  - id: "M4"
    name: "Intake hard enforcement"
    status: "COMPLETE"
    completed_at_utc: "2026-02-25T16:03:07Z"
    done_when:
      - "A commit-time gate blocks when tools/check_intake_queue_sync.py fails."
      - "New candidates are added only via tools/add_repo_candidate.py."

