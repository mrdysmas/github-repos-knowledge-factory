name: streisand
node_id: repo::streisandeffect/streisand
github_full_name: streisandeffect/streisand
html_url: https://github.com/streisandeffect/streisand
source: ssh_repos
provenance:
  shard: ssh_repos
  source_file: ssh_repos/knowledge/repos/streisand.yaml
  as_of: '2026-02-23'
directory: streisand-master
category: vpn_mesh
summary: |
  Ansible-based automation tool that provisions cloud servers with multiple censorship-resistant VPN protocols (WireGuard, OpenVPN, Shadowsocks, Tor bridge, etc.) to bypass network restrictions. Named after the Streisand effect - attempts to censor information only amplify its spread.
core_concepts:
  - name: Multi-protocol VPN suite
    description: Deploys 6+ VPN protocols on a single server (WireGuard, OpenVPN, OpenConnect, Shadowsocks, Tor bridge, SSH tunneling) to ensure at least one works in hostile network environments.
  - name: Builder/server architecture
    description: The "builder" is your local machine running Ansible; it provisions a separate "server" in the cloud. Keeps VPN config separate from your daily driver.
  - name: Gateway interface
    description: Generates a private HTTPS website with downloadable client configs, certificates, and step-by-step setup instructions for each protocol.
key_entry_points:
  - path: streisand:1
    purpose: Main entrypoint script - interactive CLI that prompts for cloud provider and invokes appropriate Ansible playbook.
  - path: playbooks/streisand.yml:1
    purpose: Master playbook that orchestrates all role imports (VPN services, SSL, firewall, gateway generation).
  - path: global_vars/default-site.yml:1
    purpose: Configuration file controlling which VPN services are enabled by default.
  - path: playbooks/roles/:1
    purpose: Directory containing 30+ Ansible roles - one per service (openvpn, wireguard, shadowsocks, etc.).
build_run:
  language: ansible/yaml
  package_manager: pip (Python dependencies)
  build_command: |
    git clone https://github.com/StreisandEffect/streisand.git && cd streisand
    ./util/venv-dependencies.sh ./venv
    source ./venv/bin/activate
  run_command: ./streisand
ecosystem_connections:
  similar_to:
    - algo (simpler Ansible VPN, WireGuard-focused)
    - wireguard-install (single-purpose WireGuard setup)
    - openvpn-install (single-purpose OpenVPN setup)
  alternatives:
    - Tailscale (managed WireGuard, zero-config)
    - Nebula (mesh VPN)
    - Outline (consumer-friendly, Jigsaw/Alphabet)
    - commercial VPNs (Mullvad, ProtonVPN)
  used_with:
    - Cloud providers (AWS, Azure, DigitalOcean, GCE, Linode, Rackspace)
    - Tor/Obfsproxy (for deep packet inspection evasion)
    - Stunnel (TLS wrapper for OpenVPN)
    - V2Ray plugin (Shadowsocks traffic obfuscation)
