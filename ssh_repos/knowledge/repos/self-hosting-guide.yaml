name: self-hosting-guide
node_id: repo::mikeroyal/self-hosting-guide
github_full_name: mikeroyal/self-hosting-guide
html_url: https://github.com/mikeroyal/self-hosting-guide
source: ssh_repos
provenance:
  shard: ssh_repos
  source_file: ssh_repos/knowledge/repos/self-hosting-guide.yaml
  as_of: '2026-02-25'
directory: Self-Hosting-Guide-main
category: documentation
summary: |
  Comprehensive curated guide for self-hosting applications and services, covering containers, cloud infrastructure, home servers, media centers, networking, security, and development tools across 34 major topic areas.

core_concepts:
  - name: Containerization & Orchestration
    description: Docker, Podman, Kubernetes, and container management tools (Portainer, Yacht) for deploying isolated, reproducible self-hosted services.
  - name: Infrastructure & Networking
    description: VPNs (WireGuard, Tailscale), remote access, DNS, reverse proxies (Nginx, Traefik, Caddy), and network security fundamentals.
  - name: Home Server Ecosystem
    description: Media servers (Plex, Jellyfin), home automation (Home Assistant, ESPHome), Raspberry Pi projects, and personal cloud storage (Nextcloud).

key_entry_points:
  - path: README.md
    purpose: Single comprehensive document containing all 34 topic sections with tool listings, learning resources, and setup guides.
  - path: Getting Started  with Self-Hosting.dockerfile
    purpose: Starter Dockerfile template for Ubuntu 22.04 with common development tools pre-installed.
  - path: CONTRIBUTING.md
    purpose: Contribution guidelines for adding new tools and resources.

build_run:
  format: markdown
  primary_language: n/a
  organization: |
    Single massive README (~7100 lines) organized hierarchically:
    - Table of Contents with 34 main sections
    - "Getting Started" section with 60+ tool categories (containers, CI/CD, databases, media servers, etc.)
    - Dedicated deep-dive sections for WireGuard, Nextcloud, Raspberry Pi, Grafana, Networking, Docker, Kubernetes, Ansible, Databases
    - Development guides for Node.js, Python, Rust, C/C++, Java, Swift
    - Resource lists: books, podcasts, YouTube channels, tutorials

ecosystem_connections:
  references:
    - Docker/Podman/Containerd
    - Kubernetes/K3s
    - Proxmox VE
    - Home Assistant
    - Nextcloud
    - WireGuard/Tailscale
    - Grafana/Prometheus
    - Nginx/Caddy/Traefik
    - Raspberry Pi
    - LLMs (Ollama, LocalAI, llama.cpp)
  related_guides:
    - awesome-selfhosted (GitHub)
    - r/selfhosted subreddit
    - LinuxServer.io
    - Docker Hub official images
