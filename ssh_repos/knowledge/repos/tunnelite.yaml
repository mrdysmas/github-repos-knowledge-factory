name: tunnelite
node_id: repo::cristipufu/tunnelite
github_full_name: cristipufu/tunnelite
html_url: https://github.com/cristipufu/tunnelite
source: ssh_repos
provenance:
  shard: ssh_repos
  source_file: ssh_repos/knowledge/repos/tunnelite.yaml
  as_of: '2026-02-25'
directory: tunnelite-master
category: tunneling
summary: |
  A .NET tunneling tool that exposes local applications to the internet via websocket connections, supporting HTTP(S), WebSocket, SSE, and TCP tunneling through a managed service or self-hosted server.
core_concepts:
  - name: SignalR-based tunneling
    description: Uses ASP.NET Core SignalR with MessagePack protocol to establish persistent bidirectional connections between local clients and the public server, enabling real-time request forwarding.
  - name: Multi-protocol support
    description: Handles HTTP(S) requests, WebSocket connections, Server-Sent Events (SSE), and raw TCP traffic through separate middleware pipelines and hub implementations.
  - name: Deferred request processing
    description: Incoming public requests are queued and deferred until the local client streams them to the target application, with bidirectional streaming for responses.
key_entry_points:
  - path: src/Tunnelite.Client/Program.cs:14
    purpose: CLI entry point; parses arguments and initializes HTTP or TCP tunnel based on URL scheme.
  - path: src/Tunnelite.Server/Program.cs:7
    purpose: Server entry point; configures all tunneling middleware (HTTP, TCP, WebSocket, SSE) and SignalR hubs.
  - path: src/Tunnelite.Sdk/HttpTunnel/HttpTunnelClient.cs:12
    purpose: Core client implementation that connects to server via SignalR and handles request/response streaming for HTTP, WS, and SSE.
  - path: src/Tunnelite.Server/HttpTunnel/HttpTunnelHub.cs:9
    purpose: Server-side SignalR hub that coordinates tunnel registration and streams WebSocket/SSE data between public requests and connected clients.
  - path: src/Tunnelite.AspNetCore/TunneliteExtensions.cs:15
    purpose: ASP.NET Core middleware extension for one-line integration (UseTunnelite()) that auto-tunnels the app on startup.
build_run:
  language: C# / .NET 8.0
  package_manager: NuGet
  build_command: dotnet build Tunnelite.sln
  run_command: dotnet run --project src/Tunnelite.Client (client) or dotnet run --project src/Tunnelite.Server (server)
  test_command: dotnet test (no test project found; test/ contains sample apps for manual testing)
ecosystem_connections:
  similar_to:
    - ngrok (most direct comparison)
    - localtunnel
    - cloudflare tunnel
    - bore
    - rathole
  alternatives:
    - ngrok (more mature, paid tiers)
    - frp (more features, Go-based)
    - cloudflare tunnel (managed, requires Cloudflare)
    - teleport (enterprise-focused)
  used_with:
    - ASP.NET Core applications
    - webhook testing services
    - local development environments
    - CI/CD pipelines for ephemeral previews
