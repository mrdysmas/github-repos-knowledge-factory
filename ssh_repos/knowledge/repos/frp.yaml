name: frp
node_id: repo::fatedier/frp
github_full_name: fatedier/frp
html_url: https://github.com/fatedier/frp
source: ssh_repos
provenance:
  shard: ssh_repos
  source_file: ssh_repos/knowledge/repos/frp.yaml
  as_of: '2026-02-25'
directory: frp-dev
category: tunneling
summary: |
  A fast reverse proxy for NAT/firewall traversal that exposes local services to the public internet. Supports TCP, UDP, HTTP, HTTPS protocols with features like P2P mode, load balancing, encryption, and extensive plugin system.

core_concepts:
  - name: client-server proxy architecture
    description: frps (server) runs on a public-facing machine; frpc (client) runs behind NAT/firewall and establishes outbound connections. Server forwards incoming traffic through the persistent tunnel back to internal services.
  - name: proxy types and multiplexing
    description: Supports tcp, udp, http, https, stcp (secret TCP), tcpmux (HTTP CONNECT multiplexing), and xtcp (P2P). TCP stream multiplexing via yamux allows multiple logical connections over a single TCP connection.
  - name: visitor pattern for secure access
    description: STCP and XTCP modes use visitors - separate frpc instances that connect to the server to access exposed services, requiring preshared keys for authentication instead of opening ports publicly.
  - name: plugin extensibility
    description: Built-in client plugins (unix_domain_socket, http_proxy, socks5, static_file, https2http) and server HTTP plugins enable custom processing without modifying core code.

key_entry_points:
  - path: cmd/frpc/main.go:23
    purpose: frpc binary entry point; enables compatibility mode, delegates to sub.Execute() for CLI handling
  - path: cmd/frps/main.go:23
    purpose: frps binary entry point; enables compatibility mode, delegates to Execute() for CLI handling
  - path: cmd/frpc/sub/root.go:122
    purpose: runClient() - loads config, validates, creates and starts client Service
  - path: cmd/frps/root.go:111
    purpose: runServer() - initializes logging, creates and runs server Service
  - path: client/service.go:144
    purpose: NewService() and Run() - client service initialization, login to server, control loop management
  - path: server/service.go:135
    purpose: NewService() and Run() - server service setup including listeners (TCP, KCP, QUIC, WebSocket, TLS), vhost routers, dashboard
  - path: pkg/config/v1/
    purpose: Configuration structures and validation for client, server, proxy, and visitor configs (TOML/YAML/JSON supported)
  - path: pkg/msg/
    purpose: Protocol message definitions (Login, LoginResp, NewWorkConn, StartWorkConn, etc.) for client-server communication

build_run:
  language: go
  go_version: "1.24"
  package_manager: go mod
  build_command: make build (or go build -o bin/frps ./cmd/frps && go build -o bin/frpc ./cmd/frpc)
  run_command: |
    Server: ./frps -c frps.toml
    Client: ./frpc -c frpc.toml
  test_command: make test (or go test -v --cover ./...)
  extra_info: |
    Build with CGO_ENABLED=0 for static binaries. Key transports:
    - TCP (default) with optional TLS encryption
    - KCP protocol (UDP-based, lower latency)
    - QUIC protocol (modern UDP multiplexed transport)
    - WebSocket for HTTP proxy compatibility

    Hot-reload client config: frpc reload -c frpc.toml
    Check proxy status: frpc status -c frpc.toml

ecosystem_connections:
  similar_to:
    - rathole - Rust-based, lower resource usage
    - ngrok - Commercial hosted tunneling service
    - cloudflared (Cloudflare Tunnel) - Managed zero-trust access
  alternatives:
    - ssh -R - Built-in reverse port forwarding, no multiplexing
    - wireguard - Full VPN solution, network-level access
    - tailscale/zerotier - Mesh VPN for secure network connectivity
  used_with:
    - systemd - Running as Linux service
    - docker - Official image fatedier/frp available
    - nginx/caddy - HTTP routing and SSL termination in front of frps
    - prometheus - Metrics export via /metrics endpoint when enabled
