  location: packages/puppeteer-core/src/api, src/cdp, src/bidi
  file: packages/puppeteer-core/src/api/Page.ts
- pattern: monorepo split between full and core packages
  description: puppeteer wraps puppeteer-core with configuration and browser provisioning defaults.
  location: packages/puppeteer/src/puppeteer.ts
  file: packages/puppeteer/src/puppeteer.ts
- pattern: generated API-doc parity
