  location: packages/puppeteer-core/src/node/LaunchOptions.ts
  file: packages/puppeteer-core/src/node/LaunchOptions.ts
configuration:
  options:
  - key: launch.headless
    default: true
    description: Controls headless mode (true or shell variant).
  - key: launch.executablePath
    default: bundled browser resolution
    description: Overrides browser binary path.
  - key: launch.channel
    default: chrome stable mapping
    description: Selects installed Chrome channel.
  - key: launch.args
    default: puppeteer default args
    description: Additional browser process arguments.
  - key: launch.userDataDir
    default: temporary profile
    description: Persistent browser profile directory.
  - key: connect.defaultViewport
    default: "{width: 800, height: 600}"
    description: Per-page viewport applied at attach/launch.
  - key: connect.protocol
    default: runtime-dependent (cdp for Chrome launch/connect)
    description: Protocol backend selection.
  - key: connect.slowMo
    default: none
    description: Adds delay to operations for debugging.
  - key: connect.protocolTimeout
    default: 180000
    description: Timeout for individual protocol calls.
  - key: connect.browserWSEndpoint / browserURL
    default: none
    description: Endpoint selection when attaching to existing browser.
environment:
- name: PUPPETEER_BROWSER
  description: Chooses default browser (chrome or firefox) for configuration.
- name: PUPPETEER_EXECUTABLE_PATH
  description: Overrides executable path and implies skip-download behavior.
- name: PUPPETEER_SKIP_DOWNLOAD
  description: Disables managed browser downloads.
- name: PUPPETEER_CACHE_DIR
  description: Overrides browser cache directory location.
- name: PUPPETEER_TMP_DIR
  description: Sets temporary directory used by Puppeteer.
- name: PUPPETEER_LOGLEVEL
  description: Controls log level (warn, error, or silent).
- name: PUPPETEER_CHROME_VERSION
  description: Pins managed Chrome version.
- name: PUPPETEER_CHROME_DOWNLOAD_BASE_URL
  description: Overrides Chrome download host.
- name: PUPPETEER_FIREFOX_VERSION
  description: Pins managed Firefox version.
- name: PUPPETEER_FIREFOX_DOWNLOAD_BASE_URL
  description: Overrides Firefox download host.
