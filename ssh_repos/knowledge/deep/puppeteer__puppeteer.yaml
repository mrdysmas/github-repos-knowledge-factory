  location: docs/api/
  file: docs/api/index.md
- pattern: event-driven async orchestration
  description: Uses observable/event streams for protocol events and wait conditions.
  location: packages/puppeteer-core/src/api/Page.ts
  file: packages/puppeteer-core/src/api/Page.ts
implementation_patterns:
- pattern: launch/connect configuration layering
  description: Combines config file and PUPPETEER_* environment settings into runtime config.
  location: packages/puppeteer/src/getConfiguration.ts
  file: packages/puppeteer/src/getConfiguration.ts
- pattern: frame-delegated page actions
  description: Many Page actions (goto/click/type/waitForSelector) delegate to mainFrame methods.
  location: packages/puppeteer-core/src/api/Page.ts
  file: packages/puppeteer-core/src/api/Page.ts
- pattern: explicit protocol type option
