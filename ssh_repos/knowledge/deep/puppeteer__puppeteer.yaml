architecture:
  module_breakdown:
  - module: packages/puppeteer/src
    responsibility: Full package entrypoint exposing launch/connect and configuration defaults.
    key_files:
    - packages/puppeteer/src/puppeteer.ts
    - packages/puppeteer/src/getConfiguration.ts
  - module: packages/puppeteer-core/src/api
    responsibility: Public API surfaces (Browser, BrowserContext, Page, ElementHandle, Frame).
    key_files:
    - packages/puppeteer-core/src/api/Browser.ts
    - packages/puppeteer-core/src/api/Page.ts
    - packages/puppeteer-core/src/api/ElementHandle.ts
    - packages/puppeteer-core/src/api/Frame.ts
  - module: packages/puppeteer-core/src/node
    responsibility: Browser launch/connect and process management for Node environments.
    key_files:
    - packages/puppeteer-core/src/node/PuppeteerNode.ts
    - packages/puppeteer-core/src/node/BrowserLauncher.ts
    - packages/puppeteer-core/src/node/LaunchOptions.ts
  - module: packages/puppeteer-core/src/cdp and src/bidi
    responsibility: Protocol-specific implementations for CDP and WebDriver BiDi transports.
    key_files:
    - packages/puppeteer-core/src/cdp/
    - packages/puppeteer-core/src/bidi/
  - module: packages/browsers/src
    responsibility: Browser binary resolution, downloads, channels, and installation helpers.
    key_files:
    - packages/browsers/src/
  - module: docs/api and docs/guides
    responsibility: API reference and usage guide content aligned with exported public surface.
    key_files:
    - docs/api/index.md
    - docs/guides/getting-started.md
  components:
  - name: launcher/connect layer
    description: Creates browser processes or attaches to existing browser endpoints.
  - name: context/page object graph
    description: Browser, BrowserContext, and Page objects model runtime automation state.
  - name: protocol adapter layer
    description: CDP and BiDi backends implement shared API contracts.
  - name: DOM handle layer
    description: ElementHandle and JSHandle wrap remote browser objects and execution contexts.
  data_flow: |
    1. `puppeteer` package builds a PuppeteerNode instance with resolved config.
    2. `launch()` or `connect()` returns a Browser abstraction.
    3. Browser creates BrowserContext and Page instances.
    4. Page methods delegate to Frame/protocol sessions for navigation, evaluation, and input.
    5. Results are returned as JS values, handles, screenshots, PDFs, or protocol-backed events.
  key_abstractions:
  - name: PuppeteerNode
    purpose: Node-specific launcher/connect facade.
  - name: Browser
    purpose: Session-level automation object representing connected browser instance.
  - name: BrowserContext
    purpose: Isolated context for cookies/storage/permissions and scoped pages.
  - name: Page
    purpose: Primary automation surface for navigation, interaction, and execution.
  - name: ElementHandle
    purpose: Handle to DOM element for direct interaction and scoped queries.
key_features:
- Browser launch and remote attach workflows (launch and connect).
- Multi-context isolation with per-context pages, cookies, and permissions.
- High-level page automation (navigation, selectors, evaluation, input, waiting).
- Rendering and export workflows (screenshots and PDF generation).
- Dual protocol architecture supporting CDP and WebDriver BiDi backends.
