name: pangolin
node_id: repo::fosrl/pangolin
github_full_name: fosrl/pangolin
html_url: https://github.com/fosrl/pangolin
source: ssh_repos
provenance:
  shard: ssh_repos
  source_file: ssh_repos/knowledge/deep/pangolin.yaml
  as_of: '2026-02-23'
directory: pangolin-main
category: network_infrastructure

# Inherited from shallow file
summary: |
  Open-source identity-aware VPN and reverse proxy platform built on WireGuard that combines zero-trust network access with browser-based web application access, enabling secure connectivity to private resources without exposing networks to the internet.

# Deep additions
architecture:
  module_breakdown:
    - module: server/index.ts
      responsibility: Main entry point - initializes config, licensing, starts all servers
      key_files: [server/index.ts]
    - module: server/apiServer.ts
      responsibility: External API server (port 3000) with Express, auth, rate limiting
      key_files: [server/apiServer.ts]
    - module: server/nextServer.ts
      responsibility: Next.js frontend server (port 3002)
      key_files: [server/nextServer.ts]
    - module: server/internalServer.ts
      responsibility: Internal server (port 3001) for site-to-control-plane communication
      key_files: [server/internalServer.ts]
    - module: server/lib/traefik/
      responsibility: Traefik reverse proxy configuration, SSL certificates
      key_files: [server/lib/traefik/TraefikConfigManager.ts]
    - module: server/lib/config.ts
      responsibility: Centralized configuration with Zod validation
      key_files: [server/lib/config.ts]
    - module: server/middlewares/
      responsibility: Auth middleware (verifyUser, verifyApiKey, verifyOrgAccess)
      key_files: [server/middlewares/]
    - module: src/app/
      responsibility: Next.js App Router pages for web dashboard
      key_files: [src/app/]
  data_flow: |
    1. User authenticates via OIDC/email/WebAuthn
    2. Client connects via WireGuard to exit node (site)
    3. Traffic routed through Traefik reverse proxy
    4. Policy engine checks role-based access
    5. Request proxied to target resource
    6. Audit logging records all access
  key_abstractions:
    - name: Site
      purpose: WireGuard endpoint for remote network access
    - name: Resource
      purpose: Proxied application via Traefik
    - name: Client
      purpose: User device connecting to Pangolin
    - name: Exit Node
      purpose: WireGuard peer for outbound access
    - name: Organization
      purpose: Tenant isolation boundary

implementation_patterns:
  - pattern: Multi-Process Architecture
    description: Separate servers for API (3000), internal (3001), frontend (3002), integration (3003)
    location: server/index.ts:27
  - pattern: Configuration-Driven
    description: YAML configuration with Zod validation, environment variable substitution
    location: server/lib/config.ts
  - pattern: Middleware Stack
    description: Authentication, authorization, and audit middleware layers
    location: server/middlewares/
  - pattern: Dynamic Imports
    description: Dynamic imports separate OSS from enterprise features
    location: server/index.ts
  - pattern: Blueprint Pattern
    description: Extensible resource type system
    location: server/lib/blueprints/
  - pattern: Zero-Trust Access
    description: All access requires explicit authorization via policies
    location: server/middlewares/verifyOrgAccess.ts

configuration:
  file: config/config.yml
  options:
    - name: app.dashboard_url
      type: string
      description: Dashboard URL with domain substitution
    - name: app.log_level
      type: string
      default: "info"
      description: Logging verbosity
    - name: app.telemetry.anonymous_usage
      type: bool
      default: true
      description: Anonymous usage telemetry
    - name: server.external_port
      type: int
      default: 3000
      description: External API port
    - name: server.internal_port
      type: int
      default: 3001
      description: Internal server port
    - name: server.secret
      type: string
      required: true
      description: Server secret for sessions
    - name: traefik.http_entrypoint
      type: string
      default: "web"
      description: HTTP entrypoint name
    - name: traefik.https_entrypoint
      type: string
      default: "websecure"
      description: HTTPS entrypoint name
    - name: traefik.cert_resolver
      type: string
      default: "letsencrypt"
      description: Certificate resolver
    - name: gerbil.start_port
      type: int
      default: 51820
      description: WireGuard starting port
    - name: gerbil.base_endpoint
      type: string
      description: WireGuard endpoint domain
    - name: gerbil.subnet_group
      type: string
      default: "100.89.137.0/20"
      description: WireGuard subnet
    - name: rate_limits.global.window_minutes
      type: int
      default: 1
      description: Rate limit window
    - name: rate_limits.global.max_requests
      type: int
      default: 500
      description: Max requests per window
    - name: flags.require_email_verification
      type: bool
      default: false
      description: Require email verification
    - name: flags.disable_signup_without_invite
      type: bool
      default: true
      description: Disable public signup

api_surface:
  public_functions:
    - name: createApiServer
      signature: async function createApiServer()
      purpose: Create external API server
      location: server/apiServer.ts:29
    - name: createInternalServer
      signature: async function createInternalServer()
      purpose: Create internal server
      location: server/internalServer.ts
    - name: createNextServer
      signature: async function createNextServer()
      purpose: Create Next.js frontend server
      location: server/nextServer.ts:10
  rest_endpoints:
    - path: POST /api/v1/auth/login
      purpose: User login
    - path: POST /api/v1/auth/signup
      purpose: User registration
    - path: POST /api/v1/auth/logout
      purpose: User logout
    - path: GET /api/v1/org/
      purpose: List organizations
    - path: POST /api/v1/org/
      purpose: Create organization
    - path: GET /api/v1/resource/
      purpose: List resources
    - path: POST /api/v1/resource/
      purpose: Create resource
    - path: POST /api/v1/resource/:id/auth-access-token
      purpose: Generate access token
    - path: GET /api/v1/site/
      purpose: List WireGuard sites
    - path: POST /api/v1/site/
      purpose: Create site
    - path: GET /api/v1/client/
      purpose: List user devices
    - path: POST /api/v1/client/
      purpose: Create client

testing:
  framework: Minimal (only test/assert.ts found)
  structure: No comprehensive test suite
  coverage_areas: []
  notes: Notable gap in test coverage for production system

extension_points:
  - location: server/lib/idp/
    hook: Identity providers
    example: OIDC, SAML, custom identity provider integration
  - location: server/lib/blueprints/
    hook: ResourceBlueprint interface
    example: Custom resource types (proxy, ssh, rdp, docker)
  - location: server/lib/traefik/
    hook: Certificate management
    example: Custom certificate resolvers, wildcard certificates
  - location: server/lib/billing/
    hook: Billing integration
    example: Stripe, custom billing providers
  - location: WebSocket connections
    hook: Real-time extensions
    example: Push notifications, live configuration updates
  - location: Feature flags in config
    hook: flags.* configuration
    example: Toggle features without code changes
