  - key: BORG_REPO
    default: none
    description: Default repository location.
  - key: BORG_PASSPHRASE
    default: none
    description: Passphrase source for key handling.
  - key: BORG_PASSCOMMAND
    default: none
    description: External command used to fetch passphrase.
  - key: BORG_PASSPHRASE_FD
    default: none
    description: File descriptor source for passphrase.
  - key: BORG_RSH
    default: ssh
    description: Remote shell transport wrapper/override.
  - key: BORG_EXIT_CODES
    default: modern
    description: Exit code style selection.
  - key: BORG_FUSE_IMPL
    default: platform dependent
    description: FUSE implementation selector for mount flows.
