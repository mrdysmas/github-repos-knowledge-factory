architecture:
  module_breakdown:
  - module: src/borg/archiver/
    responsibility: CLI command mixins and command parser for create/extract/check/prune/repo operations.
    key_files:
    - src/borg/archiver/__init__.py
    - src/borg/archiver/create_cmd.py
    - src/borg/archiver/check_cmd.py
    - src/borg/archiver/prune_cmd.py
  - module: src/borg/repository.py
    responsibility: Repository abstraction for local and supported remote/backed storage protocols.
    key_files:
    - src/borg/repository.py
  - module: src/borg/archive.py
    responsibility: Archive object creation, metadata handling, and chunk stream integration.
    key_files:
    - src/borg/archive.py
  - module: src/borg/cache.py
    responsibility: Chunks/files cache management and secure repository checks.
    key_files:
    - src/borg/cache.py
  - module: src/borg/chunkers/
    responsibility: Chunking implementations (including buzhash/buzhash64 variants).
    key_files:
    - src/borg/chunkers/buzhash.pyx
    - src/borg/chunkers/buzhash64.pyx
    - src/borg/chunkers/reader.pyx
  - module: setup.py and pyproject.toml
    responsibility: Build system, extension compilation, and native dependency discovery.
    key_files:
    - setup.py
    - pyproject.toml
  - module: docs/internals.rst
    responsibility: Internal architecture narrative for repository, manifest, archives, and dedup model.
    key_files:
    - docs/internals.rst
  components:
  - name: repository layer
    description: Low-level object store for chunks and metadata.
  - name: manifest/archive layer
    description: Maps archive names/ids and tracks archive metadata/content references.
  - name: cache layer
    description: Local cache optimizes chunk dedup checks and metadata reuse.
  - name: command mixin layer
    description: Command-specific logic composed into Archiver class.
  data_flow: |
    1. CLI command is parsed by Archiver and mapped to command mixin handler.
    2. Repository context is opened via decorators (with_repository).
    3. For backup creation, input files are chunked and deduplicated against cache/repo indexes.
    4. New chunks and metadata are serialized and committed as archive objects.
    5. Restore/list/check/prune commands traverse archive metadata and repository objects.
  key_abstractions:
  - name: with_repository decorator
    purpose: Shared repository open/lock/load-manifest scaffolding for commands.
  - name: Archive
    purpose: Archive-level metadata and content write/read operations.
  - name: Cache
    purpose: Local acceleration for deduplication and secure repo state checks.
  - name: chunker pipeline
    purpose: Content-defined chunking used for deduplicated backup storage.
key_features:
- Deduplicated, encrypted backup archives with repository-level chunk reuse.
- Rich command set for create/extract/check/prune/compact/transfer workflows.
- Local and remote repository transports (ssh/socket and storage backends).
- Filesystem metadata preservation and mount/extract tooling.
- Cython-accelerated chunking and crypto-adjacent hot paths.
implementation_patterns:
- pattern: Command mixin composition
  description: Archiver aggregates many *MixIn classes, one per command domain.
  location: src/borg/archiver/__init__.py
  file: src/borg/archiver/__init__.py
- pattern: Decorator-based repository context management
  description: with_repository centralizes lock/open/manifest/cache setup.
  location: src/borg/archiver/_common.py
  file: src/borg/archiver/_common.py
- pattern: Cython for performance-sensitive chunking
  description: Chunker implementations and helpers are compiled from .pyx sources.
  location: setup.py and src/borg/chunkers/
  file: setup.py
- pattern: Explicit command handlers per operation
  description: Command modules (create_cmd.py, extract_cmd.py, etc.) keep logic isolated.
  location: src/borg/archiver/
  file: src/borg/archiver/create_cmd.py
