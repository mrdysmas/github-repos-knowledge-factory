cli_commands:
- command: borg repo-create
  description: Initialize repository with chosen encryption/key mode.
- command: borg create
  description: Create new backup archive from source paths.
- command: borg extract
  description: Restore files from archive.
- command: borg prune
  description: Apply retention policy to archive series.
- command: borg check
  description: Verify repository and archive integrity.
- command: borg compact
  description: Compact repository storage after deletions.
- command: borg transfer
  description: Transfer archives between repositories.
