policy_controls:
  ws7_gate_classes:
    blocking:
      - "row_count_parity"
      - "orphan_edge_detection"
      - "query_parity"
      - "deterministic_rebuild"
    warning_only:
      - "snapshot_consistency (timestamp divergence)"
  ws6_validation_source: "python3 tools/query_master.py --source yaml stats"
  ws7_force_rule: "Use --force only when strict WS7 fails solely on snapshot/timestamp consistency."
  run_order:
    - "tools/ws5_remote_ingestion.py"
    - "tools/ws4_master_compiler.py"
    - "tools/ws6_deep_integrator.py --run-validation-suite"
    - "tools/ws7_read_model_compiler.py (strict first)"
  required_freshness_disclosure:
    - "master_index.generated_at_utc"
    - "master_graph.generated_at_utc"
    - "master_deep_facts.generated_at_utc"
    - "deep_facts delta vs baseline"
    - "WS7 strict result + snapshot gate status (pass/warn) + fallback usage"
  deep_run_acceptance:
    - "Every targeted repo has a deep narrative file in {shard}/knowledge/deep/<file_stem>.yaml."
    - "Every targeted repo has a materialized deep_facts file in {shard}/knowledge/deep_facts/<file_stem>.yaml."
    - "Batch-level query_master deep_facts delta must be > 0 (hard gate)."
  next_prompt_fix_required:
    - "Preflight must baseline WS6 unmapped-section count before execution."
    - "Final report must disclose unmapped-section before/after delta (soft-quality evidence)."
  re_escalate_snapshot_to_blocking_when:
    - "Snapshot divergence repeatedly causes incorrect query interpretation in practice."
    - "Deep-facts regeneration cadence is tightened such that timestamp alignment is expected by design."

